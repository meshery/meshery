apiVersion: v2
name: meshery-operator
description: Meshery Operator chart.
icon: https://meshery.io/images/logos/meshery-logo.png
sources:
  - https://github.com/meshery/meshery-operator
keywords:
  - meshery-broker
  - meshery-meshsync
deprecated: false

# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application

# version and appVersion track meshery-operator releases; both are stamped by
# hack/sync-downstream.sh in meshery/meshery-operator on every operator
# release (the sync-downstream workflow). Do not hand-edit without a reason.
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: meshery-broker
    version: 0.5.0
    condition: meshery-broker.enabled
  - name: meshery-meshsync
    version: 0.5.0
    condition: meshery-meshsync.enabled

maintainers:
  - name: Meshery Authors
    email: developers@meshery.io
  - name: aisuko
    email: urakiny@gmail.com
  - name: maintainers
    email: maintainers@meshery.io
