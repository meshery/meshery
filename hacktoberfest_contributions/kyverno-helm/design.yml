name: Kyverno Policy Engine
version: 0.0.1
services:
  kyverno-admission-controller:
    name: kyverno-admission-controller
    type: Deployment
    apiVersion: apps/v1
    namespace: kyverno
    version: v1.29.0
    model: kubernetes
    settings:
      spec:
        replicas: 3
        selector:
          match Labels:
            app.kubernetes.io/name: kyverno
            app.kubernetes.io/component: admission-controller
        template:
          metadata:
            labels:
              app.kubernetes.io/name: kyverno
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/version: v1.29.0
          spec:
            containers:
            - name: kyverno
              image: ghcr.io/kyverno/kyverno:v1.29.0
              ports:
              - container Port: 9443
                name: https
                protocol: TCP
              - container Port: 8000
                name: metrics
                protocol: TCP
              env:
              - name: INIT_CONFIG
                value: kyverno
              - name: METRICS_CONFIG
                value: kyverno-metrics
              - name: KYVERNO_NAMESPACE
                value From:
                  field Ref:
                    field Path: metadata.namespace
              liveness Probe:
                http Get:
                  path: /health/liveness
                  port: 9443
                  scheme: HTTPS
                initial Delay Seconds: 15
                period Seconds: 30
                timeout Seconds: 5
                failure Threshold: 2
                success Threshold: 1
              readiness Probe:
                http Get:
                  path: /health/readiness
                  port: 9443
                  scheme: HTTPS
                initial Delay Seconds: 5
                period Seconds: 10
                timeout Seconds: 5
                failure Threshold: 6
                success Threshold: 1
              resources:
                limits:
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              security Context:
                allow Privilege Escalation: false
                capabilities:
                  drop:
                  - ALL
                privileged: false
                read Only Root Filesystem: true
                run As Non Root: true
                seccomp Profile:
                  type: RuntimeDefault
            service Account Name: kyverno-admission-controller
    traits:
      meshmap:
        edges: []
        id: kyverno-admission-controller-deployment
        label: Kyverno Admission Controller
        meshmodel-metadata:
          genealogy: ""
          is Custom Resource: false
          is Namespaced: true
          logo URL: https://github.com/cncf/artwork/blob/master/projects/kubernetes/icon/white/kubernetes-icon-white.svg
          model: kubernetes
          model Display Name: Kubernetes
          published Version: 0.7.2
        position:
          posX: 70
          posY: 70
        whiteboarddata:
          style: {}
  kyverno-background-controller:
    name: kyverno-background-controller
    type: Deployment
    apiVersion: apps/v1
    namespace: kyverno
    version: v1.29.0
