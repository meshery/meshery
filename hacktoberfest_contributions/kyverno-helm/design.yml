              app.kubernetes.io/version: v1.29.0
          spec:
            containers:
            - name: controller
              image: ghcr.io/kyverno/background-controller:v1.29.0
              ports:
              - container Port: 8000
                name: metrics
                protocol: TCP
              env:
              - name: KYVERNO_NAMESPACE
                value From:
                  field Ref:
                    field Path: metadata.namespace
              resources:
                limits:
                  memory: 256Mi
                requests:
                  cpu: 100m
                  memory: 64Mi
              security Context:
                allow Privilege Escalation: false
                capabilities:
                  drop:
                  - ALL
                privileged: false
                read Only Root Filesystem: true
                run As Non Root: true
                seccomp Profile:
                  type: RuntimeDefault
            service Account Name: kyverno-background-controller
    traits:
