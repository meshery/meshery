name: eslint-check
on:
  pull_request:
    paths:
      - 'ui/**'
      - 'provider-ui/**'

permissions:
  contents: read

jobs:
  eslint:
    name: runner / eslint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js v22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies in Meshery UI and Provider UI
        run: |
          cd ui && npm ci && cd ..
          cd provider-ui && npm ci && cd ..
      - name: Run ESLint Meshery-UI
        run: cd ui && npm run lint
      - name: Run ESLint Provider-UI
        run: cd provider-ui && npm run lint

    # Replace the steps above with the following make targets and autocommit when ready.
    # - name: Run eslint Meshery UI
    #   run: make ui-lint
    # - name: Run eslint Provider UI
    #   run: make ui-provider-lint
    # - name: Commit changes
    #   uses: stefanzweifel/git-auto-commit-action@v7
    #   with:
    #     commit_user_name: mesheryci
    #     commit_user_email: ci@meshery.io
    #     commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
    #     commit_options: "--signoff"
    #     commit_message: "[UI] Chore: eslint fixes"

  ui-unit-tests:
    name: runner / ui-unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js v22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install Meshery UI dependencies
        working-directory: ui
        run: npm ci
      - name: Run Vitest unit + React Testing Library tests
        working-directory: ui
        env:
          CI: 'true'
        run: npm test -- --reporter=default --reporter=junit --outputFile=./test-report.junit.xml

      - name: Summarize failing tests on failure
        if: failure()
        working-directory: ui
        run: |
          if [ ! -f ./test-report.junit.xml ]; then
            echo "## ui-unit-tests: report missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## ui-unit-tests: failing tests" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          # Extract <testcase> nodes that contain a <failure> child and print
          # classname/name plus the first 8 lines of the failure body.
          node -e '
            const fs = require("fs");
            const xml = fs.readFileSync("./test-report.junit.xml", "utf8");
            const cases = xml.split(/<testcase\s/).slice(1);
            const out = [];
            for (const raw of cases) {
              if (!/<failure/.test(raw)) continue;
              const cls = (raw.match(/classname="([^"]*)"/) || [, ""])[1];
              const nm = (raw.match(/name="([^"]*)"/) || [, ""])[1];
              const failMsg = (raw.match(/<failure[^>]*message="([^"]*)"/) || [, ""])[1];
              const body = ((raw.match(/<failure[^>]*>([\s\S]*?)<\/failure>/) || [, ""])[1] || "")
                .replace(/<!\[CDATA\[/g, "")
                .replace(/\]\]>/g, "")
                .split(/\r?\n/)
                .slice(0, 8)
                .join("\n");
              out.push(`### ${cls} › ${nm}\n\n**Message:** ${failMsg}\n\n\`\`\`\n${body}\n\`\`\`\n`);
            }
            if (out.length === 0) out.push("No <failure> tags found in JUnit XML.");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out.join("\n"));
          '

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ui-unit-tests-report
          path: ui/test-report.junit.xml
          retention-days: 7
