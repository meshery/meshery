name: eslint-check
on:
  pull_request:
    paths:
      - "ui/**"
      - "provider-ui/**"
jobs:
  eslint:
    name: runner / eslint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run ESLint Meshery UI
        run: make ui-lint
      - name: Run ESLint Provider UI
        run: make ui-provider-lint
