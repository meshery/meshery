name: Notify Remote Providers
on:
  push:
#     branches:
#       - 'master'
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'mesheryctl/**'

jobs:
  notify-remote-provider-build:
    name: Notify Remote Providers of Release
    if: github.repository == 'meshery/meshery'
    runs-on: ubuntu-24.04
    steps:
    - name: Trigger extensions build for edge
      if: startsWith(github.ref, 'refs/tags/') != true && success()
      uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
      with:
        workflow: Build and Release Extensions
        repo: meshery-extensions/meshery-extensions-packages
        token: ${{ secrets.GH_ACCESS_TOKEN }}
        ref: master
        inputs: '{"version": "master"}'
    - name: Set release tag
      if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/') && success()
      id: vars
      run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
    - name: Trigger extensions build for release
      if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/') && success()
      uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
      with:
        workflow: Build and Release Extensions
        repo: meshery-extensions/meshery-extensions-packages
        token: ${{ secrets.GH_ACCESS_TOKEN }}
        ref: master
