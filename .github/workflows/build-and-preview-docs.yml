name: Build Docs Preview

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, closed]
    paths:
      - '!**'
      - 'docs/**'
      - '.github/workflows/build-and-preview-docs.yml'
      - 'mesheryctl/doc/**'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable extra workflow context logging'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: preview-build-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-preview:
    runs-on: ubuntu-24.04
    env:
      HUGO_VERSION: 0.157.0

    steps:
      - name: 🔍 Introspect Inputs
        run: |
          echo "::group::Workflow Inputs"
          echo "Debug Mode: ${{ inputs.debug_mode || 'false' }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action || 'n/a' }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "PR Number: ${{ github.event.pull_request.number || 'n/a' }}"
          echo "Repository: ${{ github.repository }}"
          echo "::endgroup::"

      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout PR docs source
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
          filter: blob:none
          sparse-checkout: |
            docs
            pr-preview
          sparse-checkout-cone-mode: true

      - name: Install Hugo CLI
        if: github.event.action != 'closed'
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        if: github.event.action != 'closed'
        env:
          DART_SASS_VERSION: 1.79.5
        run: |
          set -eu
          cd "${RUNNER_TEMP}"
          curl -fsSL -o dart-sass.tar.gz "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          sudo tar -xzf dart-sass.tar.gz -C /usr/local/lib
          sudo ln -sf /usr/local/lib/dart-sass/sass /usr/local/bin/sass
          sudo ln -sf /usr/local/lib/dart-sass/sass /usr/local/bin/dart-sass
          dart-sass --version

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: |
          cd docs
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Build PR preview
        if: github.event.action != 'closed'
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          HUGO_PREVIEW: "true"
          PREVIEW_BASE_URL: "/pr-preview/pr-${{ github.event.pull_request.number }}/"
        run: |
          cd docs
          npm run build:production -- --gc --baseURL "${PREVIEW_BASE_URL}"
          find public -maxdepth 1 -type d -name 'v0.*' -exec rm -rf {} +
          cat > public/robots.txt <<'ROBOTS'
          User-agent: *
          Disallow: /
          ROBOTS

      - name: Prepare Artifact Payload
        run: |
          mkdir -p pr_payload
          echo "${{ github.event.pull_request.number }}" > pr_payload/pr_number.txt
          echo "${{ github.event.action }}" > pr_payload/pr_action.txt
          if [ "${{ github.event.action }}" != "closed" ]; then
            cp -r docs/public pr_payload/public
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-payload
          path: pr_payload
          retention-days: 1
