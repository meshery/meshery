name: Build and Preview Docs
on:
  pull_request_target:
    branches: [ master ]
    types: [opened, synchronize, reopened]
    paths:
      - '!**'
      - 'docs/**'
      - '.github/workflows/build-and-preview-docs.yml'
      - 'mesheryctl/doc/**'

permissions: {}

jobs:
  build-docs-preview:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          submodules: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Install dart-sass
        run: |
          sudo snap install dart-sass

      - name: Install dependencies
        run: |
          cd docs
          npm ci

      - name: Build Hugo site
        run: |
          cd docs
          hugo --cleanDestinationDir -e production -DFE --minify --baseURL "/"

      - name: Zip Site
        run: |
          cd docs/public
          zip -r ../../docs-site.zip .
          cd ../..

      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: ./docs-site.zip
          retention-days: 1

  deploy-docs-preview:
    if: github.repository == 'meshery/meshery'
    runs-on: ubuntu-24.04
    needs: build-docs-preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout workflow code
        uses: actions/checkout@v6

      - name: Download Site directory
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: .

      - name: Unzip Site
        run: |
          mkdir -p docs-preview
          unzip docs-site.zip -d docs-preview
          rm -f docs-site.zip

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: 'docs-preview'
          production-deploy: false
          github-token: ${{ secrets.GH_ACCESS_TOKEN }}
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment Deploy URL
        uses: ./.github/actions/comment-preview-on-pr
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          deploy_url: "${{ steps.netlify.outputs.deploy-url }}"
