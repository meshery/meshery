---
name: Playground CNCF - Deploy

on:
  workflow_call:
    inputs:
      image:
        type: string
        default: playground-latest
  workflow_dispatch:
    inputs:
      image:
        description: >-
          Container image reference for the playground deployment
        required: false
        default: playground-latest
        type: string

permissions:
  contents: read

jobs:
  cncf-playground-rollout:
    name: Update Meshery on CNCF playground
    if: github.repository == "meshery/meshery"
    runs-on: ubuntu-24.04
    steps:
      # Print non-sensitive inputs and context first so manual runs
      # and reused calls are easy to debug.
      - name: 🔍 Introspect Inputs and Context
        env:
          IMAGE_INPUT: ${{ inputs.image }}
        run: |
          echo "::group::Workflow Inputs"
          echo "Image Input: ${IMAGE_INPUT}"
          echo "::endgroup::"

          echo "::group::GitHub Context"
          echo "Actor: ${{ github.actor }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"

      # Validate the caller-provided image before it ever reaches
      # the remote shell. This blocks command-injection characters
      # in manual input and removes direct script interpolation.
      - name: 🔒 Validate requested image reference
        id: validate-image
        uses: actions/github-script@v8
        env:
          IMAGE_INPUT: ${{ inputs.image }}
        with:
          script: |
            const image = process.env.IMAGE_INPUT ?? '';

            // Allow standard OCI image reference characters only.
            // Reject whitespace and shell metacharacters so the
            // remote SSH command receives data, not code.
            const safeImagePattern = /^[A-Za-z0-9][A-Za-z0-9._/:@+-]*$/;

            if (!safeImagePattern.test(image)) {
              core.setFailed(
                `Invalid image input: "${image}". ` +
                  "Use a plain container image reference."
              );
              return;
            }

            core.info(`Validated image reference: ${image}`);
            core.setOutput('image', image);

      - name: Pull latest images and restart containers
        uses: appleboy/ssh-action@master
        env:
          DEPLOY_IMAGE: ${{ steps.validate-image.outputs.image }}
        with:
          host: ${{ secrets.OCI_BASTION_HOST }}
          username: ${{ secrets.OCI_BASTION_USERNAME }}
          key: ${{ secrets.OCI_BASTION_KEY }}
          envs: DEPLOY_IMAGE
          script: |
            kubectl config use-context prod
            kubectl -n meshery set image deployment/playground \
              "meshery=${DEPLOY_IMAGE}"

# Verify
# kubectl get deployment playground -n meshery-o \
#   custom-columns=NAME:.metadata.name,\
#   IMAGE:.spec.template.spec.containers[*].image \
#   --no-headers
