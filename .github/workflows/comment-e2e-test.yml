name: E2E Report on Pull Request Comment
on:
  workflow_run:
    workflows: [
      'Meshery UI and Server',
      'Meshery UI and Server PR Build',
      'Meshery Build And Test'
    ]
    types: [completed]
  
permissions:
  actions: read
  issues: write
  contents: read
  pull-requests: write

jobs:
  e2e-test-reporter:
    if: github.repository == 'meshery/meshery' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
    - name: Check for e2e test report artifact
      id: artifact
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const { data } = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.payload.workflow_run.id,
          })

          const reporterArtifact = data.artifacts.find(
            (artifact) => artifact.name === 'e2e-test-reporter'
          )

          core.setOutput('found', reporterArtifact ? 'true' : 'false')

          if (!reporterArtifact) {
            core.notice('No e2e-test-reporter artifact was uploaded for this workflow run; skipping PR comment update.')
          }

    - name: Download e2e test report artifact
      if: steps.artifact.outputs.found == 'true'
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        name: e2e-test-reporter
        github-token: ${{ secrets.MESHERY_CI }}
        run-id: ${{ github.event.workflow_run.id }}
    - name: Retrieve PR Number
      if: steps.artifact.outputs.found == 'true'
      run: |
        echo "PULL_REQUEST=$(cat ./pr/number)" >> $GITHUB_OUTPUT
      id: pr
    - name: Find Comment
      if: steps.artifact.outputs.found == 'true'
      uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
      id: fc
      with:
        issue-number: ${{ steps.pr.outputs.PULL_REQUEST }}
        comment-author: 'github-actions[bot]'
        body-includes: END-TO-END TESTS
    - name: Delete Previous Comment
      if: steps.artifact.outputs.found == 'true' && steps.fc.outputs.comment-id != ''
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          github.rest.issues.deleteComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: ${{ steps.fc.outputs.comment-id }}
          })
    - name: Comment on PR with E2E results
      if: steps.artifact.outputs.found == 'true' && !cancelled()
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const fs = require('fs')
          const prNumber = Number(fs.readFileSync('./pr/number', 'utf8').trim())
          const prSha = fs.readFileSync('./pr/sha', 'utf8').trim()
          const e2eTestReporter = fs.readFileSync('./ui/test-report.md', 'utf8')
                
          const body = `        
            **Commit SHA:** \`${prSha}\`

            ${e2eTestReporter}
            `
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: body
          })
