name: Meshery UI and Server
on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Enable debug logging"
        required: false
        default: false
        type: boolean
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - "master"
    paths-ignore:
      - "docs/**"
      - "mesheryctl/**"
      - "*.md"
      - "*.github/**"
      - "Makefile"
  push:
    branches:
      - "master"
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "*.github/**"

permissions:
  contents: read

jobs:
  ui-build:
    name: UI build
    if: github.repository == 'meshery/meshery'
    runs-on: ubuntu-24.04
    steps:
      - name: 🔍 Introspect Inputs
        run: |
          echo "::group::Workflow Inputs"
          echo "Debug Mode: ${{ inputs.debug_mode || 'false' }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Build meshery-ui and provider-ui
        run: |
          make ui-build
      - name: Upload meshery-ui artifacts
        uses: actions/upload-artifact@v6
        with:
          name: meshery-ui
          retention-days: 30
          path: /home/runner/work/meshery/meshery/ui/out
      - name: Upload provider-ui artifacts
        uses: actions/upload-artifact@v6
        with:
          name: provider-ui
          retention-days: 30
          path: /home/runner/work/meshery/meshery/provider-ui/out
  tests-ui-e2e:
    needs: [ui-build]
    name: UI end-to-end tests
    environment: staging-playground
    if: github.repository == 'meshery/meshery'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: 🔍 Introspect Inputs
        run: |
          echo "::group::Workflow Inputs"
          echo "Debug Mode: ${{ inputs.debug_mode || 'false' }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.13.0
        with:
          cluster_name: "kind-cluster"
      - name: Setup Go
        uses: actions/setup-go@master
        with:
          go-version: "1.25"
          cache-dependency-path: "**/*.sum"
          cache: true
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Download meshery-ui artifacts
        uses: actions/download-artifact@v6
        with:
          name: meshery-ui
          path: /home/runner/work/meshery/meshery/ui/out
      - name: Download provider-ui artifacts
        uses: actions/download-artifact@v6
        with:
          name: provider-ui
          path: /home/runner/work/meshery/meshery/provider-ui/out
      - name: Run Meshery UI and Server
        run: |
          mkdir -p ./logs
          # Redirect server output so a crash mid-suite stays on disk and
          # can be inspected via the upload step below. Without this, an
          # unrecovered panic during e2e is invisible — the step that
          # backgrounded the server has already exited and GitHub stops
          # capturing its stdout.
          make server >./logs/meshery-server.log 2>&1 &
          echo $! > ./logs/meshery-server.pid
          sleep 90
      - name: Install Playwright
        run: make ui-setup-ci
      - name: Install Playwright Browsers
        run: make ui-test-setup
      - name: Run Playwright End-to-End Tests
        env:
          MESHERY_SERVER_URL: "http://localhost:9081"
          REMOTE_PROVIDER_URL: "https://cloud.meshery.io"
          PROVIDER_TOKEN: ${{ secrets.REMOTE_PROVIDER_TEST_USER_TOKEN }}
        run: make ui-test-e2e-ci
      - name: Save PR metadata
        if: ${{ !cancelled() && github.event_name == 'pull_request_target' }}
        run: |
          mkdir -p ./pr
          echo "${{ github.event.number }}" > ./pr/number
          echo "${{ github.event.pull_request.head.sha }}" > ./pr/sha
      - name: Upload Playwright Trace
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: ui/test-results/
          retention-days: 14
      - name: Upload Playwright HTML Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 14
      - name: Upload Allure Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: ui/allure-results/
          retention-days: 14
      - name: Upload Meshery Server Log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: meshery-server-log
          path: logs/
          retention-days: 14
      - name: Generate PR E2E assets
        if: ${{ !cancelled() && github.event_name == 'pull_request_target' }}
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ github.event.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            await require('./.github/scripts/generate-e2e-pr-assets.js')({ github, context, core })
      - name: Checkout QA
        uses: actions/checkout@v6
        if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'pull_request_target') }}
        with:
          repository: meshery/qa
          path: ./qa
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Pull latest qa changes
        if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'pull_request_target') }}
        working-directory: qa
        run: git pull --rebase --autostash origin master

      - name: Sync results with qa
        if: ${{ !cancelled() && github.event_name == 'push' }}
        working-directory: qa
        run: |
          make meshery-results-sync MESHERY_RESULTS_PATH=../ui/allure-results

      - name: Sync PR E2E summary with qa
        if: ${{ !cancelled() && github.event_name == 'pull_request_target' }}
        run: |
          PR_DIR="qa/meshery-results/pr-reports/pr-${{ github.event.number }}"
          SHA_DIR="${PR_DIR}/${{ github.event.pull_request.head.sha }}"
          LATEST_DIR="${PR_DIR}/latest"
          rm -rf "${SHA_DIR}" "${LATEST_DIR}"
          mkdir -p "${SHA_DIR}" "${LATEST_DIR}"
          cp -R ui/qa-pr-report/. "${SHA_DIR}/"
          cp -R ui/qa-pr-report/. "${LATEST_DIR}/"

      - name: Commit & push qa results
        if: ${{ !cancelled() && github.event_name == 'push' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[Meshery] Sync Meshery E2E Test Results - ${GITHUB_SHA}"
          commit_options: "--signoff"
          repository: qa
          commit_user_name: meshery-ci
          commit_user_email: ci@meshery.io
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Commit & push qa PR summary
        if: ${{ !cancelled() && github.event_name == 'pull_request_target' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[Meshery] Sync PR E2E Summary - PR #${{ github.event.number }} - ${{ github.event.pull_request.head.sha }}"
          commit_options: "--signoff"
          repository: qa
          commit_user_name: meshery-ci
          commit_user_email: ci@meshery.io
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Upload Test Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: e2e-test-reporter
          path: |
            ui/test-report.md
            ui/test-report.json
            ui/e2e-pr-comment-context.json
            pr/
          retention-days: 14
          if-no-files-found: ignore
      - name: Send Email on Workflow Failure
        if: failure()
        uses: dawidd6/action-send-mail@v7
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: GitHub Actions - Meshery UI and Server workflow failure
          from: |
            "Meshery CI" <no-reply@meshery.io>
          to: developers@meshery.io
          body: |
            The Meshery UI and Server workflow failed for ${{ github.repository }}.
            Workflow: ${{ github.workflow }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  docker-build-test:
    name: Docker build
    if: github.repository == 'meshery/meshery'
    runs-on: ubuntu-24.04
    steps:
      - name: 🔍 Introspect Inputs
        run: |
          echo "::group::Workflow Inputs"
          echo "Debug Mode: ${{ inputs.debug_mode || 'false' }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
      - name: Docker edge build & tag
        if: startsWith(github.ref, 'refs/tags/') != true && success()
        env:
          RELEASE_CHANNEL: "edge"
        run: |
          DOCKER_BUILDKIT=1 docker build -f install/docker/Dockerfile --no-cache -t meshery:edge-latest --build-arg TOKEN=test --build-arg GIT_COMMITSHA=${GITHUB_SHA::8} --build-arg RELEASE_CHANNEL=${RELEASE_CHANNEL} .
          docker tag meshery:edge-latest meshery:edge-${GITHUB_SHA::8}
      - name: Docker edge push
        if: github.event_name != 'pull_request' && github.event_name != 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/') && success()
        run: |
          docker push ${{ secrets.IMAGE_NAME }}:edge-latest
          docker push ${{ secrets.IMAGE_NAME }}:edge-${GITHUB_REF/refs\/tags\//}
          docker push ${{ secrets.IMAGE_NAME }}:edge-${GITHUB_SHA::8}
      - name: Docker Hub Description
        if: github.event_name != 'pull_request' && github.event_name != 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/') && success()
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ secrets.IMAGE_NAME }}
  # Run Rego policy tests
  rego-tests:
    name: Rego Policy Tests
    if: >-
      github.repository == 'meshery/meshery' && (
      (
        github.event_name == 'push' &&
        (
        contains(toJson(github.event.commits), '.rego') ||
        contains(toJson(github.event.commits), 'server/policies/') ||
        contains(toJson(github.event.commits), '.github/workflows/rego-lint-and-test.yml')
        )
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        (
        contains(toJson(github.event.pull_request), '.rego') ||
        contains(toJson(github.event.pull_request), 'server/policies/') ||
        contains(toJson(github.event.pull_request), '.github/workflows/rego-lint-and-test.yml')
        )
      )
      )

    uses: ./.github/workflows/rego-lint-and-test.yml
    permissions:
      contents: write
      pull-requests: write
