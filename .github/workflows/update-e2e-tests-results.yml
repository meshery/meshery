name: Update Test Report

on:
  workflow_run:
    workflows: ['Meshery UI and Server']  
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  post-test-results:
    if: >
        github.repository == 'meshery/meshery' && 
        github.event.workflow_run.event == 'push' && 
        github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_NOTES_PAT }}
          ref: 'master'

      - name: Download e2e test report artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
           name: e2e-test-reporter
           path: e2e-test-reporter
           github-token: ${{ secrets.GITHUB_TOKEN }}
           run-id: ${{ github.event.workflow_run.id }}
      
      - name: Prepare test report
        run: |
          if [ ! -f e2e-test-reporter/ui/test-report.md ]; then
            echo "Error: Test report not found!"
            exit 1
          fi
          mkdir -p docs/layouts/shortcodes

      - name: Check for meaningful report changes
        id: diff-check
        run: |
          if [ -f docs/layouts/shortcodes/test-report.md ]; then
            cp docs/layouts/shortcodes/test-report.md old-report.md
          else
            touch old-report.md
          fi

          cp e2e-test-reporter/ui/test-report.md new-report.md

          normalize() {
            sed -E '/^- Testing started at:/d' "$1" \
            | sed -E '/^[[:space:]]*Duration:/d'
          }

          normalize old-report.md > old-clean.md
          normalize new-report.md > new-clean.md

          if diff -q old-clean.md new-clean.md > /dev/null; then
            echo "No meaningful changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Meaningful changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update tracked report
        if: steps.diff-check.outputs.changed == 'true'
        run: |
          cp e2e-test-reporter/ui/test-report.md docs/layouts/shortcodes/test-report.md
            
      - name: Pull changes from remote
        run: git pull origin master

      - name: Commit artifact
        if: steps.diff-check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          file_pattern: "docs/layouts/shortcodes/test-report.md"
          commit_user_name: l5io
          commit_user_email: ci@meshery.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          commit_options: "--signoff"
          commit_message: "[Docs] Updated test report"
