version: "2"

run:
  timeout: 5m
  tests: false

linters:
  default: none
  enable:
    - cyclop
    - goconst
    - govet
    - staticcheck
    - unused
  disable:
    - wsl
  exclusions:
    paths:
      - vendor
      - bundle
      - config
      - hack
      - helpers
      - img
  settings:
    cyclop:
      max-complexity: 45
    goconst:
      min-len: 3
      min-occurrences: 10
    staticcheck:
      checks:
        - all
        - -ST1005
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
    unused:
      exported-fields-are-used: false

issues:
  max-issues-per-linter: 30
  max-same-issues: 5
