/apisix-etcd-1.apisix-etcd-headless:2379\n      - http://apisix-etcd-2.apisix-etcd-headless:2379\n    prefix: /apisix\n    timeout: 30\n    use_grpc: false\n    startup_retry: 60\n  certs:\n    cert: /bitnami/certs/tls.crt\n    cert_key: /bitnami/certs/tls.key\n    client_ca_cert: /bitnami/certs/ca.crt\n  admin:\n    https_admin: true\n    admin_api_mtls:\n      admin_ssl_cert: /bitnami/certs/tls.crt\n      admin_ssl_cert_key: /bitnami/certs/tls.key\n    allow_admin:\n      - 0.0.0.0/0\n    admin_key:\n      - name: admin\n        key: \"{{APISIX_ADMIN_API_TOKEN}}\"\n        role: admin\n      - name: viewer\n        key: \"{{APISIX_VIEWER_API_TOKEN}}\"\n        role: viewer\n    admin_listen:\n        port: 9180\n    enable_admin_cors: true         # Admin API support CORS response headers.\n    enable_admin_ui: true\ndiscovery:\n  kubernetes:\n    service:\n      schema: https #default https\n      # apiserver host, options [ipv4, ipv6, domain, environment variable]\n      host: ${KUBERNETES_SERVICE_HOST}\n      # apiserver port, options [port number, environment variable]\n      port: ${KUBERNETES_SERVICE_PORT}\n    client:\n      # serviceaccount token or token_file\n      token_file: /var/run/secrets/kubernetes.io/serviceaccount/token\n    default_weight: 50 # weight assigned to each discovered endpoint. default 50, minimum 0\n"}, "metadata": {"name": "apisix-control-plane-default", "labels": {"helm.sh/chart": "apisix-6.0.0", "app.kubernetes.io/name": "apisix", "app.kubernetes.io/part-of": "apisix", "app.kubernetes.io/version": "3.13.0", "app.kubernetes.io/instance": "apisix", "app.kubernetes.io/component": "control-plane", "app.kubernetes.io/managed-by": "Helm"}, "namespace": "default"}}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "7e462b9a-cf58-4564-bf57-15cf128cb099", "model": {"id": "b3f5bc0d-30f7-607d-6c73-784ddde6cad8", "name": "kubernetes", "model": {"version": "v1.32.0-alpha.3"}, "status": "enabled", "version": "v1.0.0", "category": {"id"