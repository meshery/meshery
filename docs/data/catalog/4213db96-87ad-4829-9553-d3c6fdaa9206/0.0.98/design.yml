tegy configures how the DNS01 provider should handle CNAME records when found in DNS zones."}}, "description": "Configures cert-manager to attempt to complete authorizations by performing the DNS01 challenge flow."}, "http01": {"type": "object", "properties": {"ingress": {"type": "object", "properties": {"name": {"type": "string", "description": "The name of the ingress resource that should have ACME challenge solving routes inserted into it in order to solve HTTP01 challenges. This is typically used in conjunction with ingress controllers like ingress-gce, which maintains a 1:1 mapping between external IPs and ingress resources. Only one of `class`, `name` or `ingressClassName` may be specified."}, "class": {"type": "string", "description": "This field configures the annotation `kubernetes.io/ingress.class` when creating Ingress resources to solve ACME challenges that use this challenge solver. Only one of `class`, `name` or `ingressClassName` may be specified."}, "podTemplate": {"type": "object", "properties": {"spec": {"type": "object", "properties": {"affinity": {"type": "object", "properties": {"podAffinity": {"type": "object", "properties": {"requiredDuringSchedulingIgnoredDuringExecution": {"type": "array", "items": {"type": "object", "required": ["topologyKey"], "properties": {"namespaces": {"type": "array", "items": {"type": "string"}, "description": "namespaces specifies a static list of namespace names that the term applies to. The term is applied to the union of the namespaces listed in this field and the ones selected by namespaceSelector. null or empty namespaces list and null namespaceSelector means \"this pod's namespace\"."}, "topologyKey": {"type": "string", "description": "This pod should be co-located (affinity) or not co-located (anti-affinity) with the pods matching the labelSelector in the specified namespaces, where co-located is defined as running on a node whose value of the label with key topologyKey matches that of any node on which any of the selected pods is running. Empty topologyKey is not allowed."}, "labelSelector": {"type": "object", "properties": {"matchLabels": {"type": "object", "description": "matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of matchExpressions, whose key field is \"key\", the operator is \"In\", and the values array contains only \"value\". The requirements are ANDed.", "additionalProperties": {"type": "string"}}, "matchExpressions": {"type": "array", "items": {"type": "object", "required": ["key", "operator"], "properties": {"key": {"type": "string", "description": "key is the label key that the selector applies to."}, "values": {"type": "array", "items": {"type": "string"}, "description": "values is an array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. This array is replaced during a strategic merge patch."}, "operator": {"type": "string", "description": "operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist."}}, "description": "A label selector requirement is a selector that contains values, a key, and an operator that relates the key and values."}, "description": "matchExpressions is a list of label selector requirements. The requirements are ANDed."}}, "description": "A label query over a set of resources, in this case pods. If it's null, this PodAffinityTerm matches with no Pods.", "x-kubernetes-map-type": "atomic"}, "matchLabelKeys": {"type": "array", "items": {"type": "string"}, "description": "MatchLabelKeys is a set of pod label keys to select which pods will be taken into consideration. The keys are used to lookup values from the incoming pod labels, those key-value labels are merged with `LabelSelector` as `key in (value)` to select the group of existing pods which pods will be taken into consideration for the incoming 