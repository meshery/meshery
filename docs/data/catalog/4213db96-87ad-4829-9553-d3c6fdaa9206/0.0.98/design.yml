elSelector": {"type": "object", "properties": {"matchLabels": {"type": "object", "description": "matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of matchExpressions, whose key field is \"key\", the operator is \"In\", and the values array contains only \"value\". The requirements are ANDed.", "additionalProperties": {"type": "string"}}, "matchExpressions": {"type": "array", "items": {"type": "object", "required": ["key", "operator"], "properties": {"key": {"type": "string", "description": "key is the label key that the selector applies to."}, "values": {"type": "array", "items": {"type": "string"}, "description": "values is an array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. This array is replaced during a strategic merge patch."}, "operator": {"type": "string", "description": "operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist."}}, "description": "A label selector requirement is a selector that contains values, a key, and an operator that relates the key and values."}, "description": "matchExpressions is a list of label selector requirements. The requirements are ANDed."}}, "description": "A label query over a set of resources, in this case pods. If it's null, this PodAffinityTerm matches with no Pods.", "x-kubernetes-map-type": "atomic"}, "matchLabelKeys": {"type": "array", "items": {"type": "string"}, "description": "MatchLabelKeys is a set of pod label keys to select which pods will be taken into consideration. The keys are used to lookup values from the incoming pod labels, those key-value labels are merged with `LabelSelector` as `key in (value)` to select the group of existing pods which pods will be taken into consideration for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming pod labe