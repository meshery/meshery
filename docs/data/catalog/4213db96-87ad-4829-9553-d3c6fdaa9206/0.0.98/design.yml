 representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"}, "spec": {"type": "object", "required": ["issuerRef", "request"], "properties": {"uid": {"type": "string", "description": "UID contains the uid of the user that created the CertificateRequest. Populated by the cert-manager webhook on creation and immutable."}, "isCA": {"type": "boolean", "description": "Requested basic constraints isCA value. Note that the issuer may choose to ignore the requested isCA value, just like any other requested attribute. \n NOTE: If the CSR in the `Request` field has a BasicConstraints extension, it must have the same isCA value as specified here. \n If true, this will automatically add the `cert sign` usage to the list of requested `usages`."}, "extra": {"type": "object", "description": "Extra contains extra attributes of the user that created the CertificateRequest. Populated by the cert-manager webhook on creation and immutable.", "additionalProperties": {"type": "array", "items": {"type": "string"}}}, "groups": {"type": "array", "items": {"type": "string"}, "description": "Groups contains group membership of the user that created the CertificateRequest. Populated by the cert-manager webhook on creation and immutable.", "x-kubernetes-list-type": "atomic"}, "usages": {"type": "array", "items": {"enum": ["signing", "digital signature", "content commitment", "key encipherment", "key agreement", "data encipherment", "cert sign", "crl sign", "encipher only", "decipher only", "any", "server auth", "client auth", "code signing", "email protection", "s/mime", "ipsec end system", "ipsec tunnel", "ipsec user", "timestamping", "ocsp signing", "microsoft sgc", "netscape sgc"], "type": "string", "description": "KeyUsage specifies valid usage contexts for keys. See: https://tools.ietf.org/html/rfc5280#section-4.2.1.3 https://tools.ietf.org/html/rfc5280#section-4.2.1.12 \n Valid KeyUsage values are as follows: \"signing\", \"digital signature\", \"content commitment\", \"key encipherment\", \"key agreement\", \"data encipherment\", \"cert sign\", \"crl sign\", \"encipher only\", \"decipher only\", \"any\", \"server auth\", \"client auth\", \"code signing\", \"email protection\", \"s/mime\", \"ipsec end system\", \"ipsec tunnel\", \"ipsec user\", \"timestamping\", \"ocsp signing\", \"microsoft sgc\", \"netscape sgc\""}, "description": "Requested key usages and extended key usages. \n NOTE: If the CSR in the `Request` field has uses the KeyUsage or ExtKeyUsage extension, these extensions must have the same values as specified here without any additional values. \n If unset, defaults to `digital signature` and `key encipherment`."}, "request": {"type": "string", "format": "byte", "description": "The PEM-encoded X.509 certificate signing request to be submitted to the issuer for signing. \n If the CSR has a BasicConstraints extension, its isCA attribute must match the `isCA` value of this CertificateRequest. If the CSR has a KeyUsage extension, its key usages must match the key usages in the `usages` field of this CertificateRequest. If the CSR has a ExtKeyUsage extension, its extended key usages must match the extended key usages in the `usages` field of this CertificateRequest."}, "duration": {"type": "string", "description": "Requested 'duration' (i.e. lifetime) of the Certificate. Note that the issuer may choose to ignore the requested duration, just like any other requested attribute."}, "username": {"type": "string", "description": "Username contains the name of the user that created the CertificateRequest. Populated by the cert-manager webhook on creation and immutable."}, "issuerRef": {"type": "object", "required": ["name"], "properties": {"kind": {"type": "string", "description": "Kind of the resource being referred to."}, "name": {"type": "string", "description": "Name of the resource being referred to."}, "group": {"type": "string", "description": "Group of the resource being referred to."}}, "description": "Reference to the issuer responsible for issuing the certificate. If the issuer is namespace-scoped, it must be in the same namespace as the Certificate. If the issuer is cluster-scoped, it can be used from any namespace. \n The `name` field of the reference must always be specified."}}, "description": "Specification of the desired state of the CertificateRequest resource. https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status"}, "status": {"type": "object", "properties": {"ca": {"type": "string", "format": "byte", "description": "The PEM encoded X.509 certificate of the signer, also known as the CA (Certificate Authority). This is set on a best-effort basis by different issuers. If not set, the CA is assumed to be unknown/not available."}, "conditions": {"type": "array", "items": {"type": "object", "required": ["status", "type"], "properties": {"type": {"type": "string", "description": "Type of the condition, known values are (`Ready`, `InvalidRequest`, `Approved`, `Denied`)."}, "reason": {"type": "string", "description": "Reason is a brief machine readable explanation for the condition's last transition."}, "status": {"enum": ["True", "False", "Unknown"], "type": "string", "description": "Status of the condition, one of (`True`, `False`, `Unknown`)."}, "message": {"type": "string", "description": "Message is a human readable description of the details of the last transition, complementing reason."}, "lastTransitionTime": {"type": "string", "format": "date-time", "description": "LastTransitionTime is the timestamp corresponding to the last status change of this condition."}}, "description": "CertificateRequestCondition contains condition information for a CertificateRequest."}, "description": "List of status conditions to indicate the status of a CertificateRequest. Known condition types are `Ready`, `InvalidRequest`, `Approved` and `Denied`.", "x-kubernetes-list-type": "map", "x-kubernetes-list-map-keys": ["type"]}, "certificate": {"type": "string", "format": "byte", "description": "The PEM encoded X.509 certificate resulting from the certificate signing request. If not set, the CertificateRequest has either not been completed or has failed. More information on failure can be found by checking the `conditions` field."}, "failureTime": {"type": "string", "format": "date-time", "description": "FailureTime stores the time that this CertificateRequest failed. This is used to influence garbage collection and back-off."}}, "description": "Status of the CertificateRequest. This is set and managed automatically. Read-only. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status"}, "metadata": {"type": "object"}, "apiVersion": {"type": "string", "description": "APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources"}}, "description": "A CertificateRequest is used to request a signed certificate from one of the configured issuers. \n All fields within the CertificateRequest's `spec` are immutable after creation. A CertificateRequest will either succeed or fail, as denoted by its `Ready` status condition and its `status.failureTime` field. \n A CertificateRequest is a one-shot resource, meaning it represents a single point in time request for a certificate and cannot be re-used."}}, "served": true, "storage": true, "subresources": {"status": {}}, "additionalPrinterColumns": [{"name": "Approved", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Approved\")].status"}, {"name": "Denied", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Denied\")].status"}, {"name": "Ready", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Ready\")].status"}, {"name": "Issuer", "type": "string", "jsonPath": ".spec.issuerRef.name"}, {"name": "Requestor", "type": "string", "jsonPath": ".spec.username"}, {"name": "Status", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Ready\")].message", "priority": 1}, {"name": "Age", "type": "date", "jsonPath": ".metadata.creationTimestamp", "description": "CreationTimestamp is a timestamp representing the server time when this object was created. It is not guaranteed to be set in happens-before order across separate operations. Clients may not set this value. It is represented in RFC3339 form and is in UTC."}]}]}, "metadata": {"name": "certificaterequests.cert-manager.io", "labels": {"app": "cert-manager", "app.kubernetes.io/name": "cert-manager", "app.kubernetes.io/version": "v1.14.1", "app.kubernetes.io/instance": "cert-manager"}}}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "bd0f2d48-13a7-42dc-9e48-136a9c02fd45", "model": {"id": "e633cca6-b6e1-65bf-a440-0d58915e75dd", "name": "kubernetes", "model": {"version": "v1.32.0-alpha.3"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/kubernetes-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/kubernetes-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0", "styleOverrides": ""}, "components": null, "registrant": {"id": "f9a29d70-c287-426c-a90c-2a96590c8083", "kind": "github", "name": "Github", "type": "registry", "status": "registered", "user_id": "00000000-0000-0000-0000-000000000000", "sub_type": "", "created_at": "2025-06-22T05:56:58.393994634Z", "deleted_at": "0001-01-01T00:00:00Z", "updated_at": "2025-06-22T05:56:58.393994634Z", "credential_id": "00000000-0000-0000-0000-000000000000"}, "displayName": "Kubernetes", "subCategory": "Scheduling & Orchestration", "connection_id": "f9a29d70-c287-426c-a90c-2a96590c8083", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "", "status": "enabled", "styles": {"shape": "circle", "z-index": 6, "position": {"x": 443.25, "y": 562.9114685058594}, "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/customresourcedefinition-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/customresourcedefinition-white.svg", "svgComplete": "", "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "source_uri": "git://github.com/kubernetes/kubernetes/master/api/openapi-spec/v3", "isAnnotation": false, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "CustomResourceDefinition", "schema": "", "version": "apiextensions.k8s.io/v1"}, "description": "", "displayName": "certificates.cert-manager.io", "capabilities": [], "configuration": {"spec": {"group": "cert-manager.io", "names": {"kind": "Certificate", "plural": "certificates", "listKind": "CertificateList", "singular": "certificate", "categories": ["cert-manager"], "shortNames": ["cert", "certs"]}, "scope": "Namespaced", "versions": [{"name": "v1", "schema": {"openAPIV3Schema": {"type": "object", "properties": {"kind": {"type": "string", "description": "Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"}, "spec": {"type": "object", "required": ["issuerRef", "secretName"], "properties": {"isCA": {"type": "boolean", "description": "Requested basic constraints isCA value. The isCA value is used to set the `isCA` field on the created CertificateRequest resources. Note that the issuer may choose to ignore the requested isCA value, just like any other requested attribute. \n If true, this will automatically add the `cert sign` usage to the list of requested `usages`."}, "uris": {"type": "array", "items": {"type": "string"}, "description": "Requested URI subject alternative names."}, "usages": {"type": "array", "items": {"enum": ["signing", "digital signature", "content commitment", "key encipherment", "key agreement", "data encipherment", "cert sign", "crl sign", "encipher only", "decipher only", "any", "server auth", "client auth", "code signing", "email protection", "s/mime", "ipsec end system", "ipsec tunnel", "ipsec user", "timestamping", "ocsp signing", "microsoft sgc", "netscape sgc"], "type": "string", "description": "KeyUsage specifies valid usage contexts for keys. See: https://tools.ietf.org/html/rfc5280#section-4.2.1.3 https://tools.ietf.org/html/rfc5280#section-4.2.1.12 \n Valid KeyUsage values are as follows: \"signing\", \"digital signature\", \"content commitment\", \"key encipherment\", \"key agreement\", \"data encipherment\", \"cert sign\", \"crl sign\", \"encipher only\", \"decipher only\", \"any\", \"server auth\", \"client auth\", \"code signing\", \"email protection\", \"s/mime\", \"ipsec end system\", \"ipsec tunnel\", \"ipsec user\", \"timestamping\", \"ocsp signing\", \"microsoft sgc\", \"netscape sgc\""}, "description": "Requested key usages and extended key usages. These usages are used to set the `usages` field on the created CertificateRequest resources. If `encodeUsagesInRequest` is unset or set to `true`, the usages will additionally be encoded in the `request` field which contains the CSR blob. \n If unset, defaults to `digital signature` and `key encipherment`."}, "subject": {"type": "object", "properties": {"countries": {"type": "array", "items": {"type": "string"}, "description": "Countries to be used on the Certificate."}, "provinces": {"type": "array", "items": {"type": "string"}, "description": "State/Provinces to be used on the Certificate."}, "localities": {"type": "array", "items": {"type": "string"}, "description": "Cities to be used on the Certificate."}, "postalCodes": {"type": "array", "items": {"type": "string"}, "description": "Postal codes to be used on the Certificate."}, "serialNumber": {"type": "string", "description": "Serial number to be used on the Certificate."}, "organizations": {"type": "array", "items": {"type": "string"}, "description": "Organizations to be used on the Certificate."}, "streetAddresses": {"type": "array", "items": {"type": "string"}, "description": "Street addresses to be used on the Certificate."}, "organizationalUnits": {"type": "array", "items": {"type": "string"}, "description": "Organizational Units to be used on the Certificate."}}, "description": "Requested set of X509 certificate subject attributes. More info: https://datatracker.ietf.org/doc/html/rfc5280#section-4.1.2.6 \n The common name attribute is specified separately in the `commonName` field. Cannot be set if the `literalSubject` field is set."}, "dnsNames": {"type": "array", "items": {"type": "string"}, "description": "Requested DNS subject alternative names."}, "duration": {"type": "string", "description": "Requested 'duration' (i.e. lifetime) of the Certificate. Note that the issuer may choose to ignore the requested duration, just like any other requested attribute. \n If unset, this defaults to 90 days. Minimum accepted duration is 1 hour. Value must be in units accepted by Go time.ParseDuration https://golang.org/pkg/time/#ParseDuration."}, "issuerRef": {"type": "object", "required": ["name"], "properties": {"kind": {"type": "string", "description": "Kind of the resource being referred to."}, "name": {"type": "string", "description": "Name of the resource being referred to."}, "group": {"type": "string", "description": "Group of the resource being referred to."}}, "description": "Reference to the issuer responsible for issuing the certificate. If the issuer is namespace-scoped, it must be in the same namespace as the Certificate. If the issuer is cluster-scoped, it can be used from any namespace. \n The `name` field of the reference must always be specified."}, "keystores": {"type": "object", "properties": {"jks": {"type": "object", "required": ["create", "passwordSecretRef"], "properties": {"create": {"type": "boolean", "description": "Create enables JKS keystore creation for the Certificate. If true, a file named `keystore.jks` will be created in the target Secret resource, encrypted using the password stored in `passwordSecretRef`. The keystore file will be updated immediately. If the issuer provided a CA certificate, a file named `truststore.jks` will also be created in the target Secret resource, encrypted using the password stored in `passwordSecretRef` containing the issuing Certificate Authority"}, "passwordSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "PasswordSecretRef is a reference to a key in a Secret resource containing the password used to encrypt the JKS keystore."}}, "description": "JKS configures options for storing a JKS keystore in the `spec.secretName` Secret resource."}, "pkcs12": {"type": "object", "required": ["create", "passwordSecretRef"], "properties": {"create": {"type": "boolean", "description": "Create enables PKCS12 keystore creation for the Certificate. If true, a file named `keystore.p12` will be created in the target Secret resource, encrypted using the password stored in `passwordSecretRef`. The keystore file will be updated immediately. If the issuer provided a CA certificate, a file named `truststore.p12` will also be created in the target Secret resource, encrypted using the password stored in `passwordSecretRef` containing the issuing Certificate Authority"}, "profile": {"enum": ["LegacyRC2", "LegacyDES", "Modern2023"], "type": "string", "description": "Profile specifies the key and certificate encryption algorithms and the HMAC algorithm used to create the PKCS12 keystore. Default value is `LegacyRC2` for backward compatibility. \n If provided, allowed values are: `LegacyRC2`: Deprecated. Not supported by default in OpenSSL 3 or Java 20. `LegacyDES`: Less secure algorithm. Use this option for maximal compatibility. `Modern2023`: Secure algorithm. Use this option in case you have to always use secure algorithms (eg. because of company policy). Please note that the security of the algorithm is not that important in reality, because the unencrypted certificate and private key are also stored in the Secret."}, "passwordSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "PasswordSecretRef is a reference to a key in a Secret resource containing the password used to encrypt the PKCS12 keystore."}}, "description": "PKCS12 configures options for storing a PKCS12 keystore in the `spec.secretName` Secret resource."}}, "description": "Additional keystore output formats to be stored in the Certificate's Secret."}, "commonName": {"type": "string", "description": "Requested common name X509 certificate subject attribute. More info: https://datatracker.ietf.org/doc/html/rfc5280#section-4.1.2.6 NOTE: TLS clients will ignore this value when any subject alternative name is set (see https://tools.ietf.org/html/rfc6125#section-6.4.4). \n Should have a length of 64 characters or fewer to avoid generating invalid CSRs. Cannot be set if the `literalSubject` field is set."}, "otherNames": {"type": "array", "items": {"type": "object", "properties": {"oid": {"type": "string", "description": "OID is the object identifier for the otherName SAN. The object identifier must be expressed as a dotted string, for example, \"1.2.840.113556.1.4.221\"."}, "utf8Value": {"type": "string", "description": "utf8Value is the string value of the otherName SAN. The utf8Value accepts any valid UTF8 string to set as value for the otherName SAN."}}}, "description": "`otherNames` is an escape hatch for SAN that allows any type. We currently restrict the support to string like otherNames, cf RFC 5280 p 37 Any UTF8 String valued otherName can be passed with by setting the keys oid: x.x.x.x and UTF8Value: somevalue for `otherName`. Most commonly this would be UPN set with oid: 1.3.6.1.4.1.311.20.2.3 You should ensure that any OID passed is valid for the UTF8String type as we do not explicitly validate this."}, "privateKey": {"type": "object", "properties": {"size": {"type": "integer", "description": "Size is the key bit size of the corresponding private key for this certificate. \n If `algorithm` is set to `RSA`, valid values are `2048`, `4096` or `8192`, and will default to `2048` if not specified. If `algorithm` is set to `ECDSA`, valid values are `256`, `384` or `521`, and will default to `256` if not specified. If `algorithm` is set to `Ed25519`, Size is ignored. No other values are allowed."}, "encoding": {"enum": ["PKCS1", "PKCS8"], "type": "string", "description": "The private key cryptography standards (PKCS) encoding for this certificate's private key to be encoded in. \n If provided, allowed values are `PKCS1` and `PKCS8` standing for PKCS#1 and PKCS#8, respectively. Defaults to `PKCS1` if not specified."}, "algorithm": {"enum": ["RSA", "ECDSA", "Ed25519"], "type": "string", "description": "Algorithm is the private key algorithm of the corresponding private key for this certificate. \n If provided, allowed values are either `RSA`, `ECDSA` or `Ed25519`. If `algorithm` is specified and `size` is not provided, key size of 2048 will be used for `RSA` key algorithm and key size of 256 will be used for `ECDSA` key algorithm. key size is ignored when using the `Ed25519` key algorithm."}, "rotationPolicy": {"enum": ["Never", "Always"], "type": "string", "description": "RotationPolicy controls how private keys should be regenerated when a re-issuance is being processed. \n If set to `Never`, a private key will only be generated if one does not already exist in the target `spec.secretName`. If one does exists but it does not have the correct algorithm or size, a warning will be raised to await user intervention. If set to `Always`, a private key matching the specified requirements will be generated whenever a re-issuance occurs. Default is `Never` for backward compatibility."}}, "description": "Private key options. These include the key algorithm and size, the used encoding and the rotation policy."}, "secretName": {"type": "string", "description": "Name of the Secret resource that will be automatically created and managed by this Certificate resource. It will be populated with a private key and certificate, signed by the denoted issuer. The Secret resource lives in the same namespace as the Certificate resource."}, "ipAddresses": {"type": "array", "items": {"type": "string"}, "description": "Requested IP address subject alternative names."}, "renewBefore": {"type": "string", "description": "How long before the currently issued certificate's expiry cert-manager should renew the certificate. For example, if a certificate is valid for 60 minutes, and `renewBefore=10m`, cert-manager will begin to attempt to renew the certificate 50 minutes after it was issued (i.e. when there are 10 minutes remaining until the certificate is no longer valid). \n NOTE: The actual lifetime of the issued certificate is used to determine the renewal time. If an issuer returns a certificate with a different lifetime than the one requested, cert-manager will use the lifetime of the issued certificate. \n If unset, this defaults to 1/3 of the issued certificate's lifetime. Minimum accepted value is 5 minutes. Value must be in units accepted by Go time.ParseDuration https://golang.org/pkg/time/#ParseDuration."}, "emailAddresses": {"type": "array", "items": {"type": "string"}, "description": "Requested email subject alternative names."}, "literalSubject": {"type": "string", "description": "Requested X.509 certificate subject, represented using the LDAP \"String Representation of a Distinguished Name\" [1]. Important: the LDAP string format also specifies the order of the attributes in the subject, this is important when issuing certs for LDAP authentication. Example: `CN=foo,DC=corp,DC=example,DC=com` More info [1]: https://datatracker.ietf.org/doc/html/rfc4514 More info: https://github.com/cert-manager/cert-manager/issues/3203 More info: https://github.com/cert-manager/cert-manager/issues/4424 \n Cannot be set if the `subject` or `commonName` field is set. This is an Alpha Feature and is only enabled with the `--feature-gates=LiteralCertificateSubject=true` option set on both the controller and webhook components."}, "secretTemplate": {"type": "object", "properties": {"labels": {"type": "object", "description": "Labels is a key value map to be copied to the target Kubernetes Secret.", "additionalProperties": {"type": "string"}}, "annotations": {"type": "object", "description": "Annotations is a key value map to be copied to the target Kubernetes Secret.", "additionalProperties": {"type": "string"}}}, "description": "Defines annotations and labels to be copied to the Certificate's Secret. Labels and annotations on the Secret will be changed as they appear on the SecretTemplate when added or removed. SecretTemplate annotations are added in conjunction with, and cannot overwrite, the base set of annotations cert-manager sets on the Certificate's Secret."}, "nameConstraints": {"type": "object", "properties": {"critical": {"type": "boolean", "description": "if true then the name constraints are marked critical."}, "excluded": {"type": "object", "properties": {"ipRanges": {"type": "array", "items": {"type": "string"}, "description": "IPRanges is a list of IP Ranges that are permitted or excluded. This should be a valid CIDR notation."}, "dnsDomains": {"type": "array", "items": {"type": "string"}, "description": "DNSDomains is a list of DNS domains that are permitted or excluded."}, "uriDomains": {"type": "array", "items": {"type": "string"}, "description": "URIDomains is a list of URI domains that are permitted or excluded."}, "emailAddresses": {"type": "array", "items": {"type": "string"}, "description": "EmailAddresses is a list of Email Addresses that are permitted or excluded."}}, "description": "Excluded contains the constraints which must be disallowed. Any name matching a restriction in the excluded field is invalid regardless of information appearing in the permitted"}, "permitted": {"type": "object", "properties": {"ipRanges": {"type": "array", "items": {"type": "string"}, "description": "IPRanges is a list of IP Ranges that are permitted or excluded. This should be a valid CIDR notation."}, "dnsDomains": {"type": "array", "items": {"type": "string"}, "description": "DNSDomains is a list of DNS domains that are permitted or excluded."}, "uriDomains": {"type": "array", "items": {"type": "string"}, "description": "URIDomains is a list of URI domains that are permitted or excluded."}, "emailAddresses": {"type": "array", "items": {"type": "string"}, "description": "EmailAddresses is a list of Email Addresses that are permitted or excluded."}}, "description": "Permitted contains the constraints in which the names must be located."}}, "description": "x.509 certificate NameConstraint extension which MUST NOT be used in a non-CA certificate. More Info: https://datatracker.ietf.org/doc/html/rfc5280#section-4.2.1.10 \n This is an Alpha Feature and is only enabled with the `--feature-gates=NameConstraints=true` option set on both the controller and webhook components."}, "revisionHistoryLimit": {"type": "integer", "format": "int32", "description": "The maximum number of CertificateRequest revisions that are maintained in the Certificate's history. Each revision represents a single `CertificateRequest` created by this Certificate, either when it was created, renewed, or Spec was changed. Revisions will be removed by oldest first if the number of revisions exceeds this number. \n If set, revisionHistoryLimit must be a value of `1` or greater. If unset (`nil`), revisions will not be garbage collected. Default value is `nil`."}, "encodeUsagesInRequest": {"type": "boolean", "description": "Whether the KeyUsage and ExtKeyUsage extensions should be set in the encoded CSR. \n This option defaults to true, and should only be disabled if the target issuer does not support CSRs with these X509 KeyUsage/ ExtKeyUsage extensions."}, "additionalOutputFormats": {"type": "array", "items": {"type": "object", "required": ["type"], "properties": {"type": {"enum": ["DER", "CombinedPEM"], "type": "string", "description": "Type is the name of the format type that should be written to the Certificate's target Secret."}}, "description": "CertificateAdditionalOutputFormat defines an additional output format of a Certificate resource. These contain supplementary data formats of the signed certificate chain and paired private key."}, "description": "Defines extra output formats of the private key and signed certificate chain to be written to this Certificate's target Secret. \n This is an Alpha Feature and is only enabled with the `--feature-gates=AdditionalCertificateOutputFormats=true` option set on both the controller and webhook components."}}, "description": "Specification of the desired state of the Certificate resource. https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status"}, "status": {"type": "object", "properties": {"notAfter": {"type": "string", "format": "date-time", "description": "The expiration time of the certificate stored in the secret named by this resource in `spec.secretName`."}, "revision": {"type": "integer", "description": "The current 'revision' of the certificate as issued. \n When a CertificateRequest resource is created, it will have the `cert-manager.io/certificate-revision` set to one greater than the current value of this field. \n Upon issuance, this field will be set to the value of the annotation on the CertificateRequest resource used to issue the certificate. \n Persisting the value on the CertificateRequest resource allows the certificates controller to know whether a request is part of an old issuance or if it is part of the ongoing revision's issuance by checking if the revision value in the annotation is greater than this field."}, "notBefore": {"type": "string", "format": "date-time", "description": "The time after which the certificate stored in the secret named by this resource in `spec.secretName` is valid."}, "conditions": {"type": "array", "items": {"type": "object", "required": ["status", "type"], "properties": {"type": {"type": "string", "description": "Type of the condition, known values are (`Ready`, `Issuing`)."}, "reason": {"type": "string", "description": "Reason is a brief machine readable explanation for the condition's last transition."}, "status": {"enum": ["True", "False", "Unknown"], "type": "string", "description": "Status of the condition, one of (`True`, `False`, `Unknown`)."}, "message": {"type": "string", "description": "Message is a human readable description of the details of the last transition, complementing reason."}, "lastTransitionTime": {"type": "string", "format": "date-time", "description": "LastTransitionTime is the timestamp corresponding to the last status change of this condition."}, "observedGeneration": {"type": "integer", "format": "int64", "description": "If set, this represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.condition[x].observedGeneration is 9, the condition is out of date with respect to the current state of the Certificate."}}, "description": "CertificateCondition contains condition information for an Certificate."}, "description": "List of status conditions to indicate the status of certificates. Known condition types are `Ready` and `Issuing`.", "x-kubernetes-list-type": "map", "x-kubernetes-list-map-keys": ["type"]}, "renewalTime": {"type": "string", "format": "date-time", "description": "RenewalTime is the time at which the certificate will be next renewed. If not set, no upcoming renewal is scheduled."}, "lastFailureTime": {"type": "string", "format": "date-time", "description": "LastFailureTime is set only if the lastest issuance for this Certificate failed and contains the time of the failure. If an issuance has failed, the delay till the next issuance will be calculated using formula time.Hour * 2 ^ (failedIssuanceAttempts - 1). If the latest issuance has succeeded this field will be unset."}, "failedIssuanceAttempts": {"type": "integer", "description": "The number of continuous failed issuance attempts up till now. This field gets removed (if set) on a successful issuance and gets set to 1 if unset and an issuance has failed. If an issuance has failed, the delay till the next issuance will be calculated using formula time.Hour * 2 ^ (failedIssuanceAttempts - 1)."}, "nextPrivateKeySecretName": {"type": "string", "description": "The name of the Secret resource containing the private key to be used for the next certificate iteration. The keymanager controller will automatically set this field if the `Issuing` condition is set to `True`. It will automatically unset this field when the Issuing condition is not set or False."}}, "description": "Status of the Certificate. This is set and managed automatically. Read-only. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status"}, "metadata": {"type": "object"}, "apiVersion": {"type": "string", "description": "APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources"}}, "description": "A Certificate resource should be created to ensure an up to date and signed X.509 certificate is stored in the Kubernetes Secret resource named in `spec.secretName`. \n The stored certificate will be renewed before it expires (as configured by `spec.renewBefore`)."}}, "served": true, "storage": true, "subresources": {"status": {}}, "additionalPrinterColumns": [{"name": "Ready", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Ready\")].status"}, {"name": "Secret", "type": "string", "jsonPath": ".spec.secretName"}, {"name": "Issuer", "type": "string", "jsonPath": ".spec.issuerRef.name", "priority": 1}, {"name": "Status", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Ready\")].message", "priority": 1}, {"name": "Age", "type": "date", "jsonPath": ".metadata.creationTimestamp", "description": "CreationTimestamp is a timestamp representing the server time when this object was created. It is not guaranteed to be set in happens-before order across separate operations. Clients may not set this value. It is represented in RFC3339 form and is in UTC."}]}]}, "metadata": {"name": "certificates.cert-manager.io", "labels": {"app": "cert-manager