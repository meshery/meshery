: {"type": "object", "description": "Annotations that should be added to the create ACME HTTP01 solver pods.", "additionalProperties": {"type": "string"}}}, "description": "ObjectMeta overrides for the pod used to solve HTTP01 challenges. Only the 'labels' and 'annotations' fields may be set. If labels or annotations overlap with in-built values, the values here will override the in-built values."}}, "description": "Optional pod template used to configure the ACME challenge solver pods used for HTTP01 challenges."}, "serviceType": {"type": "string", "description": "Optional service type for Kubernetes solver service. Supported values are NodePort or ClusterIP. If unset, defaults to NodePort."}, "ingressTemplate": {"type": "object", "properties": {"metadata": {"type": "object", "properties": {"labels": {"type": "object", "description": "Labels that should be added to the created ACME HTTP01 solver ingress.", "additionalProperties": {"type": "string"}}, "annotations": {"type": "object", "description": "Annotations that should be added to the created ACME HTTP01 solver ingress.", "additionalProperties": {"type": "string"}}}, "description": "ObjectMeta overrides for the ingress used to solve HTTP01 challenges. Only the 'labels' and 'annotations' fields may be set. If labels or annotations overlap with in-built values, the values here will override the in-built values."}}, "description": "Optional ingress template used to configure the ACME challenge solver ingress used for HTTP01 challenges."}, "ingressClassName": {"type": "string", "description": "This field configures the field `ingressClassName` on the created Ingress resources used to solve ACME challenges that use this challenge solver. This is the recommended way of configuring the ingress class. Only one of `class`, `name` or `ingressClassName` may be specified."}}, "description": "The ingress based HTTP01 challenge solver will solve challenges by creating or modifying Ingress resources in order to route requests for '/.well-known/acme-challenge/XYZ' to 'challenge solver' pods that are provisioned by cert-manager for each Challenge to be completed."}, "gatewayHTTPRoute": {"type": "object", "properties": {"labels": {"type": "object", "description": "Custom labels that will be applied to HTTPRoutes created by cert-manager while solving HTTP-01 challenges.", "additionalProperties": {"type": "string"}}, "parentRefs": {"type": "array", "items": {"type": "object", "required": ["name"], "properties": {"kind": {"type": "string", "default": "Gateway", "pattern": "^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$", "maxLength": 63, "minLength": 1, "description": "Kind is kind of the referent. \n There are two kinds of parent resources with \"Core\" support: \n * Gateway (Gateway conformance profile) * Service (Mesh conformance profile, experimental, ClusterIP Services only) \n Support for other resources is Implementation-Specific."}, "name": {"type": "string", "maxLength": 253, "minLength": 1, "description": "Name is the name of the referent. \n Support: Core"}, "port": {"type": "integer", "format": "int32", "maximum": 65535, "minimum": 1, "description": "Port is the network port this Route targets. It can be interpreted differently based on the type of parent resource. \n When the parent resource is a Gateway, this targets all listeners listening on the specified port that also support this kind of Route(and select this Route). It's not recommended to set `Port` unless the networking behaviors specified in a Route must apply to a specific port as opposed to a listener(s) whose port(s) may be changed. When both Port and SectionName are specified, the name and port of the selected listener must match both specified values. \n <gateway:experimental:description> When the parent resource is a Service, this targets a specific port in the Service spec. When both Port (experimental) and SectionName are specified, the name and port of the selected port must match both specified values. </gateway:experimental:description> \n Implementations MAY choose to support other parent resources. Implementations supporting other types of parent resources MUST clearly document how/if Port is interpreted. \n For the purpose of status, an attachment is considered successful as long as the parent resource accepts it partially. For example, Gateway listeners can restrict which Routes can attach to them by Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway. \n Support: Extended \n <gateway:experimental>"}, "group": {"type": "string", "default": "gateway.networking.k8s.io", "pattern": "^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$", "maxLength": 253, "description": "Group is the group of the referent. When unspecified, \"gateway.networking.k8s.io\" is inferred. To set the core API group (such as for a \"Service\" kind referent), Group must be explicitly set to \"\" (empty string). \n Support: Core"}, "namespace": {"type": "string", "pattern": "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$", "maxLength": 63, "minLength": 1, "description": "Namespace is the namespace of the referent. When unspecified, this refers to the local namespace of the Route. \n Note that there are specific rules for ParentRefs which cross namespace boundaries. Cross-namespace references are only valid if they are explicitly allowed by something in the namespace they are referring to. For example: Gateway has the AllowedRoutes field, and ReferenceGrant provides a generic way to enable any other kind of cross-namespace reference. \n <gateway:experimental:description> ParentRefs from a Route to a Service in the same namespace are \"producer\" routes, which apply default routing rules to inbound connections from any namespace to the Service. \n ParentRefs from a Route to a Service in a different namespace are \"consumer\" routes, and these routing rules are only applied to outbound connections originating from the same namespace as the Route, for which the intended destination of the connections are a Service targeted as a ParentRef of the Route. </gateway:experimental:description> \n Support: Core"}, "sectionName": {"type": "string", "pattern": "^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$", "maxLength": 253, "minLength": 1, "description": "SectionName is the name of a section within the target resource. In the following resources, SectionName is interpreted as the following: \n * Gateway: Listener Name. When both Port (experimental) and SectionName are specified, the name and port of the selected listener must match both specified values. * Service: Port Name. When both Port (experimental) and SectionName are specified, the name and port of the selected listener must match both specified values. Note that attaching Routes to Services as Parents is part of experimental Mesh support and is not supported for any other purpose. \n Implementations MAY choose to support attaching Routes to other resources. If that is the case, they MUST clearly document how SectionName is interpreted. \n When unspecified (empty string), this will reference the entire resource. For the purpose of status, an attachment is considered successful if at least one section in the parent resource accepts it. For example, Gateway listeners can restrict which Routes can attach to them by Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway. \n Support: Core"}}, "description": "ParentReference identifies an API object (usually a Gateway) that can be considered a parent of this resource (usually a route). There are two kinds of parent resources with \"Core\" support: \n * Gateway (Gateway conformance profile) * Service (Mesh conformance profile, experimental, ClusterIP Services only) \n This API may be extended in the future to support additional kinds of parent resources. \n The API object must be valid in the cluster; the Group and Kind must be registered in the cluster for this reference to be valid."}, "description": "When solving an HTTP-01 challenge, cert-manager creates an HTTPRoute. cert-manager needs to know which parentRefs should be used when creating the HTTPRoute. Usually, the parentRef references a Gateway. See: https://gateway-api.sigs.k8s.io/api-types/httproute/#attaching-to-gateways"}, "serviceType": {"type": "string", "description": "Optional service type for Kubernetes solver service. Supported values are NodePort or ClusterIP. If unset, defaults to NodePort."}}, "description": "The Gateway API is a sig-network community API that models service networking in Kubernetes (https://gateway-api.sigs.k8s.io/). The Gateway solver will create HTTPRoutes with the specified labels in the same namespace as the challenge. This solver is experimental, and fields / behaviour may change in the future."}}, "description": "Configures cert-manager to attempt to complete authorizations by performing the HTTP01 challenge flow. It is not possible to obtain certificates for wildcard domain names (e.g. `*.example.com`) using the HTTP01 challenge mechanism."}, "selector": {"type": "object", "properties": {"dnsNames": {"type": "array", "items": {"type": "string"}, "description": "List of DNSNames that this solver will be used to solve. If specified and a match is found, a dnsNames selector will take precedence over a dnsZones selector. If multiple solvers match with the same dnsNames value, the solver with the most matching labels in matchLabels will be selected. If neither has more matches, the solver defined earlier in the list will be selected."}, "dnsZones": {"type": "array", "items": {"type": "string"}, "description": "List of DNSZones that this solver will be used to solve. The most specific DNS zone match specified here will take precedence over other DNS zone matches, so a solver specifying sys.example.com will be selected over one specifying example.com for the domain www.sys.example.com. If multiple solvers match with the same dnsZones value, the solver with the most matching labels in matchLabels will be selected. If neither has more matches, the solver defined earlier in the list will be selected."}, "matchLabels": {"type": "object", "description": "A label selector that is used to refine the set of certificate's that this challenge solver will apply to.", "additionalProperties": {"type": "string"}}}, "description": "Selector selects a set of DNSNames on the Certificate resource that should be solved using this challenge solver. If not specified, the solver will be treated as the 'default' solver with the lowest priority, i.e. if any other solver has a more specific match, it will be used instead."}}, "description": "Contains the domain solving configuration that should be used to solve this challenge resource."}, "dnsName": {"type": "string", "description": "dnsName is the identifier that this challenge is for, e.g. example.com. If the requested DNSName is a 'wildcard', this field MUST be set to the non-wildcard domain, e.g. for `*.example.com`, it must be `example.com`."}, "wildcard": {"type": "boolean", "description": "wildcard will be true if this challenge is for a wildcard identifier, for example '*.example.com'."}, "issuerRef": {"type": "object", "required": ["name"], "properties": {"kind": {"type": "string", "description": "Kind of the resource being referred to."}, "name": {"type": "string", "description": "Name of the resource being referred to."}, "group": {"type": "string", "description": "Group of the resource being referred to."}}, "description": "References a properly configured ACME-type Issuer which should be used to create this Challenge. If the Issuer does not exist, processing will be retried. If the Issuer is not an 'ACME' Issuer, an error will be returned and the Challenge will be marked as failed."}, "authorizationURL": {"type": "string", "description": "The URL to the ACME Authorization resource that this challenge is a part of."}}}, "status": {"type": "object", "properties": {"state": {"enum": ["valid", "ready", "pending", "processing", "invalid", "expired", "errored"], "type": "string", "description": "Contains the current 'state' of the challenge. If not set, the state of the challenge is unknown."}, "reason": {"type": "string", "description": "Contains human readable information on why the Challenge is in the current state."}, "presented": {"type": "boolean", "description": "presented will be set to true if the challenge values for this challenge are currently 'presented'. This *does not* imply the self check is passing. Only that the values have been 'submitted' for the appropriate challenge mechanism (i.e. the DNS01 TXT record has been presented, or the HTTP01 configuration has been configured)."}, "processing": {"type": "boolean", "description": "Used to denote whether this challenge should be processed or not. This field will only be set to true by the 'scheduling' component. It will only be set to false by the 'challenges' controller, after the challenge has reached a final state or timed out. If this field is set to false, the challenge controller will not take any more action."}}}, "metadata": {"type": "object"}, "apiVersion": {"type": "string", "description": "APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources"}}, "description": "Challenge is a type to represent a Challenge request with an ACME server"}}, "served": true, "storage": true, "subresources": {"status": {}}, "additionalPrinterColumns": [{"name": "State", "type": "string", "jsonPath": ".status.state"}, {"name": "Domain", "type": "string", "jsonPath": ".spec.dnsName"}, {"name": "Reason", "type": "string", "jsonPath": ".status.reason", "priority": 1}, {"name": "Age", "type": "date", "jsonPath": ".metadata.creationTimestamp", "description": "CreationTimestamp is a timestamp representing the server time when this object was created. It is not guaranteed to be set in happens-before order across separate operations. Clients may not set this value. It is represented in RFC3339 form and is in UTC."}]}]}, "metadata": {"name": "challenges.acme.cert-manager.io", "labels": {"app": "cert-manager", "app.kubernetes.io/name": "cert-manager", "app.kubernetes.io/version": "v1.14.1", "app.kubernetes.io/instance": "cert-manager"}}}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "19460993-3e37-4aa1-8dac-633e924c69b3", "model": {"id": "e633cca6-b6e1-65bf-a440-0d58915e75dd", "name": "kubernetes", "model": {"version": "v1.32.0-alpha.3"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/kubernetes-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/kubernetes-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0", "styleOverrides": ""}, "components": null, "registrant": {"id": "f9a29d70-c287-426c-a90c-2a96590c8083", "kind": "github", "name": "Github", "type": "registry", "status": "registered", "user_id": "00000000-0000-0000-0000-000000000000", "sub_type": "", "created_at": "2025-06-22T05:56:58.393994634Z", "deleted_at": "0001-01-01T00:00:00Z", "updated_at": "2025-06-22T05:56:58.393994634Z", "credential_id": "00000000-0000-0000-0000-000000000000"}, "displayName": "Kubernetes", "subCategory": "Scheduling & Orchestration", "connection_id": "f9a29d70-c287-426c-a90c-2a96590c8083", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "", "status": "enabled", "styles": {"shape": "circle", "z-index": 8, "position": {"x": 627.25, "y": 562.9114685058594}, "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/customresourcedefinition-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/customresourcedefinition-white.svg", "svgComplete": "", "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "source_uri": "git://github.com/kubernetes/kubernetes/master/api/openapi-spec/v3", "isAnnotation": false, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "CustomResourceDefinition", "schema": "", "version": "apiextensions.k8s.io/v1"}, "description": "", "displayName": "clusterissuers.cert-manager.io", "capabilities": [], "configuration": {"spec": {"group": "cert-manager.io", "names": {"kind": "ClusterIssuer", "plural": "clusterissuers", "listKind": "ClusterIssuerList", "singular": "clusterissuer", "categories": ["cert-manager"]}, "scope": "Cluster", "versions": [{"name": "v1", "schema": {"openAPIV3Schema": {"type": "object", "required": ["spec"], "properties": {"kind": {"type": "string", "description": "Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"}, "spec": {"type": "object", "properties": {"ca": {"type": "object", "required": ["secretName"], "properties": {"secretName": {"type": "string", "description": "SecretName is the name of the secret used to sign Certificates issued by this Issuer."}, "ocspServers": {"type": "array", "items": {"type": "string"}, "description": "The OCSP server list is an X.509 v3 extension that defines a list of URLs of OCSP responders. The OCSP responders can be queried for the revocation status of an issued certificate. If not set, the certificate will be issued with no OCSP servers set. For example, an OCSP server URL could be \"http://ocsp.int-x3.letsencrypt.org\"."}, "crlDistributionPoints": {"type": "array", "items": {"type": "string"}, "description": "The CRL distribution points is an X.509 v3 certificate extension which identifies the location of the CRL from which the revocation of this certificate can be checked. If not set, certificates will be issued without distribution points set."}, "issuingCertificateURLs": {"type": "array", "items": {"type": "string"}, "description": "IssuingCertificateURLs is a list of URLs which this issuer should embed into certificates it creates. See https://www.rfc-editor.org/rfc/rfc5280#section-4.2.2.1 for more details. As an example, such a URL might be \"http://ca.domain.com/ca.crt\"."}}, "description": "CA configures this issuer to sign certificates using a signing CA keypair stored in a Secret resource. This is used to build internal PKIs that are managed by cert-manager."}, "acme": {"type": "object", "required": ["privateKeySecretRef", "server"], "properties": {"email": {"type": "string", "description": "Email is the email address to be associated with the ACME account. This field is optional, but it is strongly recommended to be set. It will be used to contact you in case of issues with your account or certificates, including expiry notification emails. This field may be updated after the account is initially registered."}, "server": {"type": "string", "description": "Server is the URL used to access the ACME server's 'directory' endpoint. For example, for Let's Encrypt's staging endpoint, you would use: \"https://acme-staging-v02.api.letsencrypt.org/directory\". Only ACME v2 endpoints (i.e. RFC 8555) are supported."}, "solvers": {"type": "array", "items": {"type": "object", "properties": {"dns01": {"type": "object", "properties": {"akamai": {"type": "object", "required": ["accessTokenSecretRef", "clientSecretSecretRef", "clientTokenSecretRef", "serviceConsumerDomain"], "properties": {"accessTokenSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "A reference to a specific 'key' within a Secret resource. In some instances, `key` is a required field."}, "clientTokenSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "A reference to a specific 'key' within a Secret resource. In some instances, `key` is a required field."}, "clientSecretSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "A reference to a specific 'key' within a Secret resource. In some instances, `key` is a required fie