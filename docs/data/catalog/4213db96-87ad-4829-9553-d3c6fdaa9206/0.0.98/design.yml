rwise this field is ignored) tolerates the taint. By default, it is not set, which means tolerate the taint forever (do not evict). Zero and negative values will be treated as 0 (evict immediately) by the system."}}, "description": "The pod this Toleration is attached to tolerates any taint that matches the triple <key,value,effect> using the matching operator <operator>."}, "description": "If specified, the pod's tolerations."}, "nodeSelector": {"type": "object", "description": "NodeSelector is a selector which must be true for the pod to fit on a node. Selector which must match a node's labels for the pod to be scheduled on that node. More info: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/", "additionalProperties": {"type": "string"}}, "imagePullSecrets": {"type": "array", "items": {"type": "object", "properties": {"name": {"type": "string", "description": "Name of the referent. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names TODO: Add other useful fields. apiVersion, kind, uid?"}}, "description": "LocalObjectReference contains enough information to let you locate the referenced object inside the same namespace.", "x-kubernetes-map-type": "atomic"}, "description": "If specified, the pod's imagePullSecrets"}, "priorityClassName": {"type": "string", "description": "If specified, the pod's priorityClassName."}, "serviceAccountName": {"type": "string", "description": "If specified, the pod's service account"}}, "description": "PodSpec defines overrides for the HTTP01 challenge solver pod. Check ACMEChallengeSolverHTTP01IngressPodSpec to find out currently supported fields. All other fields will be ignored."}, "metadata": {"type": "object", "properties": {"labels": {"type": "object", "description": "Labels that should be added to the created ACME HTTP01 solver pods.", "additionalProperties": {"type": "string"}}, "annotations": {"type": "object", "description": "Annotations that should be added to the create ACME HTTP01 solver pods.", "additionalProperties": {"type": "string"}}}, "description": "ObjectMeta overrides for the pod used to solve HTTP01 challenges. Only the 'labels' and 'annotations' fields may be set. If labels or annotations overlap with in-built values, the values here will override the in-built values."}}, "description": "Optional pod template used to configure the ACME challenge solver pods used for HTTP01 challenges."}, "serviceType": {"type": "string", "description": "Optional service type for Kubernetes solver service. Supported values are NodePort or ClusterIP. If unset, defaults to NodePort."}, "ingressTemplate": {"type": "object", "properties": {"metadata": {"type": "object", "properties": {"labels": {"type": "object", "description": "Labels that should be added to the created ACME HTTP01 solver ingress.", "additionalProperties": {"type": "string"}}, "annotations": {"type": "object", "description": "Annotations that should be added to the created ACME HTTP01 solver ingress.", "additionalProperties": {"type": "string"}}}, "description": "ObjectMeta overrides for the ingress used to solve HTTP01 challenges. Only the 'labels' and 'annotations' fields may be set. If labels or annotations overlap with in-built values, the values here will override the in-built values."}}, "description": "Optional ingress template used to configure the ACME challenge solver ingress used for HTTP01 challenges."}, "ingressClassName": {"type": "string", "description": "This field configures the field `ingressClassName` on the created Ingress resources used to solve ACME challenges that use this challenge solver. This is the recommended way of configuring the ingress class. Only one of `class`, `name` or `ingressClassName` may be specified."}}, "description": "The ingress based HTTP01 challenge solver will solve challenges by creating or modifying Ingress resources in order to route requests for '/.well-known/acme-challenge/XYZ' to 'challenge solver' pods that are provisioned by cert-manager for each Challenge to be completed."}, "gatewayHTTPRoute": {"type": "object", "properties": {"labels": {"type": "object", "description": "Custom labels that will be applied to HTTPRoutes created by cert-manager while solving HTTP-01 challenges.", "additionalProperties": {"type": "string"}}, "parentRefs": {"type": "array", "items": {"type": "object", "required": ["name"], "properties": {"kind": {"type": "string", "default": "Gateway", "pattern": "^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$", "maxLength": 63, "minLength": 1, "description": "Kind is kind of the referent. \n There are two kinds of parent resources with \"Core\" support: \n * Gateway (Gateway conformance profile) * Service (Mesh conformance profile, experimental, ClusterIP Services only) \n Support for other resources is Implementation-Specific."}, "name": {"type": "string", "maxLength": 253, "minLength": 1, "description": "Name is the name of the referent. \n Support: Core"}, "port": {"type": "integer", "format": "int32", "maximum": 65535, "minimum": 1, "description": "Port is the network port this Route targets. It can be interpreted differently based on the type of parent resource. \n When the parent resource is a Gateway, this targets all listeners listening on the specified port that also support this kind of Route(and select this Route). It's not recommended to set `Port` unless the networking behaviors specified in a Route must apply to a specific port as opposed to a listener(s) whose port(s) may be changed. When both Port and SectionName are specified, the name and port of the selected listener must match both specified values. \n <gateway:experimental:description> When the parent resource is a Service, this targets a specific port in the Service spec. When both Port (experimental) and SectionName are specified, the name and port of the selected port must match both specified values. </gateway:experimental:description> \n Implementations MAY choose to support other parent resources. Implementations supporting other types of parent resources MUST clearly document how/if Port is interpreted. \n For the purpose of status, an attachment is considered successful as long as the parent resource accepts it partially. For example, Gateway listeners can restrict which Routes can attach to them by Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway. \n Support: Extended \n <gateway:experimental>"}, "group": {"type": "string", "default": "gateway.networking.k8s.io", "pattern": "^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$", "maxLength": 253, "description": "Group is the group of the referent. When unspecified, \"gateway.networking.k8s.io\" is inferred. To set the core API group (such as for a \"Service\" kind referent), Group must be explicitly set to \"\" (empty string). \n Support: Core"}, "namespace": {"type": "string", "pattern": "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$", "maxLength": 63, "minLength": 1, "description": "Namespace is the namespace of the referent. When unspecified, this refers to the local namespace of the Route. \n Note that there are specific rules for ParentRefs which cross namespace boundaries. Cross-namespace references are only valid if they are explicitly allowed by something in the namespace they are referring to. For example: Gateway has the AllowedRoutes field, and ReferenceGrant provides a generic way to enable any other kind of cross-namespace reference. \n <gateway:experimental:description> ParentRefs from a Route to a Service in the same namespace are \"producer\" routes, which apply default routing rules to inbound connections from any namespace to the Service. \n ParentRefs from a Route to a Service in a different namespace are \"consumer\" routes, and these routing rules are only applied to outbound connections originating from the same namespace as the Route, for which the intended destination of the connections are a Service targeted as a ParentRef of the Route. </gateway:experimental:description> \n Support: Core"}, "sectionName": {"type": "string", "pattern": "^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$", "maxLength": 253, "minLength": 1, "description": "SectionName is the name of a section within the target resource. In the following resources, SectionName is interpreted as the following: \n * Gateway: Listener Name. When both Port (experimental) and SectionName are specified, the name and port of the selected listener must match both specified values. * Service: Port Name. When both Port (experimental) and SectionName are specified, the name and port of the selected listener must match both specified values. Note that attaching Routes to Services as Parents is part of experimental Mesh support and is not supported for any other purpose. \n Implementations MAY choose to support attaching Routes to other resources. If that is the case, they MUST clearly document how SectionName is interpreted. \n When unspecified (empty string), this will reference the entire resource. For the purpose of status, an attachment is considered successful if at least one section in the parent resource accepts it. For example, Gateway listeners can restrict which Routes can attach to them by Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway. \n Support: Core"}}, "description": "ParentReference identifies an API object (usually a Gateway) that can be considered a parent of this resource (usually a route). There are two kinds of parent resources with \"Core\" support: \n * Gateway (Gateway conformance profile) * Service (Mesh conformance profile, experimental, ClusterIP Services only) \n This API may be extended in the future to support additional kinds of parent resources. \n The API object must be valid in the cluster; the Group and Kind must be registered in the cluster for this reference to be valid."}, "description": "When solving an HTTP-01 challenge, cert-manager creates an HTTPRoute. cert-manager needs to know which parentRefs should be used when creating the HTTPRoute. Usually, the parentRef references a Gateway. See: https://gateway-api.sigs.k8s.io/api-types/httproute/#attaching-to-gateways"}, "serviceType": {"type": "string", "description": "Optional service type for Kubernetes solver service. Supported values are NodePort or ClusterIP. If unset, defaults to NodePort."}}, "description": "The Gateway API is a sig-network community API that models service networking in Kubernetes (https://gateway-api.sigs.k8s.io/). The Gateway solver will create HTTPRoutes with the specified labels in the same namespace as the challenge. This solver is experimental, and fields / behaviour may change in the future."}}, "description": "Configures cert-manager to attempt to complete authorizations by performing the HTTP01 challenge flow. It is not possible to obtain certificates for wildcard domain names (e.g. `*.example.com`) using the HTTP01 challenge mechanism."}, "selector": {"type": "object", "properties": {"dnsNames": {"type": "array", "items": {"type": "string"}, "description": "List of DNSNames that this solver will be used to solve. If specified and a match is found, a dnsNames selector will take precedence over a dnsZones selector. If multiple solvers match with the same dnsNames value, the solver with the most matching labels in matchLabels will be selected. If neither has more matches, the solver defined earlier in the list will be selected."}, "dnsZones": {"type": "array", "items": {"type": "string"}, "description": "List of DNSZones that this solver will be used to solve. The most specific DNS zone match specified here will take precedence over other DNS zone matches, so a solver specifying sys.example.com will be selected over one specifying example.com for the domain www.sys.example.com. If multiple solvers match with the same dnsZones value, the solver with the most matching labels in matchLabels will be selected. If neither has more matches, the solver defined earlier in the list will be selected."}, "matchLabels": {"type": "object", "description": "A label selector that is used to refine the set of certificate's that this challenge solver will apply to.", "additionalProperties": {"type": "string"}}}, "description": "Selector selects a set of DNSNames on the Certificate resource that should be solved using this challenge solver. If not specified, the solver will be treated as the 'default' solver with the lowest priority, i.e. if any other solver has a more specific match, it will be used instead."}}, "description": "An ACMEChallengeSolver describes how to solve ACME challenges for the issuer it is part of. A selector may be provided to use different solving strategies for different DNS names. Only one of HTTP01 or DNS01 must be provided."}, "description": "Solvers is a list of challenge solvers that will be used to solve ACME challenges for the matching domains. Solver configurations must be provided in order to obtain certificates from an ACME server. For more information, see: https://cert-manager.io/docs/configuration/acme/"}, "caBundle": {"type": "string", "format": "byte", "description": "Base64-encoded bundle of PEM CAs which can be used to validate the certificate chain presented by the ACME server. Mutually exclusive with SkipTLSVerify; prefer using CABundle to prevent various kinds of security vulnerabilities. If CABundle and SkipTLSVerify are unset, the system certificate bundle inside the container is used to validate the TLS connection."}, "skipTLSVerify": {"type": "boolean", "description": "INSECURE: Enables or disables validation of the ACME server TLS certificate. If true, requests to the ACME server will not have the TLS certificate chain validated. Mutually exclusive with CABundle; prefer using CABundle to prevent various kinds of security vulnerabilities. Only enable this option in development environments. If CABundle and SkipTLSVerify are unset, the system certificate bundle inside the container is used to validate the TLS connection. Defaults to false."}, "preferredChain": {"type": "string", "maxLength": 64, "description": "PreferredChain is the chain to use if the ACME server outputs multiple. PreferredChain is no guarantee that this one gets delivered by the ACME endpoint. For example, for Let's Encrypt's DST crosssign you would use: \"DST Root CA X3\" or \"ISRG Root X1\" for the newer Let's Encrypt root CA. This value picks the first certificate bundle in the ACME alternative chains that has a certificate with this value as its issuer's CN"}, "privateKeySecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "PrivateKey is the name of a Kubernetes Secret resource that will be used to store the automatically generated ACME account private key. Optionally, a `key` may be specified to select a specific entry within the named Secret resource. If `key` is not specified, a default of `tls.key` will be used."}, "enableDurationFeature": {"type": "boolean", "description": "Enables requesting a Not After date on certificates that matches the duration of the certificate. This is not supported by all ACME servers like Let's Encrypt. If set to true when the ACME server does not support it it will create an error on the Order. Defaults to false."}, "externalAccountBinding": {"type": "object", "required": ["keyID", "keySecretRef"], "properties": {"keyID": {"type": "string", "description": "keyID is the ID of the CA key that the External Account is bound to."}, "keyAlgorithm": {"enum": ["HS256", "HS384", "HS512"], "type": "string", "description": "Deprecated: keyAlgorithm field exists for historical compatibility reasons and should not be used. The algorithm is now hardcoded to HS256 in golang/x/crypto/acme."}, "keySecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "keySecretRef is a Secret Key Selector referencing a data item in a Kubernetes Secret which holds the symmetric MAC key of the External Account Binding. The `key` is the index string that is paired with the key data in the Secret and should not be confused with the key data itself, or indeed with the External Account Binding keyID above. The secret key stored in the Secret **must** be un-padded, base64 URL encoded data."}}, "description": "ExternalAccountBinding is a reference to a CA external account of the ACME server. If set, upon registration cert-manager will attempt to associate the given external account credentials with the registered ACME account."}, "disableAccountKeyGeneration": {"type": "boolean", "description": "Enables or disables generating a new ACME account key. If true, the Issuer resource will *not* request a new account but will expect the account key to be supplied via an existing secret. If false, the cert-manager system will generate a new ACME account key for the Issuer. Defaults to false."}}, "description": "ACME configures this issuer to communicate with a RFC8555 (ACME) server to obtain signed x509 certificates."}, "vault": {"type": "object", "required": ["auth", "path", "server"], "properties": {"auth": {"type": "object", "properties": {"appRole": {"type": "object", "required": ["path", "roleId", "secretRef"], "properties": {"path": {"type": "string", "description": "Path where the App Role authentication backend is mounted in Vault, e.g: \"approle\""}, "roleId": {"type": "string", "description": "RoleID configured in the App Role authentication backend when setting up the authentication backend in Vault."}, "secretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "Reference to a key in a Secret that contains the App Role secret used to authenticate with Vault. The `key` field must be specified and denotes which entry within the Secret resource is used as the app role secret."}}, "description": "AppRole authenticates with Vault using the App Role auth mechanism, with the role and secret stored in a Kubernetes Secret resource."}, "kubernetes": {"type": "object", "required": ["role"], "properties": {"role": {"type": "string", "description": "A required field containing the Vault Role to assume. A Role binds a Kubernetes ServiceAccount with a set of Vault policies."}, "mountPath": {"type": "string", "description": "The Vault mountPath here is the mount path to use when authenticating with Vault. For example, setting a value to `/v1/auth/foo`, will use the path `/v1/auth/foo/login` to authenticate with Vault. If unspecified, the default value \"/v1/auth/kubernetes\" will be used."}, "secretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "The required Secret field containing a Kubernetes ServiceAccount JWT used for authenticating with Vault. Use of 'ambient credentials' is not supported."}, "serviceAccountRef": {"type": "object", "required": ["name"], "properties": {"name": {"type": "string", "description": "Name of the ServiceAccount used to request a token."}}, "description": "A reference to a service account that will be used to request a bound token (also known as \"projected token\"). Compared to using \"secretRef\", using this field means that you don't rely on statically bound tokens. To use this field, you must configure an RBAC rule to let cert-manager request a token."}}, "description": "Kubernetes authenticates with Vault by passing the ServiceAccount token stored in the named Secret resource to the Vault server."}, "tokenSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "TokenSecretRef authenticates with Vault by presenting a token."}}, "description": "Auth configures how cert-manager authenticates with the Vault server."}, "path": {"type": "string", "description": "Path is the mount path of the Vault PKI backend's `sign` endpoint, e.g: \"my_pki_mount/sign/my-role-name\"."}, "server": {"type": "string", "description": "Server is the connection address for the Vault server, e.g: \"https://vault.example.com:8200\"."}, "caBundle": {"type": "string", "format": "byte", "description": "Base64-encoded bundle of PEM CAs which will be used to validate the certificate chain presented by Vault. Only used if using HTTPS to connect to Vault and ignored for HTTP connections. Mutually exclusive with CABundleSecretRef. If neither CABundle nor CABundleSecretRef are defined, the certificate bundle in the cert-manager controller container is used to validate the TLS connection."}, "namespace": {"type": "string", "description": "Name of the vault namespace. Namespaces is a set of features within Vault Enterprise that allows Vault environments to support Secure Multi-tenancy. e.g: \"ns1\" More about namespaces can be found here https://www.vaultproject.io/docs/enterprise/namespaces"}, "caBundleSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "Reference to a Secret containing a bundle of PEM-encoded CAs to use when verifying the certificate chain presented by Vault when using HTTPS. Mutually exclusive with CABundle. If neither CABundle nor CABundleSecretRef are defined, the certificate bundle in the cert-manager controller container is used to validate the TLS connection. If no key for the Secret is specified, cert-manager will default to 'ca.crt'."}}, "description": "Vault configures this issuer to sign certificates using a HashiCorp Vault PKI backend."}, "venafi": {"type": "object", "required": ["zone"], "properties": {"tpp": {"type": "object", "required": ["credentialsRef", "url"], "properties": {"url": {"type": "string", "description": "URL is the base URL for the vedsdk endpoint of the Venafi TPP instance, for example: \"https://tpp.example.com/vedsdk\"."}, "caBundle": {"type": "string", "format": "byte", "description": "Base64-encoded bundle of PEM CAs which will be used to validate the certificate chain presented by the TPP server. Only used if using HTTPS; ignored for HTTP. If undefined, the certificate bundle in the cert-manager controller container is used to validate the chain."}, "credentialsRef": {"type": "object", "required": ["name"], "properties": {"name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "CredentialsRef is a reference to a Secret containing the username and password for the TPP server. The secret must contain two keys, 'username' and 'password'."}}, "description": "TPP specifies Trust Protection Platform configuration settings. Only one of TPP or Cloud may be specified."}, "zone": {"type": "string", "description": "Zone is the Venafi Policy Zone to use for this issuer. All requests made to the Venafi platform will be restricted by the named zone policy. This field is required."}, "cloud": {"type": "object", "required": ["apiTokenSecretRef"], "properties": {"url": {"type": "string", "description": "URL is the base URL for Venafi Cloud. Defaults to \"https://api.venafi.cloud/v1\"."}, "apiTokenSecretRef": {"type": "object", "required": ["name"], "properties": {"key": {"type": "string", "description": "The key of the entry in the Secret resource's `data` field to be used. Some instances of this field may be defaulted, in others it may be required."}, "name": {"type": "string", "description": "Name of the resource being referred to. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"}}, "description": "APITokenSecretRef is a secret key selector for the Venafi Cloud API token."}}, "description": "Cloud specifies the Venafi cloud configuration settings. Only one of TPP or Cloud may be specified."}}, "description": "Venafi configures this issuer to sign certificates using a Venafi TPP or Venafi Cloud policy zone."}, "selfSigned": {"type": "object", "properties": {"crlDistributionPoints": {"type": "array", "items": {"type": "string"}, "description": "The CRL distribution points is an X.509 v3 certificate extension which identifies the location of the CRL from which the revocation of this certificate can be checked. If not set certificate will be issued without CDP. Values are strings."}}, "description": "SelfSigned configures this issuer to 'self sign' certificates using the private key used to create the CertificateRequest object."}}, "description": "Desired state of the ClusterIssuer resource."}, "status": {"type": "object", "properties": {"acme": {"type": "object", "properties": {"uri": {"type": "string", "description": "URI is the unique account identifier, which can also be used to retrieve account details from the CA"}, "lastPrivateKeyHash": {"type": "string", "description": "LastPrivateKeyHash is a hash of the private key associated with the latest registered ACME account, in order to track changes made to registered account associated with the Issuer"}, "lastRegisteredEmail": {"type": "string", "description": "LastRegisteredEmail is the email associated with the latest registered ACME account, in order to track changes made to registered account associated with the  Issuer"}}, "description": "ACME specific status options. This field should only be set if the Issuer is configured to use an ACME server to issue certificates."}, "conditions": {"type": "array", "items": {"type": "object", "required": ["status", "type"], "properties": {"type": {"type": "string", "description": "Type of the condition, known values are (`Ready`)."}, "reason": {"type": "string", "description": "Reason is a brief machine readable explanation for the condition's last transition."}, "status": {"enum": ["True", "False", "Unknown"], "type": "string", "description": "Status of the condition, one of (`True`, `False`, `Unknown`)."}, "message": {"type": "string", "description": "Message is a human readable description of the details of the last transition, complementing reason."}, "lastTransitionTime": {"type": "string", "format": "date-time", "description": "LastTransitionTime is the timestamp corresponding to the last status change of this condition."}, "observedGeneration": {"type": "integer", "format": "int64", "description": "If set, this represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.condition[x].observedGeneration is 9, the condition is out of date with respect to the current state of the Issuer."}}, "description": "IssuerCondition contains condition information for an Issuer."}, "description": "List of status conditions to indicate the status of a CertificateRequest. Known condition types are `Ready`.", "x-kubernetes-list-type": "map", "x-kubernetes-list-map-keys": ["type"]}}, "description": "Status of the ClusterIssuer. This is set and managed automatically."}, "metadata": {"type": "object"}, "apiVersion": {"type": "string", "description": "APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources"}}, "description": "A ClusterIssuer represents a certificate issuing authority which can be referenced as part of `issuerRef` fields. It is similar to an Issuer, however it is cluster-scoped and therefore can be referenced by resources that exist in *any* namespace, not just the same namespace as the referent."}}, "served": true, "storage": true, "subresources": {"status": {}}, "additionalPrinterColumns": [{"name": "Ready", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Ready\")].status"}, {"name": "Status", "type": "string", "jsonPath": ".status.conditions[?(@.type==\"Ready\")].message", "priority": 1}, {"name": "Age", "type": "date", "jsonPath": ".metadata.creationTimestamp", "description": "CreationTimestamp is a timestamp representing the server time when this object was created. It is not guaranteed to be set in happens-before order across separate operations. Clients may not set this value. It is represented in RFC3339 form and is in UTC."}]}]}, "metadata": {"name": "clusterissuers.cert-manager.io", "labels": {"app": "cert-manager", "app.kubernetes.io/name": "cert-manager", "app.kubernetes.io/version": "v1.14.1", "app.kubernetes.io/instance": "cert-manager"}}}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "dce73b82-d76b-4cdb-8fc2-d6a140731420", "model": {"id": "e633cca6-b6e1-65bf-a440-0d58915e75dd", "name": "kubernetes", "model": {"version": "v1.32.0-alpha.3"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/kubernetes-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/kubernetes-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0", "styleOverrides": ""}, "components": null, "registrant": {"id": "f9a29d70-c287-426c-a90c-2a96590c8083", "kind": "github", "name": "Github", "type": "registry", "status": "registered", "user_id": "00000000-0000-0000-0000-000000000000", "sub_type": "", "created_at": "2025-06-22T05:56:58.393994634Z", "deleted_at": "0001-01-01T00:00:00Z", "updated_at": "2025-06-22T05:56:58.393994634Z", "credential_id": "00000000-0000-0000-0000-000000000000"}, "displayName": "Kubernetes", "subCategory": "Scheduling & Orchestration", "connection_id": "f9a29d70-c287-426c-a90c-2a96590c8083", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "", "status": "enabled", "styles": {"shape": "circle", "z-index": 9, "position": {"x": 719.25, "y": 562.9114685058594}, "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/customresourcedefinition-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/customresourcedefinition-white.svg", "svgComplete": "", "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "source_uri": "git://github.com/kubernetes/kubernetes/master/api/openapi-spec/v3", "isAnnotation": false, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "CustomResourceDefinition", "schema": "", "version": "apiextensions.k8s.io/v1"}, "description": "", "displayName": "issuers.cert-manager.io", "capabilities": [], "configuration": {"spec": {"group": "cert-manager.io", "names": {"kind": "Issuer", "plural": "issuers", "listKind": "IssuerList", "singular": "issuer", "categories": ["cert-manager"]}, "scope": "Namespaced", "versions": [{"name": "v1", "schema": {"openAPIV3Schema": {"type": "object", "required": ["spec"], "properties": {"kind": {"type": "string", "description": "Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"}, "spec": {"type": "object", "properties": {"ca": {"type": "object", "required": ["secretName"], "properties": {"secretName": {"type": "string", "description": "SecretName is the name of the secret used to sign Certificates issued by this Issuer."}, "ocspServers": {"type": "array", "items": {"type": "string"}, "description": "The OCSP server list is an X.509 v3 extension that defines a list of URLs of OCSP responders. The OCSP responders can be queried for the revocation status of an issued certificate. If not set, the certificate will be issued with no OCSP servers set. For example, an OCSP server URL could be \"http://ocsp.int-x3.letsencrypt.org\"."}, "crlDistributionPoints": {"type": "array", "items": {"type": "string"}, "description": "The CRL distribution points is an X.509 v3 certificate extension which identifies the location of the CRL from which the revocation of this certificate can be checked. If not set, certificates will be issued without distribution points set."}, "issuingCertificateURLs": {"type": "array", "items": {"type": "string"}, "description": "IssuingCertificateURLs is a list of URLs which this issuer should embed into certificates it creates. See https://www.rfc-editor.org/rfc/rfc5280#section-4.2.2.1 for more details. As an example, such a URL might be \"http://ca.domain.com/ca.crt\"."}}, "description": "CA configures this issuer to sign certificates using a signing CA keypair stored in a Secret resource. This is used to build internal PKIs that are managed by cert-manager."}, "acme": {"type": "object", "required": ["privateKeySecretRef", "server"], "properties": {"email": {"type": "string", "description": "Email is the email address to be associated with the ACME account. This field is optional, but it is strongly recommended to be set. It will be used to contact you in case of issues with your account or certificates, including expiry notification emails. This field may be updated after the account is initially registered."}, "server": {"type": "string", "description": "Server is the URL used to access the ACME server's 'directory' endpoint. For example, for Let's Encrypt's staging endpoint, you would use: \"https://acme-staging-v02.api.letsencrypt.org/directory\". Only A