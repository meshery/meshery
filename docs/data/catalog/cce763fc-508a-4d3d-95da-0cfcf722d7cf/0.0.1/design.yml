i configuration. Configuration will be only used when the sensor\n# is actually installed by the agent.\n# The commented out example values represent example configuration and are not\n# necessarily defaults. Defaults are usually 'absent' or mentioned separately.\n# Changes are hot reloaded unless otherwise mentioned.\n\n# It is possible to create files called 'configuration-abc.yaml' which are\n# merged with this file in file system order. So 'configuration-cde.yaml' comes\n# after 'configuration-abc.yaml'. Only nested structures are merged, values are\n# overwritten by subsequent configurations.\n\n# Secrets\n# To filter sensitive data from collection by the agent, all sensors respect\n# the following secrets configuration. If a key collected by a sensor matches\n# an entry from the list, the value is redacted.\n#com.instana.secrets:\n#  matcher: 'contains-ignore-case' # 'contains-ignore-case', 'contains', 'regex'\n#  list:\n#    - 'key'\n#    - 'password'\n#    - 'secret'\n\n# Host\n#com.instana.plugin.host:\n#  tags:\n#    - 'dev'\n#    - 'app1'\n\n# Hardware & Zone\n#com.instana.plugin.generic.hardware:\n#  enabled: true # disabled by default\n#  availability-zone: 'zone'\n", "configuration-disable-kubernetes-sensor.yaml": "com.instana.plugin.kubernetes:\n  enabled: false\n"}, "metadata": {"labels": {"helm.sh/chart": "instana-agent-1.2.72", "app.kubernetes.io/name": "instana-agent", "app.kubernetes.io/version": "1.2.72", "app.kubernetes.io/instance": "instana-agent", "app.kubernetes.io/managed-by": "Helm"}, "namespace": "default", "annotations": {}}}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "fd402e20-2988-462f-96d7-6f9fca37bb81", "model": {"id": "e25a9e72-0069-b65b-af56-02cea5a7c2ed", "name": "kubernetes", "model": {"version": "v1.32.0-alpha.3"}, "status": "enabled", "version": "v1.0.0", "category": {"name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/kubernetes-c