e": "v1alpha1", "schema": {"openAPIV3Schema": {"type": "object", "properties": {"kind": {"type": "string", "description": "Kind is a string value representing the REST resource this object represents.\nServers may infer this from the endpoint the client submits requests to.\nCannot be updated.\nIn CamelCase.\nMore info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"}, "spec": {"type": "object", "required": ["jobTargetRef", "triggers"], "properties": {"rollout": {"type": "object", "properties": {"strategy": {"type": "string"}, "propagationPolicy": {"type": "string"}}, "description": "Rollout defines the strategy for job rollouts"}, "triggers": {"type": "array", "items": {"type": "object", "required": ["metadata", "type"], "properties": {"name": {"type": "string"}, "type": {"type": "string"}, "metadata": {"type": "object", "additionalProperties": {"type": "string"}}, "metricType": {"type": "string", "description": "MetricTargetType specifies the type of metric being targeted, and should be either\n\"Value\", \"AverageValue\", or \"Utilization\""}, "useCachedMetrics": {"type": "boolean"}, "authenticationRef": {"type": "object", "required": ["name"], "properties": {"kind": {"type": "string", "description": "Kind of the resource being referred to. Defaults to TriggerAuthentication."}, "name": {"type": "string"}}, "description": "AuthenticationRef points to the TriggerAuthentication or ClusterTriggerAuthentication object that\nis used to authenticate the scaler with the environment"}}, "description": "ScaleTriggers reference the scaler that will be used"}}, "jobTargetRef": {"type": "object", "required": ["template"], "properties": {"suspend": {"type": "boolean", "description": "suspend specifies whether the Job controller should create Pods or not. If\na Job is created with suspend set to true, no Pods are created by the Job\ncontroller. If a Job is suspended after creation (i.e. the flag goes from\nfalse to true), the Job controller will delete all active Pods associated\nwith this Job. Users must design their workload to gracefully handle this.\nSuspending a Job will reset the StartTime field of the Job, effectively\nresetting the ActiveDeadlineSeconds timer too. Defaults to false."}, "selector": {"type": "object", "properties": {"matchLabels": {"type": "object", "description": "matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels\nmap is equivalent to an element of matchExpressions, whose key field is \"key\", the\noperator is \"In\", and the values array contains only \"value\". The requirements are ANDed.", "additionalProperties": {"type": "string"}}, "matchExpressions": {"type": "array", "items": {"type": "object", "required": ["key", "operator"], "properties": {"key": {"type": "string", "description": "key is the label key that the selector applies to."}, "values": {"type": "array", "items": {"type": "string"}, "description": "values is an array of string values. If the operator is In or NotIn,\nthe values array must be non-empty. If the operator is Exists or DoesNotExist,\nthe values array must be empty. This array is replaced during a strategic\nmerge patch."}, "operator": {"type": "string", "description": "operator represents a key's relationship to a set of values.\nValid operators are In, NotIn, Exists and DoesNotExist."}}, "description": "A label selector requirement is a selector that contains values, a key, and an operator that\nrelates the key and values."}, "description": "matchExpressions is a list of label selector requirements. The requirements are ANDed."}}, "description": "A label query over pods that should match the pod count.\nNormally, the system sets this field for you.\nMore info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/#label-selectors", "x-kubernetes-map-type": "atomic"}, "template": {"type": "object", "properties": {"spec": {"type": "object", "required": ["containers"], "properties": {"os": {"type": "object", "required": ["name"], "properties": {"name": {"type": "string", "description": "Name is the name of the operating system. The currently supported values are linux and windows.\nAdditional value may be defined in future and can be one of:\nhttps://github.com/opencontainers/runtime-spec/blob/master/config.md#platform-specific-configuration\nClients should expect to handle additional values and treat unrecognized values in this field as os: null"}}, "description": "Specifies the OS of the containers in the pod.\nSome pod and container fields are restricted if this is set.\n\n\nIf the OS field is set to linux, the following fields must be unset:\n-securityContext.windowsOptions\n\n\nIf the OS field is set to windows, following fields must be unset:\n- spec.hostPID\n- spec.hostIPC\n- spec.hostUsers\n- spec.securityContext.seLinuxOptions\n- spec.securityContext.seccompProfile\n- spec.securityContext.fsGroup\n- spec.securityContext.fsGroupChangePolicy\n- spec.securityContext.sysctls\n- spec.shareProcessNamespace\n- spec.securityContext.runAsUser\n- spec.securityContext.runAsGroup\n- spec.securityContext.supplementalGroups\n- spec.containers[*].securityContext.seLinuxOptions\n- spec.containers[*].securityContext.seccompProfile\n- spec.containers[*].securityContext.capabilities\n- spec.containers[*].securityContext.readOnlyRootFilesystem\n- spec.containers[*].securityContext.privileged\n- spec.containers[*].securityContext.allowPrivilegeEscalation\n- spec.containers[*].securityContext.procMount\n- spec.containers[*].securityContext.runAsUser\n- spec.containers[*].securityContext.runAsGroup"}, "hostIPC": {"type": "boolean", "description": "Use the host's ipc namespace.\nOptional: Default to false."}, "hostPID": {"type": "boolean", "description": "Use the host's pid namespace.\nOptional: Default to false."}, "volumes": {"type": "array", "items": {"type": "object", "required": ["name"], "properties": {"fc": {"type": "object", "properties": {"lun": {"type": "integer", "format": "int32", "description": "lun is Optional: FC target lun number"}, "wwids": {"type": "array", "items": {"type": "string"}, "description": "wwids Optional: FC volume world wide identifiers (wwids)\nEither wwids or combination of targetWWNs and lun must be set, but not both simultaneously."}, "fsType": {"type": "string", "description": "fsType is the filesystem type to mount.\nMust be a filesystem type supported by the host operating system.\nEx. \"ext4\", \"xfs\", \"ntfs\". Implicitly inferred to be \"ext4\" if unspecified.\nTODO: how do we prevent errors in the filesystem from compromising the machine"}, "readOnly": {"type": "boolean", "description": "readOnly is Optional: Defaults to false (read/write). ReadOnly here will force\nthe ReadOnly setting in VolumeMounts."}, "targetWWNs": {"type": "array", "items": {"type": "string"}, "description": "targetWWNs is Optional: FC target worldwide names (WWNs)"}}, "description": "fc represents a Fibre Channel resource that is attached to a kubelet's host machine and then exposed to the pod."}, "csi": {"type": "object", "required": ["driver"], "properties": {"driver": {"type": "string", "description": "driver is the name of the CSI driver that handles this volume.\nConsult with your admin for the correct name as registered in the cluster."}, "fsType": {"type": "string", "description": "fsType to mount. Ex. \"ext4\", \"xfs\", \"ntfs\".\nIf not provided, the empty value is passed to the associated CSI driver\nwhich will determine the default filesystem to apply."}, "readOnly": {"type": "boolean", "description": "readOnly specifies a read-only configuration for the volume.\nDefaults to false (read/write)."}, "volumeAttributes": {"type": "object", "description": "volumeAttributes stores driver-specific properties that are passed to the CSI\ndriver. Consult your driver's documentation for supported values.", "additionalProperties": {"type": "string"}}, "nodePublishSecretRef": {"type": "object", "properties": {"na