metadata": {"genealogy": "", "published": false, "isAnnotation": true, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "TextBox", "schema": "", "version": "core.meshery.io/v1alpha1"}, "description": "", "displayName": "", "capabilities": [], "configuration": {}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "7fbf448b-2a16-4c11-a210-f3f7b447f7db", "model": {"id": "550bfe31-5015-a0d1-b695-369c97b4e903", "name": "meshery-core", "model": {"version": "0.7.2"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/meshery-core-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/meshery-core-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#00B39F", "secondaryColor": "#00D3A9"}, "components": null, "registrant": {"id": "98027e7d-9e16-e4f0-6dbd-83f3ac0d9856", "kind": "meshery", "name": "meshery", "type": "registry", "status": "registered", "user_id": "00000000-0000-0000-0000-000000000000", "sub_type": "", "created_at": "2025-06-23T22:31:56.011364159+05:30", "deleted_at": "0001-01-01T00:00:00Z", "updated_at": "2025-06-23T22:31:56.011364159+05:30", "credential_id": "00000000-0000-0000-0000-000000000000"}, "displayName": "Meshery Core", "subCategory": "Application Definition & Image Build", "connection_id": "98027e7d-9e16-e4f0-6dbd-83f3ac0d9856", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "JSON", "status": "enabled", "styles": {"shape": "rectangle", "width": 1174.4839, "height": 328.20663, "opacity": 1, "padding": 6, "z-index": 24, "position": {"x": 56.733229666023576, "y": 33.96425405629216}, "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/textbox-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/textbox-white.svg", "body-text": "Overview:\nKubernetes provides a flexible and declarative way to manage persistent storage using PersistentVolumes (PV) and PersistentVolumeClaims (PVC). This is crucial for workloads that require data persistence across Pod restarts, scaling, or node failures.\n\nIn this guide, we explore how PVCs and PVs interact with Deployments in three common patterns:\n\n    Dynamic Provisioning: PVC automatically triggers the creation of a volume via a StorageClass.\n\n    Static Binding: Pre-created PVs are explicitly linked to PVCs.\n\n    Shared Claims: Multiple Deployments mount the same PVC (when supported), enabling shared data access.\n\nThis visual breakdown helps clarify the relationships and fields involved in these configurations, making it easier to design and debug persistent storage in real-world Kubernetes setups.\n\n", "svgComplete": "", "border-color": "#808080", "border-style": "dashed", "border-width": 0, "primaryColor": "#00B39F", "secondaryColor": "#FFDE00", "body-text-color": "#d6d4d4", "background-image": "none", "background-opacity": 0, "body-text-font-size": 18, "body-text-font-weight": "600", "body-text-vertical-align": "center", "body-text-horizontal-align": "center"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "isAnnotation": true, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "TextBox", "schema": "", "version": "core.meshery.io/v1alpha1"}, "description": "", "displayName": "", "capabilities": [], "configuration": {}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "87087be9-1d83-4dab-ba73-1a1a44661891", "model": {"id": "550bfe31-5015-a0d1-b695-369c97b4e903", "name": "meshery-core", "model": {"version": "0.7.2"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor