ma": ""}, "component": {"kind": "ConfigMap", "schema": "", "version": "v1"}, "description": "", "displayName": "appsmith-mongodb-common-scripts", "capabilities": [], "configuration": {"data": {"ping-mongodb.sh": "#!/bin/bash\nexec mongosh  $TLS_OPTIONS --port $MONGODB_PORT_NUMBER --eval \"db.adminCommand('ping')\"\n", "startup-probe.sh": "#!/bin/bash\nexec mongosh  $TLS_OPTIONS --port $MONGODB_PORT_NUMBER --eval 'if (!(db.hello().isWritablePrimary || db.hello().secondary)) { throw new Error(\"Not ready\") }'\n", "readiness-probe.sh": "#!/bin/bash\n# Run the proper check depending on the version\n[[ $(mongod -version | grep \"db version\") =~ ([0-9]+\\.[0-9]+\\.[0-9]+) ]] && VERSION=${BASH_REMATCH[1]}\n. /opt/bitnami/scripts/libversion.sh\nVERSION_MAJOR=\"$(get_sematic_version \"$VERSION\" 1)\"\nVERSION_MINOR=\"$(get_sematic_version \"$VERSION\" 2)\"\nVERSION_PATCH=\"$(get_sematic_version \"$VERSION\" 3)\"\nreadiness_test='db.isMaster().ismaster || db.isMaster().secondary'\nif [[ ( \"$VERSION_MAJOR\" -ge 5 ) || ( \"$VERSION_MAJOR\" -ge 4 && \"$VERSION_MINOR\" -ge 4 && \"$VERSION_PATCH\" -ge 2 ) ]]; then\n    readiness_test='db.hello().isWritablePrimary || db.hello().secondary'\nfi\nexec mongosh  $TLS_OPTIONS --port $MONGODB_PORT_NUMBER --eval \"if (!(${readiness_test})) { throw new Error(\\\"Not ready\\\") }\"\n"}, "metadata": {"name": "appsmith-mongodb-common-scripts", "labels": {"helm.sh/chart": "mongodb-16.5.40", "app.kubernetes.io/name": "mongodb", "app.kubernetes.io/version": "8.0.12", "app.kubernetes.io/instance": "appsmith", "app.kubernetes.io/component": "mongodb", "app.kubernetes.io/managed-by": "Helm"}, "namespace": "default"}}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "140e49b5-3937-4849-a1bf-109acfe8502a", "model": {"id": "b3f5bc0d-30f7-607d-6c73-784ddde6cad8", "name": "kubernetes", "model": {"version": "v1.32.0-alpha.3"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/kubernetes-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/kubernetes-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0", "styleOverrides": ""}, "components": null, "registrant": {"id": "5bc80e3c-5d43-9eb4-d16c-78a2769247a6", "kind": "github", "name": "Github", "type": "registry", "status": "registered", "user_id": "00000000-0000-0000-0000-000000000000", "sub_type": "", "created_at": "2025-09-17T17:32:17.981302672Z", "deleted_at": "0001-01-01T00:00:00Z", "updated_at": "2025-09-17T17:32:17.981302672Z", "credential_id": "00000000-0000-0000-0000-000000000000", "schemaVersion": ""}, "displayName": "Kubernetes", "subCategory": "Scheduling & Orchestration", "connection_id": "5bc80e3c-5d43-9eb4-d16c-78a2769247a6", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "", "status": "enabled", "styles": {"shape": "bottom-round-rectangle", "svgColor": "ui/public/static/img/meshmodels/kubernetes/color/configmap-color.svg", "svgWhite": "ui/public/static/img/meshmodels/kubernetes/white/configmap-white.svg", "svgComplete": "", "primaryColor": "#326CE5", "secondaryColor": "#7aa1f0"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "source_uri": "git://github.com/kubernetes/kubernetes/master/api/openapi-spec/v3", "isAnnotation": false, "isNamespaced": true, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "ConfigMap", "schema": "", "version": "v1"}, "description": "", "displayName": "appsmith-mongodb-scripts", "capabilities": [], "configuration": {"data": {"setup.sh": "#!/bin/bash\n\n. /opt/bitnami/scripts/mongodb-env.sh\n. /opt/bitnami/scripts/libfs.sh\n. /opt/bitnami/scripts/liblog.sh\n. /opt/bitnami/scripts/libvalidations.sh\n\nif is_empty_value \"$MONGODB_ADVERTISED_PORT_NUMBER\"; then\n  export MONGODB_ADVERTISED_PORT_NUMBER=\"$MONGODB_PORT_NUMBER\"\nfi\n\ninfo \"Advertised Hostname: $MONGODB_ADVERTISED_HOSTNAME\"\ninfo \"Advertised Port: $MONGODB_ADVERTISED_PORT_NUMBER\"\n\n# Check for existing replica set in case there is no data in the PVC\n# This is for cases where the PVC is lost or for MongoDB caches without\n# persistence\ncurrent_primary=\"\"\nif is_dir_empty \"${MONGODB_DATA_DIR}/db\"; then\n  info \"Data dir empty, checking if the replica set already exists\"\n    current_primary=$(mongosh admin --host \"appsmith-mongodb-0.appsmith-mongodb-headless.default.svc.cluster.local:27017,appsmith-mongodb-1.appsmith-mongodb-headless.default.svc.cluster.local:27017\" --authenticationDatabase admin -u $MONGODB_ROOT_USER -p $MONGODB_ROOT_PASSWORD --eval 'db.runCommand(\"ismaster\")' | awk -F\\' '/primary:/ {print $2}')\n  if ! is_empty_value \"$current_primary\"; then\n    info \"Detected existing primary: ${current_primary}\"\n  fi\nfi\n\nif ! is_empty_value \"$current_primary\" && [[ \"$MONGODB_ADVERTISED_HOSTNAME:$MONGODB_ADVERTISED_PORT_NUMBER\" == \"$current_primary\" ]]; then\n    info \"Advertised name matches current primary, configuring node as a primary\"\n    export MONGODB_REPLICA_SET_MODE=\"primary\"\nelif ! is_empty_value \"$current_primary\" && [[ \"$MONGODB_ADVERTISED_HOSTNAME:$MONGODB_ADVERTISED_PORT_NUMBER\" != \"$current_primary\" ]]; then\n    info \"Current primary is different from this node. Configuring the node as replica of ${current_primary}\"\n    export MONGODB_REPLICA_SET_MODE=\"secondary\"\n    export MONGODB_INITIAL_PRIMARY_HOST=\"${current_primary%:*}\"\n    export MONGODB_INITIAL_PRIMARY_PORT_NUMBER=\"${current_primary#*:}\"\n    export MONGODB_SET_SECONDARY_OK=\"yes\"\nelif [[ \"$MY_POD_NAME\" = \"appsmith-mongodb-0\" ]]; then\n    info \"Pod name matches initial primary pod name, configuring node as a primary\"\n    export MONGODB_REPLICA_SET_MODE=\"primary\"\nelse\n    info \"Pod name doesn't match initial primary pod name, configuring node as a secondary\"\n    export MONGODB_REPLICA_SET_MODE=\"secondary\"\n    export MONGODB_INITIAL_PRIMARY_PORT_NUMBER=\"$MONGODB_PORT_NUMBER\"\nfi\n\nif [[ \"$MONGODB_REPLICA_SET_MODE\" == \"secondary\" ]]; then\n    export MONGODB_INITIAL_PRIMARY_ROOT_USER=\"$MONGODB_ROOT_USER\"\n    export MONGODB_INITIAL_PRIMARY_ROOT_PASSWORD=\"$MONGODB_ROOT_PASSWORD\"\n    export MONGODB_ROOT_PASSWORD=\"\"\n    export MONGODB_EXTRA_USERNAMES=\"\"\n    export MONGODB_EXTRA_DATABASES=\"\"\n    export MONGODB_EXTRA_PASSWORDS=\"\"\n    export MONGODB_ROOT_PASSWORD_FILE=\"\"\n    export MONGODB_EXTRA_USERNAMES_FILE=\"\"\n    export MONGODB_EXTRA_DATABASES_FILE=\"\"\n    export MONGODB_EXTRA_PASSWORDS_FILE=\"\"\nfi\nexec /opt/bitnami/scripts/mongodb/entrypoint.sh /opt/bitnami/scripts/mongodb/run.sh", "setup-hidden.sh": "#!/bin/bash\n\n. /opt/bitnami/scripts/mongodb-env.sh\n\necho \"Advertised Hostname: $MONGODB_ADVERTISED_HOSTNAME\"\necho \"Advertised Port: $MONGODB_ADVERTISED_PORT_NUMBER\"\necho \"Configuring node as a hidden node\"\nexport MONGODB_REPLICA_SET_MODE=\"hidden\"\nexport MONGODB_INITIAL_PRIMARY_ROOT_USER=\"$MONGODB_ROOT_USER\"\nexport MONGODB_INITIAL_PRIMARY_ROOT_PASSWORD=\"$MONGODB_ROOT_PASSWORD\"\nexport MONGODB_INITIAL_PRIMARY_PORT_NUMBER=\"$MONGODB_PORT_NUMBER\"\nexport MONGODB_ROOT_PASSWORD=\"\"\nexport MONGODB_EXTRA_USERNAMES=\"\"\nexport MONGODB_EXTRA_DATABASES=\"\"\nexport MONGODB_EXTRA_PASSWORDS=\"\"\nexport MONGODB_ROOT_PASSWORD_FILE=\"\"\nexport MONGODB_EXTRA_USERNAMES_FILE=\"\"\nexport MONGODB_EXTRA_DATABASES_FILE=\"\"\nexport MONGODB_EXTRA_PASSWORDS_FILE=\"\"\nexec /opt/bitnami/scripts/mongodb/entrypoint.sh /opt/bitnami/scripts/mongodb/run.sh"}, "metadata": {"name": "appsmith-mongodb-scripts", "labels": {"helm.sh/chart": "mongodb-16.5.40", "app.kubernetes.io/name": "mongodb", "app.kubernetes.io/version": "8.0.12", "app.kubernetes.io/instance": "appsmith", "app.kubernetes.io/component": "mongodb", "app.