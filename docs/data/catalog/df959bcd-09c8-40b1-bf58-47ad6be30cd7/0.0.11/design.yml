: {"spec": {"group": "ec2.services.k8s.aws", "names": {"kind": "Instance", "plural": "instances", "listKind": "InstanceList", "singular": "instance"}, "scope": "Namespaced", "versions": [{"name": "v1alpha1", "schema": {"openAPIV3Schema": {"type": "object", "properties": {"kind": {"type": "string", "description": "Kind is a string value representing the REST resource this object represents.\nServers may infer this from the endpoint the client submits requests to.\nCannot be updated.\nIn CamelCase.\nMore info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"}, "spec": {"type": "object", "properties": {"tags": {"type": "array", "items": {"type": "object", "properties": {"key": {"type": "string"}, "value": {"type": "string"}}, "description": "Describes a tag."}, "description": "The tags. The value parameter is required, but if you don't want the tag\nto have a value, specify the parameter with no value, and we set the value\nto an empty string."}, "imageID": {"type": "string", "description": "The ID of the AMI. An AMI ID is required to launch an instance and must be\nspecified here or in a launch template."}, "keyName": {"type": "string", "description": "The name of the key pair. You can create a key pair using CreateKeyPair (https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_CreateKeyPair.html)\nor ImportKeyPair (https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ImportKeyPair.html).\n\nIf you do not specify a key pair, you can't connect to the instance unless\nyou choose an AMI that is configured to allow users another way to log in."}, "kernelID": {"type": "string", "description": "The ID of the kernel.\n\nWe recommend that you use PV-GRUB instead of kernels and RAM disks. For more\ninformation, see PV-GRUB (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/UserProvidedkernels.html)\nin the Amazon EC2 User Guide."}, "maxCount": {"type": "integer", "format": "int64", "description": "The maximum number of instances to launch. If you specify more instances\nthan Amazon EC2 can launch in the target Availability Zone, Amazon EC2 launches\nthe largest possible number of instances above MinCount.\n\nConstraints: Between 1 and the maximum number you're allowed for the specified\ninstance type. For more information about the default limits, and how to\nrequest an increase, see How many instances can I run in Amazon EC2 (http://aws.amazon.com/ec2/faqs/#How_many_instances_can_I_run_in_Amazon_EC2)\nin the Amazon EC2 FAQ."}, "minCount": {"type": "integer", "format": "int64", "description": "The minimum number of instances to launch. If you specify a minimum that\nis more instances than Amazon EC2 can launch in the target Availability Zone,\nAmazon EC2 launches no instances.\n\nConstraints: Between 1 and the maximum number you're allowed for the specified\ninstance type. For more information about the default limits, and how to\nrequest an increase, see How many instances can I run in Amazon EC2 (http://aws.amazon.com/ec2/faqs/#How_many_instances_can_I_run_in_Amazon_EC2)\nin the Amazon EC2 General FAQ."}, "subnetID": {"type": "string", "description": "[EC2-VPC] The ID of the subnet to launch the instance into.\n\nIf you specify a network interface, you must specify any subnets as part\nof the network interface."}, "userData": {"type": "string", "description": "The user data script to make available to the instance. For more information,\nsee Run commands on your Linux instance at launch (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/user-data.html)\nand Run commands on your Windows instance at launch (https://docs.aws.amazon.com/AWSEC2/latest/WindowsGuide/ec2-windows-user-data.html).\nIf you are using a command line tool, base64-encoding is performed for you,\nand you can load the text from a file. Otherwise, you must provide base64-encoded\ntext. User data is limited to 16 KB."}, "placement": {"type": "object", "properties": {"hostID": {"type": "string"}, "tenancy": {"type": "string"}, "affinity": {"type": "string"}, "groupName": {"type": "string"}, "spreadDomain": {"type": "string"}, "partitionNumber": {"type": "integer", "format": "int64"}, "availabilityZone": {"type": "string"}, "hostResourceGroupARN": {"type": "string"}}, "description": "The placement for the instance."}, "ramDiskID": {"type": "string", "description": "The ID of the RAM disk to select. Some kernels require additional drivers\nat launch. Check the kernel requirements for information about whether you\nneed to specify a RAM disk. To find kernel requirements, go to the Amazon\nWeb Services Resource Center and search for the kernel ID.\n\nWe recommend that you use PV-GRUB instead of kernels and RAM disks. For more\ninformation, see PV-GRUB (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/UserProvidedkernels.html)\nin the Amazon EC2 User Guide."}, "cpuOptions": {"type": "object", "properties": {"coreCount": {"type": "integer", "format": "int64"}, "threadsPerCore": {"type": "integer", "format": "int64"}}, "description": "The CPU options for the instance. For more information, see Optimize CPU\noptions (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-optimize-cpu.html)\nin the Amazon EC2 User Guide."}, "monitoring": {"type": "object", "properties": {"enabled": {"type": "boolean"}}, "description": "Specifies whether detailed monitoring is enabled for the instance."}, "ebsOptimized": {"type": "boolean", "description": "Indicates whether the instance is optimized for Amazon EBS I/O. This optimization\nprovides dedicated throughput to Amazon EBS and an optimized configuration\nstack to provide optimal Amazon EBS I/O performance. This optimization isn't\navailable with all instance types. Additional usage charges apply when using\nan EBS-optimized instance.\n\nDefault: false"}, "instanceType": {"type": "string", "description": "The instance type. For more information, see Instance types (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-types.html)\nin the Amazon EC2 User Guide.\n\nDefault: m1.small"}, "ipv6Addresses": {"type": "array", "items": {"type": "object", "properties": {"ipv6Address": {"type": "string"}}, "description": "Describes an IPv6 address."}, "description": "[EC2-VPC] The IPv6 addresses from the range of the subnet to associate with\nthe primary network interface. You cannot specify this option and the option\nto assign a number of IPv6 addresses in the same request. You cannot specify\nthis option if you've specified a minimum number of instances to launch.\n\nYou cannot specify this option and the network interfaces option in the same\nrequest."}, "disableAPIStop": {"type": "boolean", "description": "Indicates whether an instance is enabled for stop protection. For more information,\nsee Stop protection (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/Stop_Start.html#Using_StopProtection)."}, "enclaveOptions": {"type": "object", "properties": {"enabled": {"type": "boolean"}}, "description": "Indicates whether the instance is enabled for Amazon Web Services Nitro Enclaves.\nFor more information, see What is Amazon Web Services Nitro Enclaves? (https://docs.aws.amazon.com/enclaves/latest/user/nitro-enclave.html)\nin the Amazon Web Services Nitro Enclaves User Guide.\n\nYou can't enable Amazon Web Services Nitro Enclaves and hibernation on the\nsame instance."}, "launchTemplate": {"type": "object", "properties": {"version": {"type": "string"}, "launchTemplateID": {"type": "string"}, "launchTemplateName": {"type": "string"}}, "description": "The launch template to use to launch the instances. Any parameters that you\nspecify in RunInstances override the same parameters in the launch template.\nYou can specify either the name or ID of a launch template, but not both."}, "securityGroups": {"type": "array", "items": {"type": "string"}, "description": "[EC2-Classic, default VPC] The names of the security groups. For a nondefault\nVPC, you must use security group IDs instead.\n\nIf you specify a network interface, you must specify any security groups\nas part of the network interface.\n\nDefault: Amazon EC2 uses the default security group."}, "metadataOptions": {"type": "object", "properties": {"httpTokens": {"type": "string"}, "httpEndpoint": {"type": "string"}, "httpProtocolIPv6": {"type": "string"}, "instanceMetadataTags": {"type": "string"}, "httpPutResponseHopLimit": {"type": "integer", "format": "int64"}}, "description": "The metadata options for the instance. For more information, see Instance\nmetadata and user data (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-instance-metadata.html)."}, "ipv6AddressCount": {"type": "integer", "format": "int64", "description": "[EC2-VPC] The number of IPv6 addresses to associate with the primary network\ninterface. Amazon EC2 chooses the IPv6 addresses from the range of your subnet.\nYou cannot specify this option and the option to assign specific IPv6 addresses\nin the same request. You can specify this option if you've specified a minimum\nnumber of instances to launch.\n\nYou cannot specify this option and the network interfaces option in the same\nrequest."}, "privateIPAddress": {"type": "string", "description": "[EC2-VPC] The primary IPv4 address. You must specify a value from the IPv4\naddress range of the subnet.\n\nOnly one private IP address can be designated as primary. You can't specify\nthis option if you've specified the option to designate a private IP address\nas the primary IP address in a network interface specification. You cannot\nspecify this option if you're launching more than one instance in the request.\n\nYou cannot specify this option and the network interfaces option in the same\nrequest."}, "securityGroupIDs": {"type": "array", "items": {"type": "string"}, "description": "The IDs of the security groups. You can create a security group using CreateSecurityGroup\n(https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_CreateSecurityGroup.html).\n\nIf you specify a network interface, you must specify any security groups\nas part of the network interface."}, "networkInterfaces": {"type": "array", "items": {"type": "object", "properties": {"subnetID": {"type": "string"}, "description": {"type": "string"}, "deviceIndex": {"type": "integer", "format": "int64"}, "ipv4Prefixes": {"type": "array", "items": {"type": "object", "properties": {"ipv4Prefix": {"type": "string"}}, "description": "Describes the IPv4 prefix option for a network interface."}}, "ipv6Prefixes": {"type": "array", "items": {"type": "object", "properties": {"ipv6Prefix": {"type": "string"}}, "description": "Describes the IPv4 prefix option for a network interface."}}, "interfaceType": {"type": "string"}, "ipv6Addresses": {"type": "array", "items": {"type": "object", "properties": {"ipv6Address": {"type": "string"}}, "description": "Describes an IPv6 address."}}, "ipv4PrefixCount": {"type": "integer", "format": "int64"}, "ipv6PrefixCount": {"type": "integer", "format": "int64"}, "ipv6AddressCount": {"type": "integer", "format": "int64"}, "networkCardIndex": {"type": "integer", "format": "int64"}, "privateIPAddress": {"type": "string"}, "networkInterfaceID": {"type": "string"}, "privateIPAddresses": {"type": "array", "items": {"type": "object", "properties": {"primary": {"type": "boolean"}, "privateIPAddress": {"type": "string"}}, "description": "Describes a secondary private IPv4 address for a network interface."}}, "deleteOnTermination": {"type": "boolean"}, "associatePublicIPAddress": {"type": "boolean"}, "associateCarrierIPAddress": {"type": "boolean"}, "secondaryPrivateIPAddressCount": {"type": "integer", "format": "int64"}}, "description": "Describes a network interface."}, "description": "The network interfaces to associate with the instance. If you specify a network\ninterface, you must specify any security groups and subnets as part of the\nnetwork interface."}, "hibernationOptions": {"type": "object", "properties": {"configured": {"type": "boolean"}}, "description": "Indicates whether an instance is enabled for hibernation. For more information,\nsee Hibernate your instance (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/Hibernate.html)\nin the Amazon EC2 User Guide.\n\nYou can't enable hibernation and Amazon Web Services Nitro Enclaves on the\nsame instance."}, "iamInstanceProfile": {"type": "object", "properties": {"arn": {"type": "string"}, "name": {"type": "string"}}, "description": "The name or Amazon Resource Name (ARN) of an IAM instance profile."}, "maintenanceOptions": {"type": "object", "properties": {"autoRecovery": {"type": "string"}}, "description": "The maintenance and recovery options for the instance."}, "blockDeviceMappings": {"type": "array", "items": {"type": "object", "properties": {"ebs": {"type": "object", "properties": {"iops": {"type": "integer", "format": "int64"}, "kmsKeyID": {"type": "string"}, "encrypted": {"type": "boolean"}, "outpostARN": {"type": "string"}, "snapshotID": {"type": "string"}, "throughput": {"type": "integer", "format": "int64"}, "volumeSize": {"type": "integer", "format": "int64"}, "volumeType": {"type": "string"}, "deleteOnTermination": {"type": "boolean"}}, "description": "Describes a block device for an EBS volume."}, "noDevice": {"type": "string"}, "deviceName": {"type": "string"}, "virtualName": {"type": "string"}}, "description": "Describes a block device mapping, which defines the EBS volumes and instance\nstore volumes to attach to an instance at launch."}, "description": "The block device mapping, which defines the EBS volumes and instance store\nvolumes to attach to the instance at launch. For more information, see Block\ndevice mappings (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/block-device-mapping-concepts.html)\nin the Amazon EC2 User Guide."}, "creditSpecification": {"type": "object", "properties": {"cpuCredits": {"type": "string"}}, "description": "The credit option for CPU usage of the burstable performance instance. Valid\nvalues are standard and unlimited. To change this attribute after launch,\nuse ModifyInstanceCreditSpecification (https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ModifyInstanceCreditSpecification.html).\nFor more information, see Burstable performance instances (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/burstable-performance-instances.html)\nin the Amazon EC2 User Guide.\n\nDefault: standard (T2 instances) or unlimited (T3/T3a/T4g instances)\n\nFor T3 instances with host tenancy, only standard is supported."}, "disableAPITermination": {"type": "boolean", "description": "If you set this parameter to true, you can't terminate the instance using\nthe Amazon EC2 console, CLI, or API; otherwise, you can. To change this attribute\nafter launch, use ModifyInstanceAttribute (https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ModifyInstanceAttribute.html).\nAlternatively, if you set InstanceInitiatedShutdownBehavior to terminate,\nyou can terminate the instance by running the shutdown command from the instance.\n\nDefault: false"}, "instanceMarketOptions": {"type": "object", "properties": {"marketType": {"type": "string"}, "spotOptions": {"type": "object", "properties": {"maxPrice": {"type": "string"}, "validUntil": {"type": "string", "format": "date-time"}, "spotInstanceType": {"type": "string"}, "blockDurationMinutes": {"type": "integer", "format": "int64"}, "instanceInterruptionBehavior": {"type": "string"}}, "description": "The options for Spot Instances."}}, "description": "The market (purchasing) option for the instances.\n\nFor RunInstances, persistent Spot Instance requests are only supported when\nInstanceInterruptionBehavior is set to either hibernate or stop."}, "licenseSpecifications": {"type": "array", "items": {"type": "object", "properties": {"licenseConfigurationARN": {"type": "string"}}, "description": "Describes a license configuration."}, "description": "The license configurations."}, "privateDNSNameOptions": {"type": "object", "properties": {"hostnameType": {"type": "string"}, "enableResourceNameDNSARecord": {"type": "boolean"}, "enableResourceNameDNSAAAARecord": {"type": "boolean"}}, "description": "The options for the instance hostname. The default values are inherited from\nthe subnet."}, "elasticGPUSpecification": {"type": "array", "items": {"type": "object", "properties": {"type_": {"type": "string"}}, "description": "A specification for an Elastic Graphics accelerator."}, "description": "An elastic GPU to associate with the instance. An Elastic GPU is a GPU resource\nthat you can attach to your Windows instance to accelerate the graphics performance\nof your applications. For more information, see Amazon EC2 Elastic GPUs (https://docs.aws.amazon.com/AWSEC2/latest/WindowsGuide/elastic-graphics.html)\nin the Amazon EC2 User Guide."}, "elasticInferenceAccelerators": {"type": "array", "items": {"type": "object", "properties": {"count": {"type": "integer", "format": "int64"}, "type_": {"type": "string"}}, "description": "Describes an elastic inference accelerator."}, "description": "An elastic inference accelerator to associate with the instance. Elastic\ninference accelerators are a resource you can attach to your Amazon EC2 instances\nto accelerate your Deep Learning (DL) inference workloads.\n\nYou cannot specify accelerators from different generations in the same request."}, "capacityReservationSpecification": {"type": "object", "properties": {"capacityReservationTarget": {"type": "object", "properties": {"capacityReservationID": {"type": "string"}, "capacityReservationResourceGroupARN": {"type": "string"}}, "description": "Describes a target Capacity Reservation or Capacity Reservation group."}, "capacityReservationPreference": {"type": "string"}}, "description": "Information about the Capacity Reservation targeting option. If you do not\nspecify this parameter, the instance's Capacity Reservation preference defaults\nto open, which enables it to run in any open Capacity Reservation that has\nmatching a