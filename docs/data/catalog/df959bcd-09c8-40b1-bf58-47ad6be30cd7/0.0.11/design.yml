s.html#flow-log-records).\nIf you omit this parameter, the flow log is created using the default format.\nIf you specify this parameter, you must specify at least one field.\n\nSpecify the fields using the ${field-id} format, separated by spaces. For\nthe CLI, surround this parameter value with single quotes on Linux or double\nquotes on Windows."}, "resourceID": {"type": "string"}, "trafficType": {"type": "string", "description": "The type of traffic to log. You can log traffic that the resource accepts\nor rejects, or all traffic."}, "logGroupName": {"type": "string", "description": "The name of a new or existing CloudWatch Logs log group where Amazon EC2\npublishes your flow logs.\n\nIf you specify LogDestinationType as s3, do not specify DeliverLogsPermissionArn\nor LogGroupName."}, "resourceType": {"type": "string", "description": "The type of resource for which to create the flow log. For example, if you\nspecified a VPC ID for the ResourceId property, specify VPC for this property."}, "logDestination": {"type": "string", "description": "The destination to which the flow log data is to be published. Flow log data\ncan be published to a CloudWatch Logs log group or an Amazon S3 bucket. The\nvalue specified for this parameter depends on the value specified for LogDestinationType.\n\nIf LogDestinationType is not specified or cloud-watch-logs, specify the Amazon\nResource Name (ARN) of the CloudWatch Logs log group. For example, to publish\nto a log group called my-logs, specify arn:aws:logs:us-east-1:123456789012:log-group:my-logs.\nAlternatively, use LogGroupName instead.\n\nIf LogDestinationType is s3, specify the ARN of the Amazon S3 bucket. You\ncan also specify a subfolder in the bucket. To specify a subfolder in the\nbucket, use the following ARN format: bucket_ARN/subfolder_name/. For example,\nto specify a subfolder named my-logs in a bucket named my-bucket, use the\nfollowing ARN: arn:aws:s3:::my-bucket/my-logs/. You cannot use AWSLogs as\na subfolder na