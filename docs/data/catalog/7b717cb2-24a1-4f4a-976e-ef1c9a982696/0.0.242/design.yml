 between them and visualize it as a tagset around the matching components.", "svgComplete": "", "border-color": "#808080", "border-style": "dashed", "border-width": 0, "primaryColor": "#00B39F", "secondaryColor": "#FFDE00", "body-text-color": "#808080", "background-image": "none", "background-opacity": 0, "body-text-font-size": 21, "body-text-font-weight": "400", "body-text-vertical-align": "center", "body-text-horizontal-align": "center"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "isAnnotation": true, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "TextBox", "schema": "", "version": "core.meshery.io/v1alpha1"}, "description": "", "displayName": "", "capabilities": [], "configuration": {}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "c0822c83-05f6-4c41-bea9-0bf39a889709", "model": {"id": "6b49e0cc-6d83-f917-b2bd-30b69792bb20", "name": "meshery-core", "model": {"version": "0.7.2"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/meshery-core-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/meshery-core-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#00B39F", "secondaryColor": "#00D3A9"}, "components": null, "registrant": {"id": "13df38ce-edc0-8c01-ed9f-0414912a43fd", "kind": "meshery", "name": "meshery", "type": "registry", "status": "registered", "sub_type": "", "created_at": "2025-10-24T06:57:02.370822597Z", "deleted_at": null, "updated_at": "2025-10-24T06:57:02.370822597Z", "schemaVersion": ""}, "displayName": "Meshery Core", "subCategory": "Application Definition & Image Build", "connection_id": "13df38ce-edc0-8c01-ed9f-0414912a43fd", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "JSON", "status": "enabled", "styles": {"shape": "rectangle", "width": 1644.4039, "height": 216.99625, "opacity": 1, "padding": 6, "z-index": 113, "position": {"x": 1113.3649239518174, "y": 4328.141338279505}, "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/textbox-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/textbox-white.svg", "body-text": "Similar to Parent-Child relationships, Inventory Wallet relationships represent a relationship where a component is directly attached to another component, such as a sidecar container or WASM filter. These are visualized as a badge at the bottom right corner of the parent component with the number of inventory items displayed as a label.\n\nTo create an Inventory Wallet relationship:\n\n    Drag the attachment component (like a sidecar) to the host component\n    After successful creation, a green badge will appear on the host component\n    Clicking on this badge reveals all inventory items", "svgComplete": "", "border-color": "#808080", "border-style": "dashed", "border-width": 0, "primaryColor": "#00B39F", "secondaryColor": "#FFDE00", "body-text-color": "#808080", "background-image": "none", "background-opacity": 0, "body-text-font-size": 21, "body-text-font-weight": "400", "body-text-vertical-align": "center", "body-text-horizontal-align": "center"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "isAnnotation": true, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "TextBox", "schema": "", "version": "core.meshery.io/v1alpha1"}, "description": "", "displayName": "", "capabilities": [], "configuration": {}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "d698f06c-941e-4eed-80bc-0bb854ac892c", "model": {"id": "6b49e0cc-6d83-f917-b2bd-30b69792bb20", "name": "meshery-core", "model": {"version": "0.7.2"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/meshery-core-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/meshery-core-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#00B39F", "secondaryColor": "#00D3A9"}, "components": null, "registrant": {"id": "13df38ce-edc0-8c01-ed9f-0414912a43fd", "kind": "meshery", "name": "meshery", "type": "registry", "status": "registered", "sub_type": "", "created_at": "2025-10-24T06:57:02.370822597Z", "deleted_at": null, "updated_at": "2025-10-24T06:57:02.370822597Z", "schemaVersion": ""}, "displayName": "Meshery Core", "subCategory": "Application Definition & Image Build", "connection_id": "13df38ce-edc0-8c01-ed9f-0414912a43fd", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "JSON", "status": "enabled", "styles": {"shape": "rectangle", "width": 1648.4039, "height": 188.9099, "opacity": 1, "padding": 6, "z-index": 114, "position": {"x": 1048.365463072253, "y": 5561.657170698385}, "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/textbox-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/textbox-white.svg", "body-text": "Alias Relationship represents a type of hierarchical relationship where a child component serves as a reference or shortcut to a part of its parent’s configuration.\n\nThe child component, known as an alias, mirrors or links to a specific field within the parent’s configuration. Aliases do not have an independent lifecycle (for example, they cannot be deployed separately) but exist to simplify configuration management and improve visualization.\n\nExamples of aliases include:\nContainers within a Deployment or a Pod.", "svgComplete": "", "border-color": "#808080", "border-style": "dashed", "border-width": 0, "primaryColor": "#00B39F", "secondaryColor": "#FFDE00", "body-text-color": "#808080", "background-image": "none", "background-opacity": 0, "body-text-font-size": 21, "body-text-font-weight": "400", "body-text-vertical-align": "center", "body-text-horizontal-align": "center"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "isAnnotation": true, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "TextBox", "schema": "", "version": "core.meshery.io/v1alpha1"}, "description": "", "displayName": "", "capabilities": [], "configuration": {}, "schemaVersion": "components.meshery.io/v1beta1"}, {"id": "d7529152-1572-4e1b-a7cb-46c3dedd1b21", "model": {"id": "6b49e0cc-6d83-f917-b2bd-30b69792bb20", "name": "meshery-core", "model": {"version": "0.7.2"}, "status": "enabled", "version": "v1.0.0", "category": {"id": "9ca27d0d-66ce-42a9-8c85-6236563f2ddb", "name": "Orchestration & Management"}, "metadata": {"shape": "circle", "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/meshery-core-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/meshery-core-white.svg", "svgComplete": "", "isAnnotation": false, "primaryColor": "#00B39F", "secondaryColor": "#00D3A9"}, "components": null, "registrant": {"id": "13df38ce-edc0-8c01-ed9f-0414912a43fd", "kind": "meshery", "name": "meshery", "type": "registry", "status": "registered", "sub_type": "", "created_at": "2025-10-24T06:57:02.370822597Z", "deleted_at": null, "updated_at": "2025-10-24T06:57:02.370822597Z", "schemaVersion": ""}, "displayName": "Meshery Core", "subCategory": "Application Definition & Image Build", "connection_id": "13df38ce-edc0-8c01-ed9f-0414912a43fd", "relationships": null, "schemaVersion": "models.meshery.io/v1beta1", "components_count": 0, "relationships_count": 0}, "format": "JSON", "status": "enabled", "styles": {"shape": "rectangle", "width": 1648.4039, "height": 290.16034, "opacity": 1, "padding": 6, "z-index": 115, "position": {"x": 1065.1448732200015, "y": 2617.110893120415}, "svgColor": "ui/public/static/img/meshmodels/meshery-core/color/textbox-color.svg", "svgWhite": "ui/public/static/img/meshmodels/meshery-core/white/textbox-white.svg", "body-text": "The Edge-Reference relationship type represents a logical or declarative link between two components, where one component refers to another by name, identifier, type, or scope. This relationship allows components to dynamically locate, associate with, or depend on other components without being tightly coupled to them. It forms the basis for indirect communication, configuration reuse, ownership tracking, and dependency resolution in distributed systems.\n\nThis type of relationship does not directly provide communication, access, or permission, but enables such interactions by declaring intent or pointing to another component.\n\nExample of an Edge-Reference Relationship\n\n    - A component that refers to a configuration object (e.g., referencing a config file or environment settings).\n    - A workload component referencing a credentials object or identity provider.\n    - A service referencing a volume or storage claim.\n    - A managed resource referencing its controller or owner entity.", "svgComplete": "", "border-color": "#808080", "border-style": "dashed", "border-width": 0, "primaryColor": "#00B39F", "secondaryColor": "#FFDE00", "body-text-color": "#808080", "background-image": "none", "background-opacity": 0, "body-text-font-size": 21, "body-text-font-weight": "400", "body-text-vertical-align": "center", "body-text-horizontal-align": "center"}, "version": "v1.0.0", "metadata": {"genealogy": "", "published": false, "isAnnotation": true, "isNamespaced": false, "instanceDetails": null, "configurationUISchema": ""}, "component": {"kind": "TextBox", "schema": "", "version": "core.meshery.io/v1alpha1"}, "description": "", "displayName": "", "capabilities": [], "configuration": {}, "schemaVersion": "components.meshery.io/v1beta1"}, {