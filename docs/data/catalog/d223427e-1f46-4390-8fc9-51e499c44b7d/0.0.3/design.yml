"], "properties": {"ingress": {"type": "object", "properties": {"tls": {"type": "array", "items": {"type": "object", "properties": {"hosts": {"type": "array", "items": {"type": "string"}, "description": "hosts is a list of hosts included in the TLS certificate. The values in\nthis list must match the name/s used in the tlsSecret. Defaults to the\nwildcard host setting for the loadbalancer controller fulfilling this\nIngress, if left unspecified.", "x-kubernetes-list-type": "atomic"}, "secretName": {"type": "string", "description": "secretName is the name of the secret used to terminate TLS traffic on\nport 443. Field is left optional to allow TLS routing based on SNI\nhostname alone. If the SNI host in a listener conflicts with the \"Host\"\nheader field used by an IngressRule, the SNI host is used for termination\nand value of the \"Host\" header is used for routing."}}, "description": "IngressTLS describes the transport layer security associated with an ingress."}, "description": "TLS configuration. Currently the Ingress only supports a single TLS\nport, 443. If multiple members of this list specify different hosts, they\nwill be multiplexed on the same port according to the hostname specified\nthrough the SNI TLS extension, if the ingress controller fulfilling the\ningress supports SNI."}, "rules": {"type": "array", "items": {"type": "object", "required": ["http"], "properties": {"host": {"type": "string", "description": "Host is the fully qualified domain name of a network host, as defined by RFC 3986.\nNote the following deviations from the \"host\" part of the\nURI as defined in RFC 3986:\n1. IPs are not allowed. Currently an IngressRuleValue can only apply to\n   the IP in the Spec of the parent Ingress.\n2. The `:` delimiter is not respected because ports are not allowed.\n\t  Currently the port of an Ingress is implicitly :80 for http and\n\t  :443 for https.\nBoth these may change in the future.\nIncoming requests are matched against the host before the\nIngressRuleValue. If the host is unspecified, the Ingress routes all\ntraffic based on the specified IngressRuleValue.\n\n\nHost can be \"precise\" which is a domain name without the terminating dot of\na network host (e.g. \"foo.bar.com\") or \"wildcard\", which is a domain name\nprefixed with a single wildcard label (e.g. \"*.foo.com\").\nThe wildcard character '*' must appear by itself as the first DNS label and\nmatches only a single label. You cannot have a wildcard label by itself (e.g. Host == \"*\").\nRequests will be matched against the Host field in the following way:\n1. If Host is precise, the request matches this rule if the http host header is equal to Host.\n2. If Host is a wildcard, then the request matches this rule if the http host header\nis to equal to the suffix (removing the first label) of the wildcard rule."}, "http": {"type": "object", "required": ["paths"], "properties": {"paths": {"type": "array", "items": {"type": "object", "required": ["backend", "pathType"], "properties": {"path": {"type": "string", "description": "path is matched against the path of an incoming request. Currently it can\ncontain characters disallowed from the conventional \"path\" part of a URL\nas defined by RFC 3986. Paths must begin with a '/' and must be present\nwhen using PathType with value \"Exact\" or \"Prefix\"."}, "backend": {"type": "object", "properties": {"service": {"type": "object", "required": ["name"], "properties": {"name": {"type": "string", "description": "name is the referenced service. The service must exist in\nthe same namespace as the Ingress object."}, "port": {"type": "object", "properties": {"name": {"type": "string", "description": "name is the name of the port on the Service.\nThis is a mutually exclusive setting with \"Number\"."}, "number": {"type": "integer", "format": "int32", "description": "number is the numerical port number (e.g. 80) on the Service.\nThis is a mutually exclusive setting with \"Name\"."}}, "description": "port of the referenced service. A port name or port number\nis required for a IngressServiceBackend."}}, "description": "service references a service as a backend.\nThis is a mutually exclusive setting with \"Resource\"."}, "resource": {"type": "object", "required": ["kind", "name"], "properties": {"kind": {"type": "string", "description": "Kind is the type of resource being referenced"}, "name": {"type": "string", "description": "Name is the name of resource being referenced"}, "apiGroup": {"type": "string", "description": "APIGroup is the group for the resource being referenced.\nIf APIGroup is not specified, the specified Kind must be in the core API group.\nFor any other third-party types, APIGroup is required."}}, "description": "resource is an ObjectRef to another Kubernetes resource in the namespace\nof the Ingress object. If resource is specified, a service.Name and\nservice.Port must not be specified.\nThis is a mutually exclusive setting with \"Service\".", "x-kubernetes-map-type": "atomic"}}, "description": "backend defines the referenced service endpoint to which the traffic\nwill be forwarded to."}, "pathType": {"type": "string", "description": "pathType determines the interpretation of the path matching. PathType can\nbe one of the following values:\n* Exact: Matches the URL path exactly.\n* Prefix: Matches based on a URL path prefix split by '/'. Matching is\n  done on a path element by element basis. A path element refers is the\n  list of labels in the path split by the '/' separator. A request is a\n  match for path p if every p is an element-wise prefix of p of the\n  request path. Note that if the last element of the path is a substring\n  of the last element in request path, it is not a match (e.g. /foo/bar\n  matches /foo/bar/baz, but does not match /foo/barbaz).\n* ImplementationSpecific: Interpretation of the Path matching is up to\n  the IngressClass. Implementations can treat this as a separate PathType\n  or treat it identically to Prefix or Exact path types.\nImplementations are required to support all path types."}}, "description": "HTTPIngressPath associates a path with a backend. Incoming urls matching the\npath are forwarded to the backend."}, "description": "paths is a collection of paths that map requests to backends.", "x-kubernetes-list-type": "atomic"}}, "description": "HTTPIngressRuleValue is a list of http selectors\npointing to backends. In the example: http://<host>/<path>?<searchpart>\n-> backend where where parts of the url correspond to\nRFC 3986, this resource will be used to match against\neverything after the last '/' and before the first '?'\nor '#'."}}, "description": "IngressRule represents the rules mapping the paths under a specified host to\nthe related backend services. Incoming requests are first evaluated for a host\nmatch, then routed to the backend associated with the matching IngressRuleValue."}, "description": "A list of host rules used to configure the Ingress. If unspecified, or\nno rule matches, all traffic is sent to the default backend."}, "backend": {"type": "object", "properties": {"service": {"type": "object", "required": ["name"], "properties": {"name": {"type": "string", "description": "name is the referenced service. The service must exist in\nthe same namespace as the Ingress object."}, "port": {"type": "object", "properties": {"name": {"type": "string", "description": "name is the name of the port on the Service.\nThis is a mutually exclusive setting with \"Number\"."}, "number": {"type": "integer", "format": "int32", "description": "number is the numerical port number (e.g. 80) on the Service.\nThis is a mutually exclusive setting with \"Name\"."}}, "description": "port of the referenced service. A port name or port number\nis required for a IngressServiceBackend."}}, "description": "service references a service as a backend.\nThis is a mutually exclusive setting with \"Resource\"."}, "resource": {"type": "object", "required": ["kind", "name"], "properties": {"kind": {"type": "string", "description": "Kind is the type of resource being referenced"}, "name": {"type": "string", "description": "Name is the name of resource being referenced"}, "apiGroup": {"type": "string", "description": "APIGroup is the group for the resource being referenced.\nIf APIGroup is not specified, the specified Kind must be in the core API group.\nFor any other third-party types, APIGroup is required."}}, "description": "resource is an ObjectRef to another Kubernetes resource in the namespace\nof the Ingress object. If resource is specified, a service.Name and\nservice.Port must not be specified.\nThis is a mutually exclusive setting with \"Service\".", "x-kubernetes-map-type": "atomic"}}, "description": "A default backend capable of servicing requests that don't match any\nrule. At least one of 'backend' or 'rules' must be specified. This field\nis optional to allow the loadbalancer controller or defaulting logic to\nspecify a global default."}, "ingressClassName": {"type": "string", "description": "IngressClassName is the name of the IngressClass cluster resource. The\nassociated IngressClass defines which controller will implement the\nresource. This replaces the deprecated `kubernetes.io/ingress.class`\nannotation. For backwards compatibility, when that annotation is set, it\nmust be given precedence over this field. The controller may emit a\nwarning if the field and annotation have different values.\nImplementations of this API should ignore Ingresses without a class\nspecified. An IngressClass resource may be marked as default, which can\nbe used to set a default value for this field. For more information,\nrefer to the IngressClass documentation."}}, "description": "Gslb-enabled Ingress Spec"}, "strategy": {"type": "object", "required": ["type"], "properties": {"type": {"type": "string", "description": "Load balancing strategy type:(roundRobin|failover)"}, "weight": {"type": "object", "description": "Weight is defined by map region:weight", "