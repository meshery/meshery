  /api/integrations/connections:
    get:
      x-internal:
        - cloud
        - meshery
      tags:
        - Connection_API_Connections
      operationId: getConnections
      summary: Get all connections
      description: >-
        Returns a paginated list of connections for the authenticated user with filtering, sorting and pagination
        support
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: pageSize
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: search
          in: query
          description: Search term
          required: false
          schema:
            type: string
            maxLength: 500
        - name: order
          in: query
          description: Sort order
          required: false
          schema:
            type: string
            maxLength: 500
        - name: orgId
          in: query
          description: Organization ID to scope the request.
          required: false
          schema:
            type: string
            format: uuid
        - name: filter
          in: query
          description: Filter connections (general filter string)
          required: false
          schema:
            type: string
            maxLength: 500
        - name: kind
          in: query
          description: Filter by connection kind (e.g., kubernetes, prometheus, grafana)
          required: false
          schema:
            type: array
            items:
              type: string
              maxLength: 255
        - name: status
          in: query
          description: Filter by connection status
          required: false
          schema:
            type: array
            items:
              type: string
              description: Connection Status Value
              x-go-name: ConnectionStatusValue
              enum:
                - discovered
                - registered
                - connected
                - ignored
                - maintenance
                - disconnected
                - deleted
                - not found
        - name: type
          in: query
          description: Filter by connection type
          required: false
          schema:
            type: array
            items:
              type: string
              maxLength: 255
        - name: name
          in: query
          description: Filter by connection name (partial match supported)
          required: false
          schema:
            type: string
            maxLength: 255
      responses:
        '200':
          description: Paginated list of connections with summary information
          content:
            application/json:
              schema:
                description: Represents a page of connections with meta information about connections count
                additionalProperties: false
                type: object
                required:
