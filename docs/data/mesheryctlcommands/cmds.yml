global:
  name: mesheryctl
  description: Meshery Command Line tool
  usage: mesheryctl [flags]
  example: |2

    // Base command:
    mesheryctl

    // Display help about command/subcommand:
    mesheryctl --help
    mesheryctl system start --help

    // For viewing verbose output:
    mesheryctl -v [or] --verbose
  flags:
    config:
      name: --config
      description: path to config file
      usage: mesheryctl --config <value>
    help:
      name: --help, -h
      description: help for mesheryctl
      usage: mesheryctl --help
    verbose:
      name: --verbose, -v
      description: verbose output
      usage: mesheryctl --verbose
  subcommands:
    version:
      name: version
      description: Show Meshery CLI and Server versions
      usage: mesheryctl version [flags]
      example: "\n// To view the current version and SHA of release binary of mesheryctl
        client \nmesheryctl version\n\t"
      flags:
        help:
          name: --help, -h
          description: help for version
          usage: mesheryctl version --help
    completion:
      name: completion
      description: Generate shell completion scripts
      usage: mesheryctl completion [bash|zsh|fish]
      example: "\n// ### bash <= 3.2\nsource /dev/stdin <<< \"$(mesheryctl completion
        bash)\"\n\n// bash <= 3.2 on osx\n// ensure you have bash-completion 1.3+\nbrew
        install bash-completion \nmesheryctl completion bash > $(brew --prefix)/etc/bash_completion.d/mesheryctl\n\n//
        ### bash >= 4.0\nsource <(mesheryctl completion bash)\n\n// bash >= 4.0 on
        osx\nbrew install bash-completion@2\nmesheryctl completion bash > $(brew --prefix)/etc/bash_completion.d/mesheryctl\n\n//
        ### zsh\n// If shell completion is not already enabled in your environment
        you will need\n// to enable it.  You can execute the following once:\n// Might
        need to start a new shell for this setup to take effect.\n$ echo \"autoload
        -U compinit; compinit\" >> ~/.zshrc\nsource <(mesheryctl completion zsh)\n\n//
        zsh on osx / oh-my-zsh\nCOMPLETION_DIR=$(echo $fpath | grep -o '[^ ]*completions'
        | grep -v cache) && mkdir -p $COMPLETION_DIR && mesheryctl completion zsh
        > \"${COMPLETION_DIR}/_mesheryctl\"\n\n// ### fish:\nmesheryctl completion
        fish | source\n// To load fish shell completions for each session, execute
        once:\nmesheryctl completion fish > ~/.config/fish/completions/mesheryctl.fish"
      flags:
        help:
          name: --help, -h
          description: help for completion
          usage: mesheryctl completion --help
system:
  name: system
  description: Configure, deploy, and operate Meshery deployments
  usage: mesheryctl system [flags]
  flags:
    context:
      name: --context, -c
      description: (optional) temporarily change the current context.
      usage: mesheryctl system --context <value>
    help:
      name: --help, -h
      description: help for system
      usage: mesheryctl system --help
    "yes":
      name: --yes, -y
      description: (optional) assume yes for user interactive prompts.
      usage: mesheryctl system --yes
  subcommands:
    check:
      name: check
      description: Pre-deployment and post-deployment healthchecks for Meshery
      usage: mesheryctl system check [flags]
      example: "\n// Run all system checks for both pre and post-deployment scenarios\nmesheryctl
        system check\n\n// Run pre-deployment checks (Docker and Kubernetes)\nmesheryctl
        system check --preflight\n\n// Run pre-deployment checks (Docker and Kubernetes)\nmesheryctl
        system check --pre\n\n// Run checks for all Meshery adapters\nmesheryctl system
        check --adapters\n\n// Run checks on a specific Meshery adapter\nmesheryctl
        system check --adapter meshery-istio:10000\nmesheryctl system check --adapter
        meshery-istio\n\n// Verify the health of Meshery Operator's deployment with
        MeshSync and Broker\nmesheryctl system check --operator\n\t"
      flags:
        adapter:
          name: --adapter
          description: Check status of specified meshery adapter
          usage: mesheryctl system check --adapter <value>
        adapters:
          name: --adapters
          description: Check status of meshery adapters
          usage: mesheryctl system check --adapters
        components:
          name: --components
          description: Check status of Meshery components
          usage: mesheryctl system check --components
        help:
          name: --help, -h
          description: help for check
          usage: mesheryctl system check --help
        operator:
          name: --operator
          description: Verify the health of Meshery Operator's deployment with MeshSync
            and Broker
          usage: mesheryctl system check --operator
        pre:
          name: --pre
          description: Verify environment readiness to deploy Meshery
          usage: mesheryctl system check --pre
        preflight:
          name: --preflight
          description: Verify environment readiness to deploy Meshery
          usage: mesheryctl system check --preflight
    dashboard:
      name: dashboard
      description: Open Meshery UI in browser.
      usage: mesheryctl system dashboard [flags]
      example: |2-

        // Open Meshery UI in browser
        mesheryctl system dashboard

        // Open Meshery UI in browser and use port-forwarding (if default port is taken already)
        mesheryctl system dashboard --port-forward

        // Open Meshery UI in browser and use port-forwarding, listen on port 9081 locally, forwarding traffic to meshery server in the pod
        mesheryctl system dashboard --port-forward -p 9081

        // (optional) skip opening of MesheryUI in browser.
        mesheryctl system dashboard --skip-browser

        Note: Meshery's web-based user interface is embedded in Meshery Server and is available as soon as Meshery starts. The location and port that Meshery UI is exposed varies depending upon your mode of deployment. See accessing \"Meshery UI\" for additional deployment-specific options: https://docs.meshery.io/installation/accessing-meshery-ui.
      flags:
        help:
          name: --help, -h
          description: help for dashboard
          usage: mesheryctl system dashboard --help
        port:
          name: --port, -p
          description: (optional) Local port that is not in use from which traffic
            is to be forwarded to the server running inside the Pod.
          usage: mesheryctl system dashboard --port <value>
        port-forward:
          name: --port-forward
          description: (optional) Use port forwarding to access Meshery UI
          usage: mesheryctl system dashboard --port-forward
        skip-browser:
          name: --skip-browser
          description: (optional) skip opening of MesheryUI in browser.
          usage: mesheryctl system dashboard --skip-browser
    delete:
      name: delete
      description: Delete Meshery containers
      usage: mesheryctl system delete [flags]
      example: |2

        // Delete Meshery containers
        mesheryctl system delete

        // Delete Meshery containers without confirmation
        mesheryctl system delete -y
      flags:
        help:
          name: --help, -h
          description: help for delete
          usage: mesheryctl system delete --help
    login:
      name: login
      description: Authenticate to a Meshery Server
      usage: mesheryctl system login [flags]
      example: "\n// Login with the Meshery Provider of your choice: the Local Provider
        or a Remote Provider.\nmesheryctl system login\n\n// Login with the Meshery
        Provider by specifying it via -p or --provider flag.\nmesheryctl system login
        -p Meshery\n\t"
      flags:
        help:
          name: --help, -h
          description: help for login
          usage: mesheryctl system login --help
        provider:
          name: --provider, -p
          description: login Meshery with specified provider
          usage: mesheryctl system login --provider <value>
    logout:
      name: logout
      description: Remove authentication for Meshery Server
      usage: mesheryctl system logout [flags]
      example: "\n// Logout current session with your Meshery Provider.\nmesheryctl
        system logout\n\t"
      flags:
        help:
          name: --help, -h
          description: help for logout
          usage: mesheryctl system logout --help
    logs:
      name: logs
      description: Print logs
      usage: mesheryctl system logs [flags]
      example: "\n// Show logs (without tailing)\nmesheryctl system logs\n\n// Starts
        tailing Meshery server debug logs (works with components also)\nmesheryctl
        system logs --follow\nmesheryctl system logs meshery-istio\n\t"
      flags:
        follow:
          name: --follow, -f
          description: (Optional) Follow the stream of the Meshery's logs. Defaults
            to false.
          usage: mesheryctl system logs --follow
        help:
          name: --help, -h
          description: help for logs
          usage: mesheryctl system logs --help
    reset:
      name: reset
      description: Reset Meshery's configuration
      usage: mesheryctl system reset [flags]
      example: "\n// Resets meshery.yaml file with a copy from Meshery repo\nmesheryctl
        system reset\n\t"
      flags:
        help:
          name: --help, -h
          description: help for reset
          usage: mesheryctl system reset --help
    restart:
      name: restart
      description: Stop, then start Meshery
      usage: mesheryctl system restart [flags]
      example: "\n// Restart all Meshery containers, their instances and their connected
        volumes\nmesheryctl system restart\n\n// (optional) skip checking for new
        updates available in Meshery.\nmesheryctl system restart --skip-update\n\t"
      flags:
        help:
          name: --help, -h
          description: help for restart
          usage: mesheryctl system restart --help
        provider:
          name: --provider
          description: Provider to use with the Meshery server
          usage: mesheryctl system restart --provider <value>
        skip-update:
          name: --skip-update
          description: (optional) skip checking for new Meshery's container images.
          usage: mesheryctl system restart --skip-update
    start:
      name: start
      description: Start Meshery
      usage: mesheryctl system start [flags]
      example: "\n// Start meshery\nmesheryctl system start\n\n// (optional) skip
        opening of MesheryUI in browser.\nmesheryctl system start --skip-browser\n\n//
        (optional) skip checking for new updates available in Meshery.\nmesheryctl
        system start --skip-update\n\n// Reset Meshery's configuration file to default
        settings.\nmesheryctl system start --reset\n\n// Specify Platform to deploy
        Meshery to.\nmesheryctl system start -p docker\n\n// Specify Provider to use.\nmesheryctl
        system start --provider Meshery\n\t"
      flags:
        help:
          name: --help, -h
          description: help for start
          usage: mesheryctl system start --help
        platform:
          name: --platform, -p
          description: platform to deploy Meshery to.
          usage: mesheryctl system start --platform <value>
        provider:
          name: --provider
          description: (optional) Defaults to the provider specified in the current
            context
          usage: mesheryctl system start --provider <value>
        reset:
          name: --reset
          description: (optional) reset Meshery's configuration file to default settings.
          usage: mesheryctl system start --reset
        skip-browser:
          name: --skip-browser
          description: (optional) skip opening of MesheryUI in browser.
          usage: mesheryctl system start --skip-browser
        skip-update:
          name: --skip-update
          description: (optional) skip checking for new Meshery's container images.
          usage: mesheryctl system start --skip-update
    status:
      name: status
      description: Check Meshery status
      usage: mesheryctl system status [flags]
      example: "\n// Check status of Meshery, Meshery adapters, Meshery Operator and
        its controllers.\nmesheryctl system status\n\n// (optional) Extra data in
        status table\nmesheryctl system status --verbose\n\t"
      flags:
        help:
          name: --help, -h
          description: help for status
          usage: mesheryctl system status --help
        verbose:
          name: --verbose, -v
          description: (optional) Extra data in status table
          usage: mesheryctl system status --verbose
    stop:
      name: stop
      description: Stop Meshery
      usage: mesheryctl system stop [flags]
      example: "\n// Stop Meshery\nmesheryctl system stop\n\n// Reset Meshery's configuration
        file to default settings.\nmesheryctl system stop --reset\n\n// (optional)
        keep the Meshery namespace during uninstallation\nmesheryctl system stop --keep-namespace\n\n//
        Stop Meshery forcefully (use it when system stop doesn't work)\nmesheryctl
        system stop --force\n\t"
      flags:
        force:
          name: --force
          description: (optional) uninstall Meshery resources forcefully
          usage: mesheryctl system stop --force
        help:
          name: --help, -h
          description: help for stop
          usage: mesheryctl system stop --help
        keep-namespace:
          name: --keep-namespace
          description: (optional) keep the Meshery namespace during uninstallation
          usage: mesheryctl system stop --keep-namespace
        reset:
          name: --reset
          description: (optional) reset Meshery's configuration file to default settings.
          usage: mesheryctl system stop --reset
    token:
      name: token
      description: Manage Meshery user tokens
      usage: mesheryctl system token [flags]
      flags:
        help:
          name: --help, -h
          description: help for token
          usage: mesheryctl system token --help
      subcommands:
        create:
          name: create
          description: Create a token in your meshconfig
          usage: mesheryctl system token create [flags]
          example: "\nmesheryctl system token create [token-name] -f [token-path]\nmesheryctl
            system token create [token-name] (default path is auth.json)\nmesheryctl
            system token create [token-name] -f [token-path] --set\n\t"
          flags:
            filepath:
              name: --filepath, -f
              description: Add the token location
              usage: mesheryctl system token create --filepath <value>
            help:
              name: --help, -h
              description: help for create
              usage: mesheryctl system token create --help
            set:
              name: --set, -s
              description: Set as current token
              usage: mesheryctl system token create --set
        delete:
          name: delete
          description: Delete a token from your meshconfig
          usage: mesheryctl system token delete [flags]
          example: "\nmesheryctl system token delete [token-name]\n\t"
          flags:
            help:
              name: --help, -h
              description: help for delete
              usage: mesheryctl system token delete --help
        list:
          name: list
          description: List tokens
          usage: mesheryctl system token list [flags]
          example: "\nmesheryctl system token list\n\t"
          flags:
            help:
              name: --help, -h
              description: help for list
              usage: mesheryctl system token list --help
        set:
          name: set
          description: Set token for context
          usage: mesheryctl system token set [flags]
          example: "\nmesheryctl system token set [token-name] \n\t"
          flags:
            context:
              name: --context
              description: Pass the context
              usage: mesheryctl system token set --context <value>
            help:
              name: --help, -h
              description: help for set
              usage: mesheryctl system token set --help
        view:
          name: view
          description: View token
          usage: mesheryctl system token view [flags]
          example: "\nmesheryctl system token view [token-name]\nmesheryctl system
            token view (show token of current context)\n\t"
          flags:
            all:
              name: --all
              description: set the flag to view all the tokens.
              usage: mesheryctl system token view --all
            help:
              name: --help, -h
              description: help for view
              usage: mesheryctl system token view --help
    update:
      name: update
      description: Pull new Meshery images/manifest files.
      usage: mesheryctl system update [flags]
      example: "\n// Pull new Meshery images from Docker Hub. This does not update
        mesheryctl. This command may be executed while Meshery is running.\nmesheryctl
        system update\n\n// Pull the latest manifest files alone\nmesheryctl system
        update --skip-reset\n\t"
      flags:
        help:
          name: --help, -h
          description: help for update
          usage: mesheryctl system update --help
        skip-reset:
          name: --skip-reset
          description: (optional) skip checking for new Meshery manifest files.
          usage: mesheryctl system update --skip-reset
system-channel:
  name: system channel
  description: Switch between release channels
  usage: mesheryctl system channel [flags]
  example: "\n// Subscribe to release channel or version\nmesheryctl system channel\n\n//
    To set the channel\nmesheryctl system channel set [stable|stable-version|edge|edge-version]\n\n//
    To pin/set the channel to a specific version\nmesheryctl system channel set stable-v0.6.0\n\n//
    To view release channel and version\nmesheryctl system channel view\n\n// To switch
    release channel and version\nmesheryctl system channel switch [stable|stable-version|edge|edge-version]\n\t"
  flags:
    help:
      name: --help, -h
      description: help for channel
      usage: mesheryctl system channel --help
  subcommands:
    set:
      name: set
      description: set release channel and version
      usage: mesheryctl system channel set [stable|stable-version|edge|edge-version]
        [flags]
      example: "\n// Subscribe to release channel or version\nmesheryctl system channel
        set [stable|stable-version|edge|edge-version]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for set
          usage: mesheryctl system channel set --help
    switch:
      name: switch
      description: switch release channel and version
      usage: mesheryctl system channel switch [stable|stable-version|edge|edge-version]
        [flags]
      example: "\n// Switch between release channels\nmesheryctl system channel switch
        [stable|stable-version|edge|edge-version]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for switch
          usage: mesheryctl system channel switch --help
    view:
      name: view
      description: view release channel and version
      usage: mesheryctl system channel view [flags]
      example: "\n// View current release channel\nmesheryctl system channel view\n\t"
      flags:
        all:
          name: --all, -a
          description: Show release channel for all contexts
          usage: mesheryctl system channel view --all
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl system channel view --help
system-context:
  name: system context
  description: Configure your Meshery deployment(s)
  usage: mesheryctl system context [command] [flags]
  example: "\n// Base command\nmesheryctl system context\n\t"
  flags:
    context:
      name: --context, -c
      description: (optional) temporarily change the current context.
      usage: mesheryctl system context --context <value>
    help:
      name: --help, -h
      description: help for context
      usage: mesheryctl system context --help
  subcommands:
    create:
      name: create
      description: Create a new context (a named Meshery deployment)
      usage: mesheryctl system context create context-name [flags]
      example: "\n// Create new context\nmesheryctl system context create [context-name]\n\n//
        Create new context and provide list of components, platform & URL\nmesheryctl
        system context create context-name --components meshery-nsm --platform docker
        --url http://localhost:9081 --set --yes\n\t"
      flags:
        components:
          name: --components, -a
          description: List of components
          usage: mesheryctl system context create --components <value>
        help:
          name: --help, -h
          description: help for create
          usage: mesheryctl system context create --help
        platform:
          name: --platform, -p
          description: Platform to deploy Meshery
          usage: mesheryctl system context create --platform <value>
        provider:
          name: --provider
          description: Provider to use with the Meshery server
          usage: mesheryctl system context create --provider <value>
        set:
          name: --set, -s
          description: Set as current context
          usage: mesheryctl system context create --set
        url:
          name: --url, -u
          description: Meshery Server URL with Port
          usage: mesheryctl system context create --url <value>
    delete:
      name: delete
      description: Delete context
      usage: mesheryctl system context delete [context-name] [flags]
      example: "\n// ### Delete context\nmesheryctl system context delete [context
        name]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for delete
          usage: mesheryctl system context delete --help
        set:
          name: --set, -s
          description: New context to deploy Meshery
          usage: mesheryctl system context delete --set <value>
    list:
      name: list
      description: list contexts
      usage: mesheryctl system context list [flags]
      example: "\n// List all contexts present\nmesheryctl system context list\n\t"
      flags:
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl system context list --help
    switch:
      name: switch
      description: switch context
      usage: mesheryctl system context switch context-name [flags]
      example: "\n// Switch to context named \"sample\"\nmesheryctl system context
        switch sample\n\t"
      flags:
        help:
          name: --help, -h
          description: help for switch
          usage: mesheryctl system context switch --help
    view:
      name: view
      description: Display the current Meshery CLI configuration context
      usage: mesheryctl system context view [context-name | --context context-name
        | --all] --flags [flags]
      example: "\n// View the default context\nmesheryctl system context view\n\n//
        View a specified context\nmesheryctl system context view context-name\n\n//
        View a specified context using the --context flag\nmesheryctl system context
        view --context context-name\n\n// View configuration of all contexts\nmesheryctl
        system context view --all\n    "
      flags:
        all:
          name: --all
          description: Show configs for all of the context
          usage: mesheryctl system context view --all
        context:
          name: --context, -c
          description: Show config for the context
          usage: mesheryctl system context view --context <value>
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl system context view --help
system-provider:
  name: system provider
  description: Switch between providers
  usage: mesheryctl system provider [flags]
  example: "\n// To view provider\nmesheryctl system provider view\n// To list all
    available providers\nmesheryctl system provider list\n// To set a provider\nmesheryctl
    system provider set [provider]\n// To switch provider and redeploy Meshery\nmesheryctl
    system provider switch [provider]\n// To clear the configured provider\nmesheryctl
    system provider reset\n\t"
  flags:
    help:
      name: --help, -h
      description: help for provider
      usage: mesheryctl system provider --help
  subcommands:
    list:
      name: list
      description: list available providers
      usage: mesheryctl system provider list [flags]
      example: "\n// List all available providers\nmesheryctl system provider list\n\t"
      flags:
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl system provider list --help
    reset:
      name: reset
      description: Clear the configured provider
      usage: mesheryctl system provider reset [flags]
      example: "\n// Clear the configured provider\nmesheryctl system provider reset\n\t"
      flags:
        help:
          name: --help, -h
          description: help for reset
          usage: mesheryctl system provider reset --help
    set:
      name: set
      description: set provider
      usage: mesheryctl system provider set [provider] [flags]
      example: "\n// Set provider\nmesheryctl system provider set [provider]\n\t"
      flags:
        force:
          name: --force, -f
          description: Force set provider
          usage: mesheryctl system provider set --force
        help:
          name: --help, -h
          description: help for set
          usage: mesheryctl system provider set --help
    switch:
      name: switch
      description: switch provider and redeploy
      usage: mesheryctl system provider switch [provider] [flags]
      example: "\n// Switch provider and redeploy Meshery\nmesheryctl system provider
        switch [provider]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for switch
          usage: mesheryctl system provider switch --help
    view:
      name: view
      description: view provider
      usage: mesheryctl system provider view [flags]
      example: "\n// View current provider\nmesheryctl system provider view\n\t"
      flags:
        all:
          name: --all, -a
          description: Show provider for all contexts
          usage: mesheryctl system provider view --all
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl system provider view --help
perf:
  name: perf
  description: Run performance tests
  usage: mesheryctl perf [flags]
  example: |2

    // Run performance test:
    mesheryctl perf apply test-3 --name "a quick stress test" --url http://192.168.1.15/productpage --qps 300 --concurrent-requests 2 --duration 30s

    // List performance profiles:
    mesheryctl perf profile sam-test

    // List performance results:
    mesheryctl perf result sam-test

    // Display Perf profile in JSON or YAML:
    mesheryctl perf result -o json
    mesheryctl perf result -o yaml
  flags:
    help:
      name: --help, -h
      description: help for perf
      usage: mesheryctl perf --help
    output-format:
      name: --output-format, -o
      description: (optional) format to display in [json|yaml]
      usage: mesheryctl perf --output-format <value>
    token:
      name: --token, -t
      description: (required) Path to meshery auth config
      usage: mesheryctl perf --token <value>
    "yes":
      name: --yes, -y
      description: (optional) assume yes for user interactive prompts.
      usage: mesheryctl perf --yes
  subcommands:
    apply:
      name: apply
      description: Run a Performance test
      usage: mesheryctl perf apply [profile-name] [flags]
      example: "\n// Execute a Performance test with the specified performance profile\nmesheryctl
        perf apply meshery-profile [flags]\n\n// Execute a Performance test with creating
        a new performance profile\nmesheryctl perf apply meshery-profile-new --url
        \"https://google.com\"\n\n// Execute a Performance test creating a new performance
        profile and pass certificate to be used\nmesheryctl perf apply meshery-profile-new
        --url \"https://google.com\" --cert-path path/to/cert.pem\n\n// Execute a
        performance profile without using the certificate present in the profile\nmesheryctl
        perf apply meshery-profile --url \"https://google.com\" --disable-cert\n\n//
        Run Performance test using SMP compatible test configuration\n// If the profile
        already exists, the test will be run overriding the values with the ones provided
        in the configuration file\nmesheryctl perf apply meshery-profile -f path/to/perf-config.yaml\n\n//
        Run performance test using SMP compatible test configuration and override
        values with flags\nmesheryctl perf apply meshery-profile -f path/to/perf-config.yaml
        [flags]\n\n// Choice of load generator - fortio, wrk2 or nighthawk (default:
        fortio)\nmesheryctl perf apply meshery-profile --load-generator wrk2\n\n//
        Execute a Performance test with specified queries per second\nmesheryctl perf
        apply meshery-profile --url https://192.168.1.15/productpage --qps 30\n\n//
        Execute a Performance test with specified infrastructure\nmesheryctl perf
        apply meshery-profile --url https://192.168.1.15/productpage --mesh istio\n\n//
        Execute a Performance test creating a new performance profile and pass options
        to the load generator used\n// If any options are already present in the profile
        or passed through flags, the --options flag will take precedence over the
        profile and flag options\n// Options for nighthawk - https://github.com/layer5io/getnighthawk/blob/v1.0.5/pkg/proto/options.pb.go#L882-L1018\n//
        Options for fortio - https://github.com/fortio/fortio/blob/v1.57.0/fhttp/httprunner.go#L77-L84\n//
        Options for wrk2 - https://github.com/layer5io/gowrk2/blob/v0.6.1/api/gowrk2.go#L47-L53\nmesheryctl
        perf apply meshery-profile-new --url \"https://google.com\" --options [filepath|json-string]\nmesheryctl
        perf apply meshery-profile-new --url \"https://google.com\" --options path/to/options.json\nmesheryctl
        perf apply meshery-profile-new --url \"https://google.com\" --load-generator
        nighthawk --options '{\"requests_per_second\": 10, \"max_pending_requests\":
        5}'\nmesheryctl perf apply meshery-profile-new --url \"https://google.com\"
        --load-generator fortio --options '{\"MethodOverride\": \"POST\"}'\nmesheryctl
        perf apply meshery-profile-new --url \"https://google.com\" --load-generator
        wrk2 --options '{\"DurationInSeconds\": 15, \"Thread\": 3}'\n\t"
      flags:
        body:
          name: --body, -b
          description: (optional) Load test body. Can be a filepath/string
          usage: mesheryctl perf apply --body <value>
        cert-path:
          name: --cert-path
          description: (optional) Path to the certificate to be used for the load
            test
          usage: mesheryctl perf apply --cert-path <value>
        concurrent-requests:
          name: --concurrent-requests
          description: (optional) Number of Parallel Requests
          usage: mesheryctl perf apply --concurrent-requests <value>
        disable-cert:
          name: --disable-cert
          description: (optional) Do not use certificate present in the profile
          usage: mesheryctl perf apply --disable-cert
        duration:
          name: --duration
          description: (optional) Length of test (e.g. 10s, 5m, 2h). For more, see
            https://golang.org/pkg/time/#ParseDuration
          usage: mesheryctl perf apply --duration <value>
        file:
          name: --file, -f
          description: (optional) File containing SMP-compatible test configuration.
            For more, see https://github.com/layer5io/service-mesh-performance-specification
          usage: mesheryctl perf apply --file <value>
        help:
          name: --help, -h
          description: help for apply
          usage: mesheryctl perf apply --help
        load-generator:
          name: --load-generator
          description: (optional) Load-Generator to be used (fortio/wrk2/nighthawk)
          usage: mesheryctl perf apply --load-generator <value>
        mesh:
          name: --mesh
          description: (optional) Name of the infrastructure
          usage: mesheryctl perf apply --mesh <value>
        name:
          name: --name
          description: (optional) Name of the Test
          usage: mesheryctl perf apply --name <value>
        options:
          name: --options
          description: (optional) Additional options to be passed to the load generator.
            Can be a json string or a filepath containing json
          usage: mesheryctl perf apply --options <value>
        qps:
          name: --qps
          description: (optional) Queries per second
          usage: mesheryctl perf apply --qps <value>
        url:
          name: --url
          description: (optional) Endpoint URL to test (required with --profile)
          usage: mesheryctl perf apply --url <value>
    profile:
      name: profile
      description: List performance profiles
      usage: mesheryctl perf profile [profile-name] [flags]
      example: |2

        // List performance profiles (maximum 25 profiles)
        mesheryctl perf profile

        // List performance profiles with search (maximum 25 profiles)
        mesheryctl perf profile test 2

        // View single performance profile with detailed information
        mesheryctl perf profile test --view
      flags:
        help:
          name: --help, -h
          description: help for profile
          usage: mesheryctl perf profile --help
        page:
          name: --page, -p
          description: (optional) List next set of performance results with --page
            (default = 1)
          usage: mesheryctl perf profile --page <value>
        view:
          name: --view
          description: (optional) View single performance profile with more info
          usage: mesheryctl perf profile --view
    result:
      name: result
      description: List performance test results
      usage: mesheryctl perf result [profile-name] [flags]
      example: |2

        // List Test results (maximum 25 results)
        mesheryctl perf result saturday-profile

        // View other set of performance results with --page (maximum 25 results)
        mesheryctl perf result saturday-profile --page 2

        // View single performance result with detailed information
        mesheryctl perf result saturday-profile --view
      flags:
        help:
          name: --help, -h
          description: help for result
          usage: mesheryctl perf result --help
        page:
          name: --page, -p
          description: (optional) List next set of performance results with --page
            (default = 1)
          usage: mesheryctl perf result --page <value>
        view:
          name: --view
          description: (optional) View single performance results with more info
          usage: mesheryctl perf result --view
adapter:
  name: adapter
  description: Connect and use Meshery adapters
  usage: mesheryctl adapter [flags]
  flags:
    help:
      name: --help, -h
      description: help for adapter
      usage: mesheryctl adapter --help
    token:
      name: --token, -t
      description: Path to token for authenticating to Meshery API
      usage: mesheryctl adapter --token <value>
  subcommands:
    deploy:
      name: deploy
      description: Deploy infrastructure to the Kubernetes cluster
      usage: mesheryctl adapter deploy [flags]
      example: "\n// Deploy a infrastructure from an interactive on the default namespace\nmesheryctl
        adapter deploy\n\n// Deploy infrastructure\nmesheryctl adapter deploy linkerd\n\n//
        Deploy Linkerd mesh on a specific namespace\nmesheryctl adapter deploy linkerd
        --namespace linkerd-ns\n\n// Deploy Linkerd mesh and wait for it to be deployed\nmesheryctl
        adapter deploy linkerd --watch\n\t\t"
      flags:
        help:
          name: --help, -h
          description: help for deploy
          usage: mesheryctl adapter deploy --help
        namespace:
          name: --namespace, -n
          description: Kubernetes namespace to be used for deploying the validation
            tests and sample workload
          usage: mesheryctl adapter deploy --namespace <value>
        token:
          name: --token, -t
          description: Path to token for authenticating to Meshery API
          usage: mesheryctl adapter deploy --token <value>
        watch:
          name: --watch, -w
          description: Watch for events and verify operation (in beta testing)
          usage: mesheryctl adapter deploy --watch
    remove:
      name: remove
      description: remove cloud and cloud native infrastructure
      usage: mesheryctl adapter remove [flags]
      example: "\n// Remove Linkerd deployment\nmesheryctl adapter remove linkerd\n\n//
        Remove a Linkerd control plane found under a specific namespace (linkerd-ns)\nmesheryctl
        adapter remove linkerd --namespace linkerd-ns\n\t\t"
      flags:
        help:
          name: --help, -h
          description: help for remove
          usage: mesheryctl adapter remove --help
        namespace:
          name: --namespace, -n
          description: Kubernetes namespace where the mesh is deployed
          usage: mesheryctl adapter remove --namespace <value>
    validate:
      name: validate
      description: Validate conformance to predefined standards
      usage: mesheryctl adapter validate [flags]
      example: "\n// Validate conformance to predefined standards\nmesheryctl adapter
        validate [mesh name] --adapter [name of the adapter] --tokenPath [path to
        token for authentication] --spec [specification to be used for conformance
        test] --namespace [namespace to be used]\n\n// Validate Istio to predefined
        standards\nmesheryctl adapter validate istio --adapter meshery-istio --spec
        smi\n\t"
      flags:
        adapter:
          name: --adapter, -a
          description: (Required) Adapter to use for validation
          usage: mesheryctl adapter validate --adapter <value>
        help:
          name: --help, -h
          description: help for validate
          usage: mesheryctl adapter validate --help
        spec:
          name: --spec, -s
          description: (Required) specification to be used for conformance test (smi/istio-vet)
          usage: mesheryctl adapter validate --spec <value>
        token:
          name: --token, -t
          description: Path to token for authenticating to Meshery API
          usage: mesheryctl adapter validate --token <value>
        watch:
          name: --watch, -w
          description: Watch for events and verify operation (in beta testing)
          usage: mesheryctl adapter validate --watch
design:
  name: design
  description: Manage cloud native designs
  usage: mesheryctl design [flags]
  example: |2

    // Apply design file:
    mesheryctl design apply --file [path to design file | URL of the file]

    // Delete design file:
    mesheryctl design delete --file [path to design file]

    // View design file:
    mesheryctl design view [design name | ID]

    // List all designs:
    mesheryctl design list
  flags:
    help:
      name: --help, -h
      description: help for design
      usage: mesheryctl design --help
    token:
      name: --token, -t
      description: Path to token file default from current context
      usage: mesheryctl design --token <value>
  subcommands:
    apply:
      name: apply
      description: Apply design file
      usage: mesheryctl design apply [flags]
      example: "\n// apply a design file\nmesheryctl design apply -f [file | URL]\n\n//
        deploy a saved design\nmesheryctl design apply [design-name]\n\t"
      flags:
        file:
          name: --file, -f
          description: Path to design file
          usage: mesheryctl design apply --file <value>
        help:
          name: --help, -h
          description: help for apply
          usage: mesheryctl design apply --help
        skip-save:
          name: --skip-save
          description: Skip saving a design
          usage: mesheryctl design apply --skip-save
    delete:
      name: delete
      description: Delete design file
      usage: mesheryctl design delete [flags]
      example: "\n// delete a design file\nmesheryctl design delete [file | URL]\n\t"
      flags:
        file:
          name: --file, -f
          description: Path to design file
          usage: mesheryctl design delete --file <value>
        help:
          name: --help, -h
          description: help for delete
          usage: mesheryctl design delete --help
    deploy:
      name: deploy
      description: Deploy design
      usage: mesheryctl design deploy [flags]
      example: "\n// Deploy design by providing file path\nmesheryctl design deploy
        -f [filepath] -s [source type]\n\t"
      flags:
        file:
          name: --file, -f
          description: Path to design file
          usage: mesheryctl design deploy --file <value>
        help:
          name: --help, -h
          description: help for deploy
          usage: mesheryctl design deploy --help
        skip-save:
          name: --skip-save
          description: Skip saving a design
          usage: mesheryctl design deploy --skip-save
        source-type:
          name: --source-type, -s
          description: Type of source file (ex. manifest / compose / helm)
          usage: mesheryctl design deploy --source-type <value>
    export:
      name: export
      description: Export a design from Meshery
      usage: mesheryctl design export [pattern-name | ID] [flags]
      example: "\n// Export a design with a specific ID\nmesheryctl design export
        [pattern-name | ID]\n\n// Export a design with a specific ID and type\nmesheryctl
        design export [pattern-name | ID] --type [design-type]\n\n// Export a design
        and save it to a specific directory\nmesheryctl design export [pattern-name
        | ID] --output ./designs\n\n// Export a design with a specific type and save
        it to a directory\nmesheryctl design export [pattern-name | ID] --type [design-type]
        --output ./exports\n\t"
      flags:
        help:
          name: --help, -h
          description: help for export
          usage: mesheryctl design export --help
        output:
          name: --output, -o
          description: Specify the output directory to save the design
          usage: mesheryctl design export --output <value>
        type:
          name: --type
          description: Specify the design type to export
          usage: mesheryctl design export --type <value>
    import:
      name: import
      description: Import a Meshery design
      usage: mesheryctl design import [flags]
      example: "\n// Import design manifest\nmesheryctl design import -f [file/URL]
        -s [source-type] -n [name]\n\nmesheryctl design import -f design.tar\nmesheryctl
        design import -f design.yml -n design-name\nmesheryctl design import -f design.yml
        -s \"Kubernetes Manifest\" -n design-name\n\t"
      flags:
        file:
          name: --file, -f
          description: Path/URL to design file
          usage: mesheryctl design import --file <value>
        help:
          name: --help, -h
          description: help for import
          usage: mesheryctl design import --help
        name:
          name: --name, -n
          description: Name for the design file
          usage: mesheryctl design import --name <value>
        source-type:
          name: --source-type, -s
          description: Type of source file (ex. manifest / compose / helm / design)
          usage: mesheryctl design import --source-type <value>
    list:
      name: list
      description: List designs
      usage: mesheryctl design list [flags]
      example: "\n// Display a list of all available designs\nmesheryctl design list\n\n//
        Display a list of all available designs with verbose output\nmesheryctl design
        list --verbose\n\n// Display a list of all available designs with specified
        page number (10 designs per page by default)\nmesheryctl design list --page
        [pange-number]\n\n// Display a list of all available designs with custom page
        size (10 designs per page by default)\nmesheryctl design list --pagesize [page-size]\n\n//
        Display only the count of all available designs\nmesheryctl design list --count\n\t"
      flags:
        count:
          name: --count, -c
          description: (optional) Display count only
          usage: mesheryctl design list --count
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl design list --help
        page:
          name: --page, -p
          description: (optional) List next set of designs with --page
          usage: mesheryctl design list --page <value>
        pagesize:
          name: --pagesize
          description: (optional) Number of designs to be displayed per page
          usage: mesheryctl design list --pagesize <value>
        verbose:
          name: --verbose, -v
          description: (optional) Display full length user identifiers and detailed
            timestamps
          usage: mesheryctl design list --verbose
    undeploy:
      name: undeploy
      description: Undeploy design
      usage: mesheryctl design undeploy [flags]
      example: "\n// Undeploy design by providing file path\nmesheryctl design undeploy
        -f [filepath]\n\t"
      flags:
        file:
          name: --file, -f
          description: Path to design file
          usage: mesheryctl design undeploy --file <value>
        help:
          name: --help, -h
          description: help for undeploy
          usage: mesheryctl design undeploy --help
    view:
      name: view
      description: Display a design content
      usage: mesheryctl design view design name [flags]
      example: "\n// view a design\nmesheryctl design view [design-name | ID]\n\t"
      flags:
        all:
          name: --all, -a
          description: (optional) view all designs available
          usage: mesheryctl design view --all
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl design view --help
        output-format:
          name: --output-format, -o
          description: (optional) format to display in [json|yaml]
          usage: mesheryctl design view --output-format <value>
filter:
  name: filter
  description: Manage WebAssembly filters
  usage: mesheryctl filter [flags]
  example: |2

    // Base command for WASM filters:
    mesheryctl filter [subcommands]
  flags:
    help:
      name: --help, -h
      description: help for filter
      usage: mesheryctl filter --help
    token:
      name: --token, -t
      description: Path to token file default from current context
      usage: mesheryctl filter --token <value>
  subcommands:
    delete:
      name: delete
      description: Delete a filter file
      usage: mesheryctl filter delete [filter-name | ID] [flags]
      example: "\n// Delete the specified WASM filter file using name or ID\n// A
        unique prefix of the name or ID can also be provided. If the prefix is not
        unique, the first match will be deleted.\nmesheryctl filter delete [filter-name
        | ID]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for delete
          usage: mesheryctl filter delete --help
    import:
      name: import
      description: Import a WASM filter
      usage: mesheryctl filter import [URI] [flags]
      example: "\n// Import a filter file from local filesystem\nmesheryctl filter
        import /path/to/filter.wasm\n\n// Import a filter file from a remote URI\nmesheryctl
        filter import https://example.com/myfilter.wasm\n\n// Add WASM configuration\n//
        If the string is a valid file in the filesystem, the file is read and passed
        as a string. Otherwise, the string is passed as is.\n// Use quotes if the
        string contains spaces\nmesheryctl filter import /path/to/filter.wasm --wasm-config
        [filepath|string]\n\n// Specify the name of the filter to be imported. Use
        quotes if the name contains spaces\nmesheryctl filter import /path/to/filter.wasm
        --name [string]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for import
          usage: mesheryctl filter import --help
        name:
          name: --name, -n
          description: (optional) filter name
          usage: mesheryctl filter import --name <value>
        wasm-config:
          name: --wasm-config, -w
          description: (optional) WASM configuration filepath/string
          usage: mesheryctl filter import --wasm-config <value>
    list:
      name: list
      description: List filters
      usage: mesheryctl filter list [flags]
      example: "\n// List all WASM filter files present\nmesheryctl filter list\t(maximum
        25 filters)\n\n// Search for filter\nmesheryctl filter list Test (maximum
        25 filters)\n\n// Search for filter with space\nmesheryctl filter list 'Test
        Filter' (maximum 25 filters)\n\t"
      flags:
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl filter list --help
        page:
          name: --page, -p
          description: (optional) List next set of filters with --page (default =
            1)
          usage: mesheryctl filter list --page <value>
        verbose:
          name: --verbose, -v
          description: Display full length user and filter file identifiers
          usage: mesheryctl filter list --verbose
    view:
      name: view
      description: View filter(s)
      usage: mesheryctl filter view [flags]
      example: "\n// View the specified WASM filter\n// A unique prefix of the name
        or ID can also be provided. If the prefix is not unique, the first match will
        be returned.\nmesheryctl filter view \"[filter-name | ID]\"\n\n// View all
        filter files\nmesheryctl filter view --all\n\n// View all filter files in
        json\nmesheryctl filter view --all --output-format json\n\n// View all filter
        files in json and save it to a file\nmesheryctl filter view --all --output-format
        json -s\n\n//View multi-word named filter files. Multi-word filter names should
        be enclosed in quotes\nmesheryctl filter view \"filter name\"\n        "
      flags:
        all:
          name: --all, -a
          description: (optional) view all filters available
          usage: mesheryctl filter view --all
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl filter view --help
        output-format:
          name: --output-format, -o
          description: (optional) format to display in [json|yaml]
          usage: mesheryctl filter view --output-format <value>
        save:
          name: --save, -s
          description: (optional) save output as a JSON/YAML file
          usage: mesheryctl filter view --save
registry:
  name: registry
  description: Manage the capability registry
  usage: mesheryctl registry [flags]
  example: mesheryctl registry [subcommand]
  flags:
    help:
      name: --help, -h
      description: help for registry
      usage: mesheryctl registry --help
  subcommands:
    generate:
      name: generate
      description: Generate Models
      usage: mesheryctl registry generate [flags]
      example: "\n// Generate Meshery Models from a Google Spreadsheet (i.e. \"Meshery
        Integrations\" spreadsheet).\nmesheryctl registry generate --spreadsheet-id
        \"1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw\" --spreadsheet-cred \"$CRED\"\n\n//
        Directly generate models from one of the supported registrants by using Registrant
        Connection Definition and (optional) Registrant Credential Definition\nmesheryctl
        registry generate --registrant-def [path to connection definition] --registrant-cred
        [path to credential definition]\n\n// Generate a specific Model from a Google
        Spreadsheet (i.e. \"Meshery Integrations\" spreadsheet).\nmesheryctl registry
        generate --spreadsheet-id \"1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw\"
        --spreadsheet-cred --model \"[model-name]\"\n\n// Generate Meshery Models
        and Component from csv files in a local directory.\nmesheryctl registry generate
        --directory [DIRECTORY_PATH]\n\n// Generate Meshery Models from individual
        CSV files.\nmesheryctl registry generate --model-csv [path/to/models.csv]
        --component-csv [path/to/components.csv] --relationship-csv [path/to/relationships.csv]\n\n//
        Generate models with a custom per-model timeout (e.g., 10 minutes per model).\nmesheryctl
        registry generate --spreadsheet-id \"1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw\"
        --spreadsheet-cred \"$CRED\" --timeout 10m\n\n// Generate only the latest
        version of each model.\nmesheryctl registry generate --spreadsheet-id \"1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw\"
        --spreadsheet-cred \"$CRED\" --latest-only\n\t"
      flags:
        component-csv:
          name: --component-csv
          description: path to the component CSV file
          usage: mesheryctl registry generate --component-csv <value>
        directory:
          name: --directory, -d
          description: Directory containing the Model and Component CSV files
          usage: mesheryctl registry generate --directory <value>
        help:
          name: --help, -h
          description: help for generate
          usage: mesheryctl registry generate --help
        latest-only:
          name: --latest-only
          description: generate only the latest version of each model
          usage: mesheryctl registry generate --latest-only
        model:
          name: --model, -m
          description: specific model name to be generated
          usage: mesheryctl registry generate --model <value>
        model-csv:
          name: --model-csv
          description: path to the model CSV file
          usage: mesheryctl registry generate --model-csv <value>
        output:
          name: --output, -o
          description: location to output generated models, defaults to ../server/meshmodels
          usage: mesheryctl registry generate --output <value>
        registrant-cred:
          name: --registrant-cred
          description: path pointing to the registrant credential definition
          usage: mesheryctl registry generate --registrant-cred <value>
        registrant-def:
          name: --registrant-def
          description: path pointing to the registrant connection definition
          usage: mesheryctl registry generate --registrant-def <value>
        relationship-csv:
          name: --relationship-csv
          description: path to the relationship CSV file (optional)
          usage: mesheryctl registry generate --relationship-csv <value>
        spreadsheet-cred:
          name: --spreadsheet-cred
          description: base64 encoded credential to download the spreadsheet
          usage: mesheryctl registry generate --spreadsheet-cred <value>
        spreadsheet-id:
          name: --spreadsheet-id
          description: spreadsheet ID for the integration spreadsheet
          usage: mesheryctl registry generate --spreadsheet-id <value>
        timeout:
          name: --timeout
          description: 'timeout duration for generating each model (e.g., 5m, 10m,
            1h), default: 5m'
          usage: mesheryctl registry generate --timeout <value>
    publish:
      name: publish
      description: Publish Meshery Models to Websites, Remote Provider, Meshery Server
      usage: mesheryctl registry publish [system] [google-sheet-credential] [sheet-id]
        [models-output-path] [imgs-output-path] [flags]
      example: "\n// Publish To System\nmesheryctl registry publish [system] [google-sheet-credential]
        [sheet-id] [models-output-path] [imgs-output-path] -o [output-format]\n\n//
        Publish To Meshery\nmesheryctl registry publish meshery GoogleCredential GoogleSheetID
        [repo]/server/meshmodel\n\n// Publish To Remote Provider\nmesheryctl registry
        publish remote-provider GoogleCredential GoogleSheetID [repo]/meshmodels/models
        [repo]/ui/public/img/meshmodels\n\n// Publish To Website\nmesheryctl registry
        publish website GoogleCredential GoogleSheetID [repo]/integrations [repo]/ui/public/img/meshmodels\n\n//
        Publishing to meshery docs\ncd docs;\nmesheryctl registry publish website
        \"$CRED\" 1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw docs/pages/integrations
        docs/assets/img/integrations -o md\n\n// Publishing to mesheryio site\nmesheryctl
        registry publish website \"$CRED\" 1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw
        meshery.io/integrations meshery.io/assets/images/integration -o js\n\n// Publishing
        to any website\nmesheryctl registry publish website \"$CRED\" 1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw
        path/to/models path/to/icons -o mdx\n\t"
      flags:
        help:
          name: --help, -h
          description: help for publish
          usage: mesheryctl registry publish --help
        output-format:
          name: --output-format, -o
          description: output format [md | mdx | js]
          usage: mesheryctl registry publish --output-format <value>
    update:
      name: update
      description: Update the registry with latest data.
      usage: mesheryctl registry update [flags]
      example: "\n// Update models from Meshery Integration Spreadsheet\nmesheryctl
        registry update --spreadsheet-id [id] --spreadsheet-cred \"$CRED\" -i [path
        to the directory containing models].\n\n// Updating models in the meshery/meshery
        repository based on the spreadsheet\nmesheryctl registry update --spreadsheet-id
        1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw --spreadsheet-cred \"$CRED\"\n\n//
        Updating models in the meshery/meshery repository based on flag\nmesheryctl
        registry update --spreadsheet-id 1DZHnzxYWOlJ69Oguz4LkRVTFM79kC2tuvdwizOJmeMw
        --spreadsheet-cred \"$CRED\" --model \"[model-name]\"\n\t"
      flags:
        help:
          name: --help, -h
          description: help for update
          usage: mesheryctl registry update --help
        input:
          name: --input, -i
          description: relative or absolute input path to the models directory
          usage: mesheryctl registry update --input <value>
        model:
          name: --model, -m
          description: specific model name to be generated
          usage: mesheryctl registry update --model <value>
        spreadsheet-cred:
          name: --spreadsheet-cred
          description: base64 encoded credential to download the spreadsheet
          usage: mesheryctl registry update --spreadsheet-cred <value>
        spreadsheet-id:
          name: --spreadsheet-id
          description: spreadsheet it for the integration spreadsheet
          usage: mesheryctl registry update --spreadsheet-id <value>
model:
  name: model
  description: Manage models in the registery
  usage: mesheryctl model [flags]
  example: |2

    // Display number of available models in Meshery
    mesheryctl model --count

    // Export registred models
    mesheryctl model export [model-name]

    // Generate model(s)
    mesheryctl model export [model-name]

    // Import model(s)
    mesheryctl model import -f [Uri]

    // List available model(s)
    mesheryctl model list

    // Delete avaialbe model(s)
    mesheryctl model delete [model-id]

    // Search for a specific model
    mesheryctl model search [model-name]

    // View a specific model
    mesheryctl model view [model-name]

    // Scaffold a folder structure for model creation
    mesheryctl model init [model-name]

    // Create an OCI-compliant package from the model files
    mesheryctl model build [model-name]
    mesheryctl model build [model-name]/[model-version]
  flags:
    count:
      name: --count
      description: (optional) Get the number of models in total
      usage: mesheryctl model --count
    help:
      name: --help, -h
      description: help for model
      usage: mesheryctl model --help
  subcommands:
    build:
      name: build
      description: Create an OCI-compliant package from the model files
      usage: mesheryctl model build [flags]
      example: "\n// Create an OCI-compliant package from the model files\nmesheryctl
        model build [model-name]\nmesheryctl model build [model-name]/[model-version]\n
        \   "
      flags:
        help:
          name: --help, -h
          description: help for build
          usage: mesheryctl model build --help
        path:
          name: --path, -p
          description: '(optional) target directory to get model from (default: current
            dir)'
          usage: mesheryctl model build --path <value>
    delete:
      name: delete
      description: Delete a model
      usage: mesheryctl model delete [model-id | model-name] [flags]
      example: |2

        // Delete a model by ID
        mesheryctl model delete [model-id]

        // Delete a model by name
        mesheryctl model delete [model-name]
      flags:
        help:
          name: --help, -h
          description: help for delete
          usage: mesheryctl model delete --help
    export:
      name: export
      description: Export registered models
      usage: mesheryctl model export [flags]
      example: "\n// Export a model by name \nmesheryctl model export [model-name]
        -o [oci|tar]  (default is oci)\n\n// Export a model by name in JSON type\nmesheryctl
        model export [model-name] -t [yaml|json] (default is YAML)\n\n// Export a
        model by name in YAML type in a specific location\nmesheryctl model export
        [model-name] -l [path-to-location]\n\n// Export a model by name in YAML type
        discarding components and relationships\nmesheryctl model export [model-name]
        --discard-components --discard-relationships\n\n// Export a model version
        by name in YAML type\nmesheryctl model export [model-name] --version [version
        (ex: v0.7.3)]\n"
      flags:
        discard-components:
          name: --discard-components, -c
          description: (optional) whether to discard components in the exported model
            definition (default = false)
          usage: mesheryctl model export --discard-components
        discard-relationships:
          name: --discard-relationships, -r
          description: (optional) whether to discard relationships in the exported
            model definition (default = false)
          usage: mesheryctl model export --discard-relationships
        help:
          name: --help, -h
          description: help for export
          usage: mesheryctl model export --help
        output-format:
          name: --output-format, -t
          description: (optional) format to display in [json|yaml] (default = yaml)
          usage: mesheryctl model export --output-format <value>
        output-location:
          name: --output-location, -l
          description: (optional) output location (default = current directory)
          usage: mesheryctl model export --output-location <value>
        output-type:
          name: --output-type, -o
          description: (optional) format to display in [oci|tar] (default = oci)
          usage: mesheryctl model export --output-type <value>
        page:
          name: --page, -p
          description: (optional) page number for paginated results (default = 1)
          usage: mesheryctl model export --page <value>
        version:
          name: --version
          description: '(optional) model version to export (default = "", format:
            vX.X.X)'
          usage: mesheryctl model export --version <value>
    generate:
      name: generate
      description: Generate models from a file
      usage: mesheryctl model generate [flags]
      example: " \n// Generate a model from a CSV file(s)\nmesheryctl model generate
        --f [path-to-csv-drectory]\n\n// Generate a model from a Uri baesd on a JSON
        template\nmesheryctl model generate --f [URL] -t [path-to-template.json]\n\n//
        Generate a model from a Uri baesd on a JSON template skipping registration\nmesheryctl
        model generate --f [URL] -t [path-to-template.json] -r\n\t"
      flags:
        file:
          name: --file, -f
          description: Specify path to the file or directory
          usage: mesheryctl model generate --file <value>
        help:
          name: --help, -h
          description: help for generate
          usage: mesheryctl model generate --help
        register:
          name: --register, -r
          description: Skip registration of the model
          usage: mesheryctl model generate --register
        template:
          name: --template, -t
          description: Specify path to the template JSON file
          usage: mesheryctl model generate --template <value>
    import:
      name: import
      description: Import models
      usage: mesheryctl model import [flags]
      example: "\n// Import model\nmesheryctl model import --file [URI]\n \n// Import
        model from a URL to a meshery model\nmesheryctl model import --file [URL]\n\n//
        Import model from an OCI artifact\nmesheryctl model import --file [OCI]\n\n//
        Import model from a tar.gz file\nmesheryctl model import --file [path-to-model.tar.gz]\n\n//
        Import model from a path\nmesheryctl model import --file [path-to-model]\n\n//
        Import model using CSV files\nmesheryctl model import --file [path-to-csv-directory]\n\t"
      flags:
        file:
          name: --file, -f
          description: Specify path to the file or directory
          usage: mesheryctl model import --file <value>
        help:
          name: --help, -h
          description: help for import
          usage: mesheryctl model import --help
    init:
      name: init
      description: Generates scaffolding for convenient model creation
      usage: mesheryctl model init [flags]
      example: "\n// generates a folder structure\nmesheryctl model init [model-name]\n\n//
        generates a folder structure and sets up model version\nmesheryctl model init
        [model-name] --version [version] (default is v0.1.0)\n\n// generates a folder
        structure under specified path\nmesheryctl model init [model-name] --path
        [path-to-location] (default is current folder)\n\n// generate a folder structure
        in json format\nmesheryctl model init [model-name] --output-format [json|yaml|csv]
        (default is json)\n    "
      flags:
        help:
          name: --help, -h
          description: help for init
          usage: mesheryctl model init --help
        output-format:
          name: --output-format, -o
          description: (optional) format to display in [json|yaml]
          usage: mesheryctl model init --output-format <value>
        path:
          name: --path, -p
          description: '(optional) target directory (default: current dir)'
          usage: mesheryctl model init --path <value>
        version:
          name: --version
          description: '(optional) model version (default: v0.1.0)'
          usage: mesheryctl model init --version <value>
    list:
      name: list
      description: List registered models
      usage: mesheryctl model list [flags]
      example: "\n// List of models\nmesheryctl model list\n\n// List of models for
        a specified page\nmesheryctl model list --page [page-number] --pagesize [pagesize]\n\n//
        Display number of available models in Meshery\nmesheryctl model list --count\n
        \   "
      flags:
        count:
          name: --count, -c
          description: (optional) Get the number of models in total
          usage: mesheryctl model list --count
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl model list --help
        page:
          name: --page, -p
          description: (optional) List next set of models with --page (default = 1)
          usage: mesheryctl model list --page <value>
        pagesize:
          name: --pagesize, -s
          description: (optional) List next set of models with --pagesize (default
            = 10)
          usage: mesheryctl model list --pagesize <value>
    search:
      name: search
      description: Search model(s)
      usage: mesheryctl model search [flags]
      example: "\n// Search model from current provider\nmesheryctl model search [query-text]\n\n//
        Search list of models for a specified page\nmesheryctl model search [query-text]
        --page [page-number]\n\n// Search list of models for a specified pagesize\nmesheryctl
        model search [query-text] --pagesize [pagesize-number]\n\t"
      flags:
        help:
          name: --help, -h
          description: help for search
          usage: mesheryctl model search --help
        page:
          name: --page, -p
          description: (optional) List next set of models with --page (default = 1)
          usage: mesheryctl model search --page <value>
        pagesize:
          name: --pagesize, -s
          description: (optional) List next set of models with --pagesize (default
            = 10)
          usage: mesheryctl model search --pagesize <value>
    view:
      name: view
      description: View model
      usage: mesheryctl model view [flags]
      example: |2

        // View a specific model from current provider by using [model-name] or [model-id] in default format yaml
        mesheryctl model view [model-name]

        // View a specific model in specifed format
        mesheryctl model view [model-name] --output-format [json|yaml]

        // View a specific model in specified format and save it as a file
        mesheryctl model view [model-name] --output-format [json|yaml] --save
      flags:
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl model view --help
        output-format:
          name: --output-format, -o
          description: (optional) format to display in [json|yaml]
          usage: mesheryctl model view --output-format <value>
        save:
          name: --save, -s
          description: (optional) save output as a JSON/YAML file
          usage: mesheryctl model view --save
component:
