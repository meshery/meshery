connection:
  name: connection
  description: Manage Meshery connections
  usage: mesheryctl connection [flags]
  example: |2

    // Display total count of all available connections
    mesheryctl connection --count

    // Create a new Kubernetes connection using a specific type
    mesheryctl connection create --type aks
    mesheryctl connection create --type eks
    mesheryctl connection create --type gke
    mesheryctl connection create --type minikube

    // List all the connection
    mesheryctl connection list
    mesheryctl connection list --count

    // Delete a connection
    mesheryctl connection delete [connection_id]
  flags:
    count:
      name: --count, -c
      description: Display the count of total available connections
      usage: mesheryctl connection --count
    help:
      name: --help, -h
      description: help for connection
      usage: mesheryctl connection --help
  subcommands:
    create:
      name: create
      description: Create a new connection
      usage: mesheryctl connection create [flags]
      example: "\n// Create a new Kubernetes connection using a specific type\nmesheryctl
        connection create --type aks\nmesheryctl connection create --type eks\nmesheryctl
        connection create --type gke\nmesheryctl connection create --type minikube\n\n//
        Create a connection with a token\nmesheryctl connection create --type gke
        --token auth.json\n\t"
      flags:
        help:
          name: --help, -h
          description: help for create
          usage: mesheryctl connection create --help
        token:
          name: --token
          description: Path to token for authenticating to Meshery API
          usage: mesheryctl connection create --token <value>
        type:
          name: --type, -t
          description: Type of connection to create (aks|eks|gke|minikube)
          usage: mesheryctl connection create --type <value>
    delete:
      name: delete
      description: Delete a connection
      usage: mesheryctl connection delete [flags]
      example: |2

        // Delete a connection
        mesheryctl connection delete [connection_id]
      flags:
        help:
          name: --help, -h
          description: help for delete
          usage: mesheryctl connection delete --help
    list:
      name: list
      description: List all the connections
      usage: mesheryctl connection list [flags]
      example: |2

        // List all the connections
        mesheryctl connection list

        // List all the connections with page number
        mesheryctl connection list --page [page-number]

        // List all the connections matching a specific kind and status
        mesheryctl connection list --kind [kind] --status [status]

        // List all the connections matching a set of kinds and statuses
        mesheryctl connection list --kind [kind] --kind [kind] --status [status] --status [status]

        // Display total count of all available connections
        mesheryctl connection list --count
      flags:
        count:
          name: --count, -c
          description: Display the count of total available connections
          usage: mesheryctl connection list --count
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl connection list --help
        kind:
          name: --kind, -k
          description: Filter connections by kind
          usage: mesheryctl connection list --kind <value>
        page:
          name: --page, -p
          description: Page number
          usage: mesheryctl connection list --page <value>
        pagesize:
          name: --pagesize
          description: Number of connections per page
          usage: mesheryctl connection list --pagesize <value>
        status:
          name: --status, -s
          description: Filter connections by status
          usage: mesheryctl connection list --status <value>
    view:
      name: view
      description: View a connection
      usage: mesheryctl connection view [flags]
      example: "\n// View details of a specific connection in default format (yaml)\nmesheryctl
        connection view [connection-name|connection-id]\n\n// View details of a specific
        connection in JSON format\nmesheryctl connection view [connection-name|connection-id]
        --output-format json\n\n// View details of a specific connection in json format
        and save it to a file\nmesheryctl connection view [connection-name|connection-id]
        --output-format json --save\n\t"
      flags:
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl connection view --help
        output-format:
          name: --output-format, -o
          description: (optional) format to display in [json|yaml]
          usage: mesheryctl connection view --output-format <value>
        save:
          name: --save, -s
          description: (optional) save output as a JSON/YAML file
          usage: mesheryctl connection view --save
organization:
  name: organization
  description: Interact with registered organizations
  usage: mesheryctl organization [flags]
  example: "\n// Number of  registered orgs\nmesheryctl organization --count\n\n//
    List registerd orgs\nmesheryctl organization list\n\t"
  flags:
    count:
      name: --count
      description: total number of registered organizations
      usage: mesheryctl organization --count
    help:
      name: --help, -h
      description: help for organization
      usage: mesheryctl organization --help
  subcommands:
    list:
      name: list
      description: List registered organizations
      usage: mesheryctl organization list [flags]
      example: "\n// list all organizations\nmesheryctl organization list\n\n// list
        organizations for a specified page\nmesheryctl organization list --page [page-number]\n\n//
        Display number of available organizations\nmesheryctl organization list --count\n\t"
      flags:
        count:
          name: --count
          description: total number of registered orgs
          usage: mesheryctl organization list --count
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl organization list --help
        page:
          name: --page, -p
          description: (optional) Page number of paginated results
          usage: mesheryctl organization list --page <value>
        pagesize:
          name: --pagesize, -s
          description: (optional) Number of organizations per page
          usage: mesheryctl organization list --pagesize <value>
relationship:
  name: relationship
  description: Manage relationships
  usage: mesheryctl relationship [flags]
  example: "\n// Display number of available relationships in Meshery\nmesheryctl
    relationship --count\n\n// Generate a relationship documentation \nmesheryctl
    relationship generate [flags]\n\n// List available relationship(s)\nmesheryctl
    relationship list [flags]\n\n// Search for a specific relationship\nmesheryctl
    relationship search [--kind <kind>] [--type <type>] [--subtype <subtype>] [--model
    <model>]\n\n// View a specific relationship\nmesheryctl relationship view [model-name]\n\t"
  flags:
    count:
      name: --count, -c
      description: (optional) Get the number of relationship(s) in total
      usage: mesheryctl relationship --count
    help:
      name: --help, -h
      description: help for relationship
      usage: mesheryctl relationship --help
  subcommands:
    generate:
      name: generate
      description: Generate relationships documents
      usage: mesheryctl relationship generate [flags]
      example: |2

        // Generate relationships documentss
        mesheryctl relationship generate --spreadsheet-id [Spreadsheet ID] --spreadsheet-cred $CRED
      flags:
        help:
          name: --help, -h
          description: help for generate
          usage: mesheryctl relationship generate --help
        spreadsheet-cred:
          name: --spreadsheet-cred
          description: base64 encoded credential to download the spreadsheet
          usage: mesheryctl relationship generate --spreadsheet-cred <value>
        spreadsheet-id:
          name: --spreadsheet-id
          description: spreadsheet ID for the integration spreadsheet
          usage: mesheryctl relationship generate --spreadsheet-id <value>
    list:
      name: list
      description: List registered relationships
      usage: mesheryctl relationship list [flags]
      example: |2

        // List all relationships
        mesheryctl relationship list

        // List relationships for a specified page
        mesheryctl relationship list --page [page-number]

        // List relationships with a custom page size
        mesheryctl relationship list --pagesize [page-size]

        // Display the total number of available relationships in Meshery
        mesheryctl relationship list --count
      flags:
        count:
          name: --count, -c
          description: (optional) Display the total count of relationships only
          usage: mesheryctl relationship list --count
        help:
          name: --help, -h
          description: help for list
          usage: mesheryctl relationship list --help
        page:
          name: --page, -p
          description: (optional) List next set of relationships with --page (default
            = 1)
          usage: mesheryctl relationship list --page <value>
        pagesize:
          name: --pagesize
          description: (optional) Number of results per page (default = 10)
          usage: mesheryctl relationship list --pagesize <value>
    search:
      name: search
      description: Search registered relationship(s)
      usage: mesheryctl relationship search [flags]
      example: |2-

        // Search for a specific relationship
        mesheryctl relationship search [--kind <kind>] [--type <type>] [--subtype <subtype>] [--model <model>]

        // Search a relationship for a specified page
        mesheryctl relationship search [--kind <kind>] [--page <int>]
      flags:
        help:
          name: --help, -h
          description: help for search
          usage: mesheryctl relationship search --help
        kind:
          name: --kind, -k
          description: (optional) Search relationships of a particular kind
          usage: mesheryctl relationship search --kind <value>
        model:
          name: --model, -m
          description: (optional) Search relationships of a particular model name
          usage: mesheryctl relationship search --model <value>
        page:
          name: --page, -p
          description: (optional) Page number of results to fetch (default = 1)
          usage: mesheryctl relationship search --page <value>
        subtype:
          name: --subtype, -s
          description: (optional) Search relationships of a particular subtype
          usage: mesheryctl relationship search --subtype <value>
        type:
          name: --type, -t
          description: (optional) Search relationships of a particular type
          usage: mesheryctl relationship search --type <value>
    view:
      name: view
      description: view relationships of a model by its name
      usage: mesheryctl relationship view [flags]
      example: "\n// View relationships of a model in default format yaml\nmesheryctl
        relationship view [model-name]\n\n// View relationships of a model in JSON
        format\nmesheryctl relationship view [model-name] --output-format json\n\n//
        View relationships of a model in json format and save it to a file\nmesheryctl
        relationship view [model-name] --output-format json --save\n\t"
      flags:
        help:
          name: --help, -h
          description: help for view
          usage: mesheryctl relationship view --help
        output-format:
          name: --output-format, -o
          description: (optional) format to display in [json|yaml]
          usage: mesheryctl relationship view --output-format <value>
        save:
          name: --save, -s
          description: (optional) save output as a JSON/YAML file
          usage: mesheryctl relationship view --save
exp:
  workspace:
    name: workspace
    description: Managge workspaces under an organization
    usage: mesheryctl exp workspace [flags]
    example: "\n\n// To view a list workspaces\nmesheryctl exp workspace list --orgId
      [orgId]\n\n// To create a workspace\nmesheryctl exp workspace create --orgId
      [orgId] --name [name] --description [description]\n\t"
    flags:
      count:
        name: --count
        description: total number of registered workspaces
        usage: mesheryctl exp workspace --count
      help:
        name: --help, -h
        description: help for workspace
        usage: mesheryctl exp workspace --help
    subcommands:
      create:
        name: create
        description: Create a new workspace under an organization
        usage: mesheryctl exp workspace create [flags]
        example: |2

          // Create a new workspace in an organization
          mesheryctl exp workspace create --orgId [orgId] --name [name] --description [description]
        flags:
          description:
            name: --description, -d
            description: (Optional) Description of the workspace
            usage: mesheryctl exp workspace create --description <value>
          help:
            name: --help, -h
            description: help for create
            usage: mesheryctl exp workspace create --help
          name:
            name: --name, -n
            description: Name of the workspace
            usage: mesheryctl exp workspace create --name <value>
          orgId:
            name: --orgId, -o
            description: Organization ID
            usage: mesheryctl exp workspace create --orgId <value>
      list:
        name: list
        description: List registered workspaces
        usage: mesheryctl exp workspace list [flags]
        example: |2

          // List of workspace under a specific organization
          mesheryctl exp workspace list --orgId [orgId]

          // List of workspace under a specific organization for a specified page
          mesheryctl exp workspace list --orgId [orgId] --page [page-number]

          // Display number of available  workspace under a specific organization
          mesheryctl exp workspace list --orgId [orgId] --count
        flags:
          count:
            name: --count
            description: total number of registered workspaces
            usage: mesheryctl exp workspace list --count
          help:
            name: --help, -h
            description: help for list
            usage: mesheryctl exp workspace list --help
          orgId:
            name: --orgId, -o
            description: Organization ID
            usage: mesheryctl exp workspace list --orgId <value>
          page:
            name: --page
            description: 'page number for paginated results. (default: 1)'
            usage: mesheryctl exp workspace list --page <value>
          page-size:
            name: --page-size
            description: 'number of items to be displayed per page for paginated results.
              (default: 10, max limit: 100)'
            usage: mesheryctl exp workspace list --page-size <value>
