{{- $src := .Get "src" -}}
{{- $rows := .Get "rows" | default "24" -}}
{{- $speed := .Get "speed" | default "1" -}}
{{- $theme := .Get "theme" | default "asciinema" -}}

<div class="asciinema-container">
  <script src="https://asciinema.org/a/{{ $src }}.js" id="asciicast-{{ $src }}" async data-rows="{{ $rows }}"{{ with .Get "cols" }} data-cols="{{ . }}"{{ end }} data-speed="{{ $speed }}" data-theme="{{ $theme }}"></script>
</div>
